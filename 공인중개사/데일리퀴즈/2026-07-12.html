<script>
const SCHEMA_VERSION = 2;
const QUIZ_DATE = "2026-07-12";
const QUESTIONS = [
/*__QUESTIONS_START__*/
{ type:"조합", cat:"부동산세법", q:"취득세의 신고·납부 기한에 관한 설명으로 옳은 것을 <b>모두 고른</b> 것은?<br>ㄱ. 유상거래로 부동산을 취득한 경우 취득일부터 60일 이내에 신고·납부하여야 한다.<br>ㄴ. 상속으로 인한 취득은 상속개시일이 속하는 달의 말일부터 6개월(외국에 주소를 둔 상속인은 9개월) 이내에 신고·납부한다.<br>ㄷ. 증여 등 무상취득은 취득일이 속하는 달의 말일부터 3개월 이내에 신고·납부한다.", opts:["ㄱ, ㄴ, ㄷ","ㄱ, ㄴ","ㄴ, ㄷ","ㄱ, ㄷ"], answer:0, expl:"ㄱ·ㄴ·ㄷ 모두 옳다. 유상은 취득일부터 60일, 무상증여는 취득월 말일부터 3개월, 상속은 상속개시월 말일부터 6개월(국외 9개월)로 기산점과 기간이 각각 다르다. 상속·증여는 '취득일'이 아니라 '말일'부터라는 점이 함정이다.", src:"2026-07-11 부동산세법 취득세 신고납부", conceptKey:"부동산세법 취득세-신고납부기한" },
{ type:"일반", cat:"부동산세법", q:"재산세의 납세의무자와 주택 판단에 관한 설명으로 <b>옳지 않은</b> 것은?", opts:["공부상 소유자는 확인되나 매매사실이 확인되지 않는 경우 재산세는 일단 공부상 소유자가 부담한다.","소유권 변동이 있었으나 과세기준일까지 등기·등록이 되지 않은 재산의 공부상 소유자는 과세기준일부터 30일 이내에 그 사실을 신고하여야 한다.","1구의 건물이 주거와 주거 외 용도로 사용되는 경우 주거용 부분 면적이 전체의 30% 이상이면 그 건물 전부를 주택으로 본다.","주택의 부속토지 경계가 명확하지 않으면 그 주택 바닥면적의 10배에 해당하는 토지를 부속토지로 본다."], answer:2, expl:"1구의 건물은 주거용 사용 부분이 50% 이상일 때 전부를 주택으로 보므로 30% 기준으로 적은 3번이 옳지 않다. 주거 비중이 과반일 때 비로소 주택으로 취급하려는 것이다. 공부상 소유자 부담·30일 신고·바닥면적 10배 부속토지는 옳은 지문이다.", src:"2026-07-11 부동산세법 재산세 납세의무자", conceptKey:"부동산세법 재산세-납세의무자·주택판단" },
{ type:"사례", cat:"부동산세법", q:"갑은 1동의 건물 중 1층을 상가로, 2층과 3층을 자신의 주거로 사용하고 있다. 이 건물의 재산세 과세에 관한 설명으로 옳은 것은?", opts:["건물 전체를 주택으로 보아 주택분 재산세를 부과한다.","주거용으로 사용되는 2·3층 부분만 주택으로 보고, 1층 상가 부분은 건축물로 구분하여 과세한다.","1동의 건물이 주거와 주거 외 용도로 혼용되면 면적과 무관하게 전부 건축물로 본다.","주거용 부분이 전체의 50% 미만이면 건물 전부를 주택으로 본다."], answer:1, expl:"1동의 건물이 주거와 주거 외 용도로 함께 쓰이면 주거용 부분만 주택으로 보므로 2번이 옳다. 물리적으로 구분되는 1동 건물은 용도별로 나누어 과세할 수 있기 때문이다. '1구'의 건물에서 50% 이상 주거면 전부 주택으로 보는 기준과 혼동하지 않아야 한다.", src:"2026-07-11 부동산세법 재산세 주택 판단", conceptKey:"부동산세법 재산세-1동건물 주택판단" },
{ type:"계산", cat:"부동산세법", q:"과세표준이 5억원인 농지를 유상거래로 취득하였다. 취득세 표준세율이 1천분의 30일 때 산출되는 취득세액은? (다른 조건은 동일)", opts:["1,500만원","1,400만원","150만원","3,000만원"], answer:0, calc:{expr:"500000000*30/1000",expected:15000000}, expl:"취득세액 = 과세표준 × 세율 = 5억 × 30/1,000 = 1,500만원이다. 유상거래로 취득한 농지는 1천분의 30 세율이 적용된다. 세율을 1천분의 28(원시취득)로 잘못 쓰거나 소수점을 밀려 계산하는 것이 함정이다.", src:"2026-07-11 부동산세법 취득세 세율", conceptKey:"부동산세법 취득세-농지 유상취득 세액" },
{ type:"일반", cat:"부동산세법", q:"재산세의 부과·징수에 관한 설명으로 <b>옳지 않은</b> 것은?", opts:["주택분 재산세는 원칙적으로 7월과 9월에 각각 2분의 1씩 부과하나, 세액이 20만원 이하이면 7월에 전액 부과할 수 있다.","선박과 항공기에 대한 재산세는 매년 7월 16일부터 7월 31일까지 부과·징수한다.","주택의 토지와 건물 소유자가 다른 경우 토지·건물 가액을 합산한 금액에 세율을 적용한 뒤 그 세율을 토지와 건물에 각각 적용한다.","토지·주택·건축물의 시가표준액이 없는 경우 국토교통부장관이 산정한 가액을 시가표준액으로 한다."], answer:3, expl:"시가표준액이 없을 때는 국토교통부장관이 아니라 지방자치단체의 장이 산정한 가액을 시가표준액으로 하므로 4번이 옳지 않다. 재산세는 지방세라 지자체장이 과세표준을 정하기 때문이다. 주택분 7·9월 분납, 선박·항공기 7월 납기, 소유자 상이 시 합산 후 안분은 옳은 지문이다.", src:"2026-07-11 부동산세법 재산세 부과징수", conceptKey:"부동산세법 재산세-납기·시가표준액" },
{ type:"OX", cat:"부동산세법", q:"종합부동산세는 정부가 세액을 계산하여 고지하는 부과과세 방식의 세금이므로 무신고가산세를 부과하지 않는다.", opts:["O","X"], answer:0, expl:"O. 종합부동산세는 납세자가 신고하여 확정하는 세금이 아니라 관할 세무서장이 계산하여 고지하는 부과과세 방식이어서 무신고가산세가 없다. 신고가 세액확정 요건이 아니기 때문이다. 다만 납세자가 신고납부방식을 선택할 수도 있다는 점과 함께 정리하면 좋다.", src:"2026-07-11 부동산세법 종합부동산세", conceptKey:"부동산세법 종부세-무신고가산세 없음" },
{ type:"일반", cat:"부동산세법", q:"조세채권과 피담보채권 사이의 배당순위에 관한 설명으로 옳은 것은?", opts:["일반조세와 저당권 등 피담보채권의 우선순위는 조세의 공익성이 크므로 설정일과 무관하게 언제나 조세가 앞선다.","조세채권 상호간의 배당순위는 압류 → 담보 → 교부청구의 순이다.","재산세·소방분 지역자원시설세 등 그 재산에 부과된 당해세는 원칙적으로 피담보채권보다 우선한다.","신고에 의하여 확정되는 조세의 법정기일은 납세고지서의 발송일이다."], answer:2, expl:"당해세는 그 재산 자체에 부과된 세금이라 원칙적으로 피담보채권에 우선하므로 3번이 옳다. 그 재산의 담세력에 기초한 세금이기 때문이다. 일반조세와 피담보채권은 날짜순, 조세 상호간은 '담·압·교', 신고확정 조세의 법정기일은 신고일이라 나머지는 틀리다.", src:"2026-07-05 부동산세법 조세채권 배당순위", conceptKey:"부동산세법 배당순위-당해세 우선" },
{ type:"일반", cat:"민법", q:"대리권 없이 계약을 맺은 무권대리인이 그 상대방에게 부담하는 책임에 관한 설명으로 옳은 것은?", opts:["무권대리인의 책임은 자신에게 과실이 있는 경우에만 인정되는 과실책임이다.","상대방이 계약 당시 대리권 없음을 과실로 알지 못한 경우에는 무권대리인은 책임을 지지 않는다.","무권대리인이 제한능력자인 경우에도 상대방에 대하여 이행 또는 손해배상 책임을 진다.","본인이 추인을 거절하면 무권대리인의 상대방에 대한 책임도 함께 소멸한다."], answer:1, expl:"상대방이 대리권 없음을 과실로 알지 못한 경우에는 무권대리인이 책임을 지지 않으므로 2번이 옳다. 무권대리인 책임은 무과실책임이지만 상대방이 보호가치를 잃은 경우까지 지우지는 않기 때문이다. 제한능력자인 무권대리인은 면책되고, 무권대리인은 자기 대리권 존부를 아는 지위여서 무과실책임을 진다.", src:"2026-07-06 민법 무권대리인의 책임", conceptKey:"민법 무권대리인-무과실책임·예외" },
{ type:"사례", cat:"민법", q:"갑은 자신의 부동산을 을에게 명의신탁하였고, 을은 이를 제3자 병에게 매도하여 이전등기를 마쳤다. 이에 관한 설명으로 옳은 것은? (부동산실명법상 특례는 고려하지 않음)", opts:["병이 명의신탁 사실을 알고 있었다면 갑은 병에게 소유권을 주장할 수 있다.","을이 병에게 이전한 뒤 다시 을이 소유권을 취득하면 갑은 을에게 반환을 청구할 수 있다.","명의신탁은 통정허위표시와 마찬가지로 선의의 제3자에 대해서만 대항하지 못한다.","병은 명의신탁 사실에 대하여 악의이더라도 유효하게 소유권을 취득한다."], answer:3, expl:"명의신탁에서 제3자는 악의이더라도 보호되어 유효하게 소유권을 취득하므로 4번이 옳다. 명의신탁 무효는 거래안전을 위해 제3자에게 대항할 수 없도록 설계됐기 때문이다. 이 점이 선의의 제3자만 보호하는 통정허위표시와 결정적으로 다르고, 수탁자가 재취득해도 다른 권원에 의한 것이라 반환청구가 안 된다.", src:"2026-07-06 민법 명의신탁 제3자 보호", conceptKey:"민법 명의신탁-제3자 악의 보호" },
{ type:"조합", cat:"민법", q:"점유취득시효에 관한 설명으로 옳은 것을 <b>모두 고른</b> 것은?<br>ㄱ. 취득시효로 인한 소유권취득의 효과는 점유를 개시한 때에 소급한다.<br>ㄴ. 점유의 승계가 있는 경우 시효취득을 주장하는 자는 자기 또는 전 점유자의 점유개시일 중 하나를 임의로 기산점으로 선택할 수 있다.<br>ㄷ. 시효완성자의 등기청구권은 통상의 채권양도 법리에 따라 소유자의 동의 없이 양도할 수 있다.", opts:["ㄱ, ㄴ, ㄷ","ㄱ, ㄴ","ㄴ, ㄷ","ㄱ, ㄷ"], answer:0, expl:"ㄱ·ㄴ·ㄷ 모두 옳다. 시효취득은 원시취득이면서 점유개시 시점으로 소급하고, 승계점유 시 기산점을 임의 선택할 수 있으며, 시효완성자의 등기청구권은 채권양도 법리로 소유자 동의 없이 양도된다. 매수인의 등기청구권과 달리 양도에 동의가 불필요한 점이 핵심이다.", src:"2026-07-06 민법 취득시효", conceptKey:"민법 취득시효-소급·기산점·등기청구권양도" },
{ type:"일반", cat:"민법", q:"지상권과 전세권의 존속기간에 관한 설명으로 <b>옳지 않은</b> 것은?", opts:["석조·연와조 등 견고한 건물의 소유를 목적으로 하는 지상권의 최단존속기간은 30년으로, 이는 견고한 건물일수록 존속 필요기간이 길다는 취지이다.","건물 이외의 공작물의 소유를 목적으로 하는 지상권의 최단존속기간은 5년이다.","건물에 대한 전세권이 법정갱신된 경우 그 존속기간은 종전과 동일한 기간으로 갱신된 것으로 본다.","전세권의 존속기간은 토지·건물을 불문하고 10년을 넘지 못한다."], answer:2, expl:"전세권이 법정갱신되면 존속기간을 정하지 않은 것으로 보므로 종전과 같은 기간으로 갱신된다고 한 3번이 옳지 않다. 법정갱신은 기간의 정함이 없는 상태로 이어지기 때문이다. 견고한 건물 30년·공작물 5년·전세권 최장 10년은 옳은 지문이다.", src:"2026-07-06 민법 지상권·전세권", conceptKey:"민법 용익물권-지상권 최단기간·전세권 법정갱신" },
{ type:"사례", cat:"민법", q:"을이 대리권 없이 갑을 대리하여 병과 매매계약을 체결하고 병으로부터 계약금을 받았다. 병이 갑의 추인이 있기 전에 계약을 철회한 경우에 관한 설명으로 옳은 것은?", opts:["병은 갑에게 계약금 상당의 부당이득반환을 청구할 수 있다.","철회로 계약은 갑에게 효력이 없게 되고, 계약금을 직접 받지 않은 갑은 부당이득반환의무를 지지 않는다.","철회는 갑이 추인한 후에도 할 수 있다.","병은 선의·무과실이더라도 철회권을 행사할 수 없다."], answer:1, expl:"철회가 있으면 계약은 본인 갑에게 효력이 없고, 계약금을 직접 받지 않은 갑은 부당이득반환의무가 없으므로 2번이 옳다. 무권대리는 추인이 없으면 본인에게 효력이 없기 때문이다. 철회는 추인 전에만 가능하고, 선의의 상대방은 철회권을 가지므로 나머지는 틀리다.", src:"2026-07-06 민법 무권대리 철회", conceptKey:"민법 무권대리-철회 후 계약금 부당이득" },
{ type:"OX", cat:"민법", q:"유치권은 채무자 소유의 물건에 대해서만 성립할 수 있으므로 채무자 아닌 제3자 소유의 물건에는 성립할 수 없다.", opts:["O","X"], answer:1, expl:"X. 유치권은 채무자 이외의 제3자 소유물에도 성립할 수 있고 경락인에게도 대항할 수 있다. 유치권은 목적물과 채권의 견련관계에서 발생하는 법정담보물권이라 소유자가 누구인지를 따지지 않기 때문이다. 다만 유치권자가 승낙 없이 임대하면 소멸청구 대상이 된다.", src:"2026-07-06 민법 유치권", conceptKey:"민법 유치권-제3자 소유물 성립" },
{ type:"일반", cat:"민법", q:"주택임대차보호법과 상가건물 임대차보호법에 관한 설명으로 <b>옳지 않은</b> 것은?", opts:["임차권등기명령에 의해 임차권등기를 마친 임차인은 배당요구를 하지 않아도 우선변제를 받을 수 있다.","상가건물 임대차에서는 사업자등록을 신청한 다음 날부터 대항력이 발생한다.","상가건물 임대차에서 기간을 1년 미만으로 정한 경우 임대인은 그 기간의 유효함을 주장할 수 없으나 임차인은 그 기간이 유효함을 주장할 수 있다.","권리금 회수 방해로 인한 임차인의 손해배상청구권은 그 방해가 있은 날부터 3년 이내에 행사하지 않으면 시효로 소멸한다."], answer:3, expl:"권리금 회수 방해 손해배상청구권은 '방해가 있은 날'이 아니라 임대차가 종료한 날부터 3년 이내에 행사해야 하므로 4번이 옳지 않다. 임대차 종료 시점을 기준으로 회수기회 침해가 확정되기 때문이다. 임차권등기 후 배당요구 불요, 상가 대항력 신청 다음 날, 1년 미만 약정은 임차인만 주장 가능은 옳은 지문이다.", src:"2026-07-06 민법 주택·상가임대차", conceptKey:"민법 상가임대차-권리금 손배 기산점" },
{ type:"일반", cat:"부동산공법", q:"광역계획권과 광역도시계획에 관한 설명으로 <b>옳지 않은</b> 것은?", opts:["광역계획권이 둘 이상의 시·도에 걸치는 경우 관계 도지사가 공동으로 광역계획권을 지정한다.","광역계획권의 지정은 국토교통부장관 또는 도지사만 할 수 있다.","광역도시계획의 수립은 국토교통부장관·시·도지사·시장·군수 모두 할 수 있다.","광역계획권이 같은 도의 관할구역에 속하는 경우 관할 시장·군수가 공동으로 광역도시계획을 수립한다."], answer:0, expl:"광역계획권이 둘 이상의 시·도에 걸치면 국토교통부장관이 지정하며 애초에 '공동지정' 제도 자체가 없으므로 1번이 옳지 않다. 광역권 획정은 상위기관이 일원적으로 정하기 때문이다. 지정은 국장·도지사, 수립은 국장·시도지사·시장군수, 같은 도 안이면 시장·군수 공동수립은 옳은 지문이다.", src:"2026-07-07 부동산공법 광역계획권", conceptKey:"부동산공법 광역계획권-지정·수립 권한" },
{ type:"조합", cat:"부동산공법", q:"도시·군관리계획 입안 시 기초조사의 생략에 관한 설명으로 옳은 것을 <b>모두 고른</b> 것은?<br>ㄱ. 행정청이 개발하는 경우에는 환경성검토와 토지적성평가를 모두 생략한다.<br>ㄴ. 개발제한구역 안에 기반시설을 설치하는 경우 토지적성평가를 생략한다.<br>ㄷ. 지구단위계획구역이 상업지역과 같이 도시화가 이미 진행된 지역이면 기초조사를 전부 생략할 수 있다.", opts:["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ"], answer:2, expl:"ㄴ·ㄷ이 옳다. 개발제한구역 내 기반시설은 환경성검토만 하고 토지적성평가는 생략하며, 도시화가 완료된 지역은 기초조사를 전부 생략할 수 있다. 행정청 개발은 토지적성평가만 생략하고 환경성검토는 해야 하므로 '모두 생략'이라 한 ㄱ은 틀리다.", src:"2026-07-07 부동산공법 기초조사 생략", conceptKey:"부동산공법 기초조사-생략 사유" },
{ type:"일반", cat:"부동산공법", q:"용도지구에 관한 설명으로 옳은 것은?", opts:["복합개발진흥지구는 주거·공업·유통물류·관광휴양 기능 중 어느 하나의 기능을 중심으로 개발하는 지구이므로 단일 기능만으로도 지정될 수 있다.","특정용도제한지구는 주거·교육환경 보호나 청소년 보호를 위하여 오락·유흥시설 등 특정시설의 입지를 제한하는 지구이다.","복합개발진흥지구는 특정 시설의 입지 자체를 금지하는 것을 주된 목적으로 한다.","하나의 필지에는 둘 이상의 용도지구를 중복하여 지정할 수 없다."], answer:1, expl:"특정용도제한지구는 주거·교육환경 보호를 위해 오락·유흥시설의 입지를 제한하는 지구이므로 2번이 옳다. 지구 이름에 규제 목적이 그대로 담겨 있기 때문이다. 복합개발진흥지구는 2 이상의 기능을 중심으로 개발하는 지구이고, 용도지구는 서로 중복 지정될 수 있어 나머지는 틀리다.", src:"2026-07-07 부동산공법 용도지구", conceptKey:"부동산공법 용도지구-복합개발진흥·특정용도제한" },
{ type:"OX", cat:"부동산공법", q:"시가화조정구역에서는 주민의 요청이 있으면 어떤 도시·군계획사업이든 시행할 수 있다.", opts:["O","X"], answer:1, expl:"X. 시가화조정구역에서는 주민 요청이 아니라 중앙행정기관의 장의 요청으로 시·도지사가 지정목적 달성에 지장이 없다고 인정하고, 대통령령으로 정하는 사업만 시행할 수 있다. 이 구역의 존재이유가 개인 편의가 아니라 국토계획의 순서라는 공익이기 때문이다. 원칙 금지·열거된 예외만 허용이 핵심이다.", src:"2026-07-07 부동산공법 시가화조정구역", conceptKey:"부동산공법 시가화조정구역-시행 가능 사업" },
{ type:"일반", cat:"부동산공법", q:"🔁 개발행위허가의 제한과 변경에 관한 설명으로 <b>옳지 않은</b> 것은?", opts:["국토교통부장관은 개발행위로 주변환경이 오염될 우려가 있는 지역에 대해 중앙도시계획위원회의 심의를 거쳐 개발행위허가를 제한할 수 있다.","개발행위허가의 제한기간은 원칙적으로 최대 5년을 넘을 수 없다.","개발행위허가를 받은 사업면적을 5% 범위에서 축소하는 것은 경미한 변경으로 통지만 하면 된다.","개발행위허가를 받은 부지면적을 5% 범위에서 확장하는 것은 경미한 변경에 해당하여 별도의 변경허가가 필요 없다."], answer:3, expl:"허가받은 면적을 축소하는 것은 경미한 변경이지만 확장하는 것은 변경허가 대상이므로 확장을 경미한 변경이라 한 4번이 옳지 않다. 규모가 커지면 주변에 미치는 영향이 달라져 다시 심사해야 하기 때문이다. 오염우려지역 제한 시 중앙도시계획위 심의, 제한 최대 5년, 축소 시 통지는 옳은 지문이다.", src:"2026-07-07 부동산공법 개발행위허가 제한 (재도전)", conceptKey:"부동산공법 개발행위허가 제한", retryOf:"부동산공법 개발행위허가 제한" },
{ type:"조합", cat:"부동산공법", q:"도시·군계획시설의 실효와 단계별 집행계획에 관한 설명으로 옳은 것을 <b>모두 고른</b> 것은?<br>ㄱ. 결정 고시일부터 10년 이내에 사업이 시행되지 않고 집행계획도 없으면 토지소유자는 해제를 위한 도시·군관리계획 입안을 신청할 수 있다.<br>ㄴ. 도시·군계획시설결정은 고시일부터 20년이 지날 때까지 사업이 시행되지 않으면 그 다음 날 효력을 잃는다.<br>ㄷ. 3년 이내에 시행하는 도시·군계획시설사업은 제1단계 집행계획에 포함되어야 한다.", opts:["ㄱ, ㄴ, ㄷ","ㄱ, ㄴ","ㄴ, ㄷ","ㄱ, ㄷ"], answer:0, expl:"ㄱ·ㄴ·ㄷ 모두 옳다. 10년 미집행 시 해제 입안 신청권이 생기고, 20년이 지나면 다음 날 실효되며, 3년 이내 시행 사업은 제1단계 집행계획에 포함된다. 10년(해제 신청)과 20년(자동 실효)의 두 기간을 구분하는 것이 핵심이다.", src:"2026-07-07 부동산공법 계획시설 실효·해제", conceptKey:"부동산공법 도시군계획시설-실효·해제·집행계획" },
{ type:"일반", cat:"부동산공법", q:"도시지역 외의 지역에서의 지구단위계획에 관한 설명으로 옳은 것은?", opts:["도시지역 외에서도 지구단위계획으로 건축물 높이제한을 120% 이내에서 완화할 수 있다.","계획관리지역 외의 지역이라도 지구단위계획구역이면 아파트·연립주택에 완화규정을 적용할 수 있다.","도시지역 외의 지역을 지구단위계획구역으로 지정하려면 지정하려는 구역 면적의 50% 이상이 계획관리지역이어야 한다.","도시지역 외의 지구단위계획구역을 지정할 때에는 계획관리지역이 전혀 포함되지 않아도 무방하다."], answer:2, expl:"도시지역 외를 지구단위계획구역으로 지정하려면 구역 면적의 50% 이상이 계획관리지역이어야 하므로 3번이 옳다. 계획관리지역이 개발수요를 관리할 최소 기반이기 때문이다. 높이제한 120% 완화는 도시지역 내에서만 가능하고, 계획관리지역 외에서는 아파트·연립 완화가 안 되어 나머지는 틀리다.", src:"2026-07-07 부동산공법 지구단위계획", conceptKey:"부동산공법 지구단위계획-도시지역 외 지정요건" },
{ type:"일반", cat:"공인중개사법", q:"중개대상물에 관한 설명으로 <b>옳지 않은</b> 것은?", opts:["명인방법을 갖춘 수목의 집단은 입목에 관한 법률의 적용을 받지 않더라도 중개대상물이 될 수 있다.","토지에서 분리된 수목은 그 사실만으로 명인방법을 갖춘 것으로 보아 중개대상물이 된다.","영업용 건물의 영업시설이나 거래처·신용 등 무형의 재산적 가치는 중개대상물인 건물에 해당하지 않는다.","특정 동·호수로 지정되어 분양계약이 체결된 아파트의 분양권은 중개대상물이 될 수 있다."], answer:1, expl:"토지에서 분리되었다는 사정만으로 명인방법을 갖춘 것으로 보지는 않으므로 2번이 옳지 않다. 명인방법은 소유권을 외부에 공시하는 별도의 관행적 표시를 요구하기 때문이다. 명인방법 갖춘 수목집단, 무형가치 제외, 특정된 분양권은 옳은 지문이다.", src:"2026-07-08 공인중개사법 중개대상물", conceptKey:"공인중개사법 중개대상물-명인방법·분양권" },
{ type:"일반", cat:"공인중개사법", q:"🔁 개업공인중개사의 중개보수와 손해배상책임 보장(업무보증)에 관한 설명으로 <b>옳지 않은</b> 것은?", opts:["개업공인중개사는 업무를 시작하기 전에 손해배상책임을 보장하기 위한 조치를 하여야 한다.","주택의 중개에 대한 보수는 국토교통부령이 정하는 요율을 전국에 일률적으로 적용한다.","중개가 완성된 때에는 거래당사자에게 손해배상책임의 보장금액과 보장기관 및 그 소재지를 설명하여야 한다.","손해배상책임의 보장은 보증보험·공제 가입 또는 공탁 중 하나의 방법으로 할 수 있다."], answer:1, expl:"주택 중개보수는 전국 일률요율이 아니라 특별시·광역시·도의 조례로 정하는 요율 한도 내에서 정하므로 2번이 옳지 않다. 지역별 시세 차이를 반영하기 위해서다. 업무개시 전 보증설정, 보장금액·기관·소재지 설명, 보증보험·공제·공탁 중 선택은 옳은 지문이다.", src:"2026-07-08 공인중개사법 중개보수·업무보증 (재도전)", conceptKey:"공인중개사법 §1 중개보수·업무보증", retryOf:"공인중개사법 §1 중개보수·업무보증" },
{ type:"조합", cat:"공인중개사법", q:"공인중개사법령상 포상금 지급 대상인 위반행위를 <b>모두 고른</b> 것은?<br>ㄱ. 개업공인중개사가 아닌 자가 중개대상물의 표시·광고를 한 경우<br>ㄴ. 부정한 방법으로 중개사무소 개설등록을 한 경우<br>ㄷ. 중개사무소등록증을 다른 사람에게 양도·대여한 경우", opts:["ㄱ, ㄴ, ㄷ","ㄱ, ㄴ","ㄴ, ㄷ","ㄱ, ㄷ"], answer:0, expl:"ㄱ·ㄴ·ㄷ 모두 포상금 지급 대상이다. 비개업자의 표시·광고, 부정한 방법의 개설등록, 등록증 양도·대여는 모두 신고 시 포상금이 지급되는 위반행위다. 반면 거짓 표시·광고 등은 과태료 대상이지만 포상금 대상은 아니라는 점이 함정이다.", src:"2026-07-08 공인중개사법 포상금", conceptKey:"공인중개사법 포상금-지급대상 위반행위" },
{ type:"사례", cat:"공인중개사법", q:"갑은 공인중개사 자격이 없는 자로서 중개사무소를 표시·광고하였고, 개업공인중개사 을은 인터넷에 중개대상물을 사실과 다르게 거짓으로 표시·광고하였다. 이에 관한 설명으로 옳은 것은?", opts:["갑의 행위를 신고하더라도 포상금 지급 대상이 아니다.","을의 거짓 표시·광고에 대해서는 형사처벌인 벌금만 부과된다.","갑과 같이 개업공인중개사가 아닌 자가 표시·광고한 것을 신고한 경우는 포상금 지급 대상이 된다.","을의 거짓 표시·광고를 신고하면 신고자에게 포상금이 지급된다."], answer:2, expl:"개업공인중개사가 아닌 자의 표시·광고를 신고한 경우는 포상금 지급 대상이므로 3번이 옳다. 무자격자의 시장 진입 자체를 차단하려는 취지다. 반면 을의 거짓 표시·광고는 500만원 이하 과태료 대상이고 포상금 대상은 아니어서 나머지는 틀리다.", src:"2026-07-08 공인중개사법 표시광고·포상금", conceptKey:"공인중개사법 표시광고-포상금·과태료 구분" },
{ type:"일반", cat:"공인중개사법", q:"부동산거래정보망과 거래정보사업자에 관한 설명으로 <b>옳지 않은</b> 것은?", opts:["거래정보사업자로 지정받으려는 자는 부가통신사업자이면 되고 공인중개사 자격을 요하지 않는다.","거래정보사업자가 운영규정을 위반한 경우 국토교통부장관은 그 지정을 취소할 수 있다.","개업공인중개사는 거래정보사업자에게 공개를 의뢰한 중개대상물의 거래가 완성된 때에는 지체 없이 그 사실을 통보하여야 한다.","거래정보사업자의 지정취소 사유에 해당하면 국토교통부장관은 반드시 그 지정을 취소하여야 한다."], answer:3, expl:"거래정보사업자의 지정취소는 '취소하여야 한다'가 아니라 '취소할 수 있다'는 재량사항이므로 4번이 옳지 않다. 위반의 경중을 고려해 처분 여부를 정하도록 한 것이다. 부가통신사업자 요건, 운영규정 위반 시 취소 가능, 거래완성 통보의무는 옳은 지문이다.", src:"2026-07-08 공인중개사법 거래정보사업자", conceptKey:"공인중개사법 거래정보사업자-지정취소 재량" },
{ type:"일반", cat:"공인중개사법", q:"부동산 거래신고의 기한과 기재사항에 관한 설명으로 옳은 것은?", opts:["공급계약 또는 전매계약을 부동산 거래신고할 때에는 부가가치세를 포함한 금액을 거래금액으로 적는다.","부동산 매매계약은 계약 체결일부터 60일 이내에 신고관청에 신고하여야 한다.","토지거래허가구역에서 허가를 받은 경우에는 허가와 신고가 하나의 절차로 통합되어 별도의 부동산 거래신고를 하지 않아도 된다.","입목·광업재단·공장재단의 거래도 모두 부동산 거래신고의 대상이 된다."], answer:0, expl:"공급계약·전매계약의 거래신고 시에는 부가가치세를 포함한 금액을 거래금액으로 적으므로 1번이 옳다. 실제 지급되는 총액이 거래질서 파악의 기준이 되기 때문이다. 매매계약 신고는 60일이 아니라 30일이고, 토지거래허가를 받아도 거래신고는 별도이며, 입목·재단은 신고 대상이 아니라 나머지는 틀리다.", src:"2026-07-08 공인중개사법 부동산 거래신고", conceptKey:"공인중개사법 부동산거래신고-기재사항·기한" },
{ type:"일반", cat:"부동산학개론", q:"🔁 주택시장의 여과과정(filtering)과 주거분리에 관한 설명으로 옳은 것은?", opts:["상향여과는 고소득층이 사용하던 주택이 저소득층에게 이전되어 사용되는 현상으로, 주로 노후 주거지에서 활발하게 나타난다.","주거분리는 도심의 직장과 주거지가 공간적으로 분리되는 직주분리 현상을 말한다.","하향여과는 고소득층 주거지역에서만 발생한다.","주거분리는 주택시장이 소득계층별로 서로 다른 지역으로 나뉘는 현상으로, 정(+)·부(-)의 외부효과가 그 원인으로 작용한다."], answer:3, expl:"주거분리는 소득계층별로 주거지역이 분리되는 현상으로 외부효과가 원인이 되므로 4번이 옳다. 고소득층은 부의 외부효과를 피해, 저소득층은 정의 외부효과를 좇아 이동하기 때문이다. 저소득층에게 주택이 넘어가는 것은 하향여과이고, 주거분리는 직주분리와 다르다는 점이 함정이다.", src:"2026-07-09 부동산학개론 여과·주거분리 (재도전)", conceptKey:"부동산학개론 §2 여과·주거분리", retryOf:"부동산학개론 §2 여과·주거분리" },
{ type:"조합", cat:"부동산학개론", q:"🔁 거미집모형(cobweb model)에 관한 설명으로 옳은 것을 <b>모두 고른</b> 것은?<br>ㄱ. 수요의 가격탄력성이 공급의 가격탄력성보다 크면 수렴형이 된다.<br>ㄴ. 공급곡선 기울기의 절댓값이 수요곡선 기울기의 절댓값보다 작으면 수렴형이 된다.<br>ㄷ. 가격이 변동해도 공급량이 즉각 반응하지 못하고 일정한 시차를 두고 조정된다는 것을 전제한다.", opts:["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ"], answer:1, expl:"ㄱ·ㄷ이 옳다. 수요탄력성이 공급탄력성보다 크면 수렴형이고, 거미집모형은 공급이 전기 가격에 반응해 시차를 두고 조정됨을 전제한다. 공급곡선 기울기가 수요곡선보다 작으면(공급이 더 탄력적) 발산형이 되므로 ㄴ은 틀리다.", src:"2026-07-09 부동산학개론 거미집모형 (재도전)", conceptKey:"부동산학개론 §1 거미집이론", retryOf:"부동산학개론 §1 거미집이론" },
{ type:"일반", cat:"부동산학개론", q:"🔁 부동산시장의 특성과 기능에 관한 설명으로 <b>옳지 않은</b> 것은?", opts:["부동산시장은 지역별·용도별로 세분화되어 부분시장(sub-market)이 형성되며, 부분시장마다 수급과 가격이 서로 다르게 나타나는 경향이 있다.","부동산시장은 거래의 비공개성과 상품의 비표준성으로 정보의 비대칭이 크게 나타난다.","부동산시장이 할당 효율적이려면 어떠한 경우에도 초과이윤이 존재하지 않아야 하며, 이는 부동산시장에서 완전하게 달성된다.","부동산시장은 수요·공급의 조절이 쉽지 않아 단기적으로 가격의 왜곡이 나타날 수 있다."], answer:2, expl:"부동산시장은 정보의 비대칭과 진입장벽으로 완전한 할당 효율을 달성하기 어려우므로, 초과이윤이 완전히 사라진다고 단정한 3번이 옳지 않다. 정보를 얻는 비용과 초과이윤이 일치할 때 할당 효율이 성립하는데 부동산시장은 그 조건을 완전히 충족하지 못한다. 시장 세분화·비대칭·조절 곤란은 옳은 지문이다.", src:"2026-07-09 부동산학개론 부동산시장의 특성 (재도전)", conceptKey:"부동산학개론 §1 시장이론", retryOf:"부동산학개론 §1 시장이론" },
{ type:"계산", cat:"부동산학개론", q:"아래 임대주택 운영자료를 이용하여 계산한 유효총소득은? (다른 조건은 동일)<br>ㆍ가능총소득: 8,000만원<br>ㆍ공실 및 대손충당금: 800만원<br>ㆍ기타(주차장) 수입: 500만원", opts:["7,700만원","7,300만원","8,300만원","6,700만원"], answer:0, calc:{expr:"8000-800+500",expected:7700}, expl:"유효총소득 = 가능총소득 - 공실 및 대손충당금 + 기타소득 = 8,000 - 800 + 500 = 7,700만원이다. 공실은 차감하고 주차장 등 기타수입은 가산한다. 공실을 더하거나 기타소득을 빼는 방향 실수를 유도하는 계산이다.", src:"2026-07-09 부동산학개론 유효총소득", conceptKey:"부동산학개론 유효총소득-산정" },
{ type:"계산", cat:"부동산학개론", q:"순영업소득이 6,000만원이고 환원율(자본환원율)이 5%인 부동산의 수익가액은? (직접환원법, 다른 조건은 동일)", opts:["6억원","10억원","12억원","24억원"], answer:2, calc:{expr:"6000/0.05",expected:120000}, expl:"직접환원법에서 수익가액 = 순영업소득 / 환원율 = 6,000만 / 0.05 = 12억원이다. 환원율은 소득을 자산가치로 되돌리는 나눗셈에 쓰인다. 할인(1.05로 나눔)과 자본환원(0.05로 나눔)의 분모를 혼동하지 않아야 한다.", src:"2026-07-09 부동산학개론 수익환원법", conceptKey:"부동산학개론 수익가액-직접환원" },
{ type:"OX", cat:"부동산학개론", q:"리카도의 차액지대설에 따르면 지대는 잉여이므로 곡물(생산물)의 가격에 영향을 주지 않는다.", opts:["O","X"], answer:0, expl:"O. 리카도는 곡물가격이 수요에 의해 먼저 결정되고 우등지의 초과수확이 지대로 귀속된다고 보아, 지대는 잉여일 뿐 생산물 가격을 올리는 원인이 아니라고 하였다. '지대가 비싸서 곡물이 비싸다'는 통념의 인과를 뒤집은 것이다. 위치(수송비) 차이를 강조한 튀넨과 구분된다.", src:"2026-07-09 부동산학개론 리카도 차액지대설", conceptKey:"부동산학개론 차액지대-지대는 잉여" },
{ type:"일반", cat:"부동산학개론", q:"감정평가에 관한 규칙상 대상물건별 주된 감정평가방법의 연결로 옳은 것은?", opts:["토지 - 원가법","건물 - 원가법","임대료 - 수익환원법","영업권 - 거래사례비교법"], answer:1, expl:"건물은 재생산이 가능하고 신축원가 산정이 쉬워 원가법이 주된 방법이므로 2번이 옳다. 토지는 공시지가기준법(비교방식), 임대료는 임대사례비교법, 영업권 등 권리는 수익환원법이 주된 방법이라 나머지 연결은 틀리다. 재생산 가능 여부와 거래사례 존재가 방법 선택의 기준이다.", src:"2026-07-09 부동산학개론 물건별 감정평가방법", conceptKey:"부동산학개론 감정평가-물건별 주된 방법" },
{ type:"일반", cat:"부동산공시법", q:"지적공부의 지번변경에 관한 설명으로 <b>옳지 않은</b> 것은?", opts:["지적소관청이 지번을 변경하려면 시·도지사 또는 대도시 시장의 승인을 받아야 한다.","지번변경 시 각 필지에 지번을 새로 부여하는 방법(신규부여방법)을 준용한다.","토지소유자는 지번변경만을 사유로 하여서는 신청할 수 없고, 이는 지번변경이 지번부여지역 전체를 다시 설계하는 성격을 갖기 때문에 분할·합병 등 토지이동과 함께여야 한다.","바다로 된 토지가 말소된 후 회복등록을 위하여 지번을 부여할 때에도 신규부여방법으로 새 지번을 매긴다."], answer:3, expl:"바다로 된 토지의 회복등록 시에는 말소 당시의 지번을 그대로 되살리므로, 신규부여방법으로 새 지번을 매긴다고 한 4번이 옳지 않다. 원래 있던 필지를 복원하는 것이라 새로 설계할 필요가 없기 때문이다. 시·도지사 승인, 신규부여방법 준용, 토지이동과 함께 신청은 옳은 지문이다.", src:"2026-07-10 부동산공시법 지번변경", conceptKey:"부동산공시법 지번변경-승인·회복등록" },
{ type:"일반", cat:"부동산공시법", q:"🔁 지적소관청의 직권에 의한 등록사항 정정에 관한 설명으로 옳은 것은?", opts:["지적공부의 등록사항이 잘못 입력된 것이 명백하여도 면적의 증감이 생기면 소유권에 영향을 줄 수 있어 직권정정 대상이 아니다.","지적공부가 토지이용계획서·측량준비파일과 다르다는 사정만으로 직권정정을 할 수 있다.","등록사항의 정정으로 소유권에 관한 사항이 변동되는 경우에도 소관청이 단독으로 직권정정을 할 수 있으며, 이때 이해관계인의 동의나 별도의 절차는 필요하지 않다.","등록사항 정정은 반드시 토지소유자의 신청이 있어야만 할 수 있다."], answer:0, expl:"면적 증감을 수반하는 정정은 소유권을 침해할 수 있어 직권정정 대상이 아니므로 1번이 옳다. 직권정정은 소유권에 영향이 없는 명백한 오류에 한정되기 때문이다. 계획서와 다르다는 사정만으로는 정정할 수 없고, 정정은 직권 또는 신청 모두 가능하여 나머지는 틀리다.", src:"2026-07-10 부동산공시법 등록사항정정 (재도전)", conceptKey:"부동산공시법 §1 등록사항정정", retryOf:"부동산공시법 §1 등록사항정정" },
{ type:"계산", cat:"부동산공시법", q:"지적기준점 23점을 설치하여 지적측량을 실시하는 경우 지적기준점 설치에 걸리는 측량기간은? (15점 이하는 4일, 15점을 초과하면 초과하는 4점마다 1일을 가산한다)", opts:["5일","6일","7일","8일"], answer:1, calc:{expr:"4 + Math.ceil((23-15)/4)",expected:6}, expl:"15점까지는 4일이고 초과분 8점은 4점마다 1일씩 2일이 가산되어 총 6일이다. 즉 4 + (8÷4) = 6일. '15점 초과'가 기준이라 15점까지는 가산이 없다는 경계와, 초과분을 4점 단위로 올림한다는 점이 함정이다.", src:"2026-07-10 부동산공시법 지적측량 기간", conceptKey:"부동산공시법 지적측량-기준점 설치기간" },
{ type:"조합", cat:"부동산공시법", q:"부동산등기의 신청에 관한 설명으로 옳은 것을 <b>모두 고른</b> 것은?<br>ㄱ. 공유물분할판결이 확정되면 어느 공유자든 단독으로 지분이전등기를 신청할 수 있다.<br>ㄴ. 공유자 중 1인은 자기 지분만에 관한 소유권보존등기를 신청할 수 있다.<br>ㄷ. 토지의 소유권이 대지권인 경우 그 토지만의 소유권이전등기는 할 수 없다.", opts:["ㄱ, ㄴ","ㄱ, ㄴ, ㄷ","ㄱ, ㄷ","ㄴ, ㄷ"], answer:2, expl:"ㄱ·ㄷ이 옳다. 공유물분할판결이 확정되면 어느 공유자든 단독으로 지분이전등기를 신청할 수 있고, 대지권인 토지는 건물과 분리처분이 안 되어 그 토지만의 이전등기가 불가능하다. 공유자 1인은 자기 지분만의 '보존등기'는 신청할 수 없어 ㄴ은 틀리다.", src:"2026-07-10 부동산공시법 등기 신청", conceptKey:"부동산공시법 등기-보존·대지권" },
{ type:"OX", cat:"부동산공시법", q:"토지의 소유권이 대지권이라는 뜻이 등기된 경우에도 그 토지만을 따로 떼어 저당권을 설정할 수 있다.", opts:["O","X"], answer:1, expl:"X. 대지권이라는 뜻의 등기가 된 토지는 건물과 분리하여 처분할 수 없으므로 그 토지만의 저당권설정이나 소유권이전등기는 할 수 없다. 구분건물과 대지사용권의 일체성을 유지하기 위해서다. 전유부분과 대지권을 함께 처분해야 한다는 원칙이 핵심이다.", src:"2026-07-10 부동산공시법 대지권", conceptKey:"부동산공시법 대지권-분리처분 제한" },
{ type:"일반", cat:"부동산공시법", q:"부동산등기의 신청기간과 가등기에 관한 설명으로 <b>옳지 않은</b> 것은?", opts:["매매계약을 체결한 매수인은 잔금지급일부터 60일 이내에 소유권이전등기를 신청하여야 한다.","토지의 지목변경이나 대지권의 변경 등이 있으면 1개월 이내에 변경등기를 신청하여야 한다.","사인증여는 정지조건부 계약에 준하므로 증여자의 사망이라는 조건이 성취되면 본등기를 하게 되며, 이를 원인으로 한 소유권이전청구권 보전의 가등기를 할 수 있다.","선순위 가등기에 기한 본등기를 금지하는 취지의 가처분등기를 하여 후순위 권리자가 본등기를 막을 수 있다."], answer:3, expl:"선순위 가등기는 이미 순위가 확정된 권리라 후순위 가처분으로 본등기를 막을 수 없으므로 4번이 옳지 않다. 순위보전 효력을 후순위 처분으로 뒤집을 수 없기 때문이다. 매매 60일·변경등기 1개월·사인증여 가등기는 옳은 지문이다.", src:"2026-07-10 부동산공시법 등기 신청기간·가등기", conceptKey:"부동산공시법 등기-신청기간·가등기" }

/*__QUESTIONS_END__*/
];

/*__BUILD_PAYLOAD_START__*/
// ── 순수 함수 레이어: DOM 없이 채점 결과(payload v2)를 만든다. node로 단위테스트 가능.
function conceptFromSrc(src){
  return String(src||"").replace(/^\s*\d{4}-\d{2}-\d{2}\s*/,"").replace(/\s*\(재도전\)\s*$/,"").trim();
}
function buildPayload(questions, sel, quizDate, nowIso, schemaVersion){
  let score = 0; const results = [], wrong = [];
  questions.forEach((item, qi)=>{
    const isCorrect = sel[qi] === item.answer;
    if(isCorrect) score++;
    const ck = item.conceptKey || conceptFromSrc(item.src);
    const isRetry = !!item.retryOf || /\(재도전\)/.test(item.src||"") || String(item.q||"").indexOf("🔁") >= 0;
    const base = {
      id: quizDate + "-q" + (qi+1), cat: item.cat, type: item.type, q: item.q,
      options: item.opts, myAnswer: item.opts[sel[qi]], correct: item.opts[item.answer],
      expl: item.expl, src: item.src
    };
    const r = Object.assign({}, base, {
      conceptKey: ck,
      retryOf: isRetry ? (item.retryOf || ck) : null,
      correctAnswered: isCorrect
    });
    if(item.calc) r.calc = item.calc;
    results.push(r);
    if(!isCorrect) wrong.push(base);   // v1 하위호환 필드 (기존 수거 파이프라인용)
  });
  return { score: score, wrong: wrong, payload: {
    schemaVersion: schemaVersion, subject: "공인중개사", date: quizDate, quizId: quizDate,
    score: score, total: questions.length, wrongCount: wrong.length,
    results: results, wrong: wrong, generatedAt: nowIso
  }};
}
/*__BUILD_PAYLOAD_END__*/

const form = document.getElementById('quiz');
const selected = new Array(QUESTIONS.length).fill(null);
let graded = false;
let LAST_PAYLOAD = null;
let lastCat = null;

document.getElementById('total').textContent = ' / ' + QUESTIONS.length;

QUESTIONS.forEach((item, qi)=>{
  if(item.cat !== lastCat){
    const s = document.createElement('div');
    s.className = 'sec';
    s.textContent = '▍' + item.cat;
    form.appendChild(s);
    lastCat = item.cat;
  }
  const card = document.createElement('div');
  card.className = 'q';
  const isOX = item.type === 'OX';
  card.innerHTML = `
    <div class="qhead">
      <span class="qno">${qi+1}</span>
      <span class="qtype">${item.type}</span>
      <span class="qcat">${item.cat}</span>
    </div>
    <div class="qtext">${item.q}</div>
    <div class="opts ${isOX?'ox':''}" data-q="${qi}"></div>
    <div class="expl" id="expl-${qi}"></div>`;
  const optsEl = card.querySelector('.opts');
  item.opts.forEach((o, oi)=>{
    const el = document.createElement('div');
    el.className = 'opt';
    el.dataset.q = qi; el.dataset.o = oi;
    el.innerHTML = isOX
      ? `<span>${o}</span>`
      : `<span class="mk">${String.fromCharCode(65+oi)}</span><span>${o}</span>`;
    el.addEventListener('click', ()=>{
      if(graded) return;
      selected[qi] = oi;
      optsEl.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
      el.classList.add('sel');
      updateProgress();
    });
    // 눈동자(👁) 소거 버튼 — 확실히 아닌 보기를 희미하게(다시 누르면 복구). 채점·선택·저장에 영향 없음.
    if(!isOX){
      const eye = document.createElement('button');
      eye.type = 'button';
      eye.className = 'eye';
      eye.textContent = '👁';
      eye.title = '확실히 아닌 보기 희미하게 (다시 누르면 복구)';
      eye.setAttribute('aria-label', '이 보기를 후보에서 제외');
      eye.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        if(graded) return;
        el.classList.toggle('ruled');
      });
      el.appendChild(eye);
    }
    optsEl.appendChild(el);
  });
  form.appendChild(card);
});

function updateProgress(){
  const done = selected.filter(s=>s!==null).length;
  document.getElementById('pcount').textContent = `${done} / ${QUESTIONS.length} 선택`;
  document.getElementById('pbar').style.width = (done/QUESTIONS.length*100)+'%';
  document.getElementById('submitBtn').disabled = done !== QUESTIONS.length;
}

const btn = document.getElementById('submitBtn');
btn.addEventListener('click', ()=>{ if(!graded){ grade(); } else { location.reload(); } });

document.getElementById('copyBtn').addEventListener('click', ()=>{
  if(!LAST_PAYLOAD) return;
  const txt = JSON.stringify(LAST_PAYLOAD, null, 2);
  const done = ()=>{ document.getElementById('dlnote').textContent = "📋 복사 완료 — velog-posts/공인중개사/claude_ox_오답/_inbox/에 붙여넣어 저장해도 된다"; };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt, done));
  } else { fallbackCopy(txt, done); }
});
function fallbackCopy(txt, done){
  const ta = document.createElement('textarea');
  ta.value = txt; document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){}
  ta.remove();
}

function grade(){
  graded = true;
  const built = buildPayload(QUESTIONS, selected, QUIZ_DATE, new Date().toISOString(), SCHEMA_VERSION);
  LAST_PAYLOAD = built.payload;
  QUESTIONS.forEach((item, qi)=>{
    const opts = document.querySelectorAll(`.opt[data-q="${qi}"]`);
    opts.forEach((el, oi)=>{
      el.style.cursor='default';
      el.classList.remove('ruled');           // 채점 시 소거 표시 해제(정답이 희미하게 남지 않도록)
      const eye = el.querySelector('.eye');    // 눈동자 버튼 제거 — 채점 후엔 불필요
      if(eye) eye.remove();
      if(oi === item.answer) el.classList.add('correct');
      if(oi === selected[qi] && oi !== item.answer) el.classList.add('wrong');
    });
    const correct = selected[qi] === item.answer;
    const ex = document.getElementById('expl-'+qi);
    ex.innerHTML = `<span class="verdict" style="color:${correct?'var(--ok)':'var(--no)'}">${correct?'정답!':'오답'}</span>${item.expl}<span class="src">📄 출처: ${item.src}</span>`;
    ex.classList.add('show');
  });
  const r = document.getElementById('result');
  document.getElementById('score').textContent = built.score;
  document.getElementById('rmsg').textContent = msgFor(built.score);
  r.classList.add('show');
  btn.textContent = '🔄 다시 풀기';
  btn.classList.add('retry');
  document.getElementById('copyBtn').classList.add('show');

  // 결과 자동 다운로드 (월요일 수거·원장 갱신이 읽는 파일)
  downloadResult(built.payload);

  r.scrollIntoView({behavior:'smooth', block:'center'});
}

function downloadResult(payload){
  try{
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `공인중개사_오답_${QUIZ_DATE}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1500);
    document.getElementById('dlnote').textContent =
      payload.wrongCount>0 ? `💾 결과 저장됨(오답 ${payload.wrongCount}개) — 다운로드 폴더 확인` : "💾 만점 기록 저장됨";
  }catch(e){
    document.getElementById('dlnote').textContent = "⚠️ 자동 저장 실패 — 아래 '결과 JSON 복사'를 눌러 수동 저장";
  }
}

function msgFor(s){
  const t = QUESTIONS.length;
  const r = s/t;
  if(s===t)   return "만점. 오늘 등록증 발급해도 되겠는데요? 🏆";
  if(r>=0.8)  return "합격권. 틀린 거 해설만 한 번 더 보면 완벽합니다.";
  if(r>=0.6)  return "절반은 넘었어요. 오답 노트행 직행하는 개념들이 보이네요.";
  if(r>=0.4)  return "아직 흔들리는 개념이 있어요. 해설 정독하고 내일 재도전!";
  return "괜찮아요, 회독이 쌓이면 올라갑니다. 해설부터 차근차근.";
}
