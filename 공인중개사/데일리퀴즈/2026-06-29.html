<head>

<title>📚 데일리 문제지 · 2026-06-29</title>
<style>
  :root{
    --bg:#0f1115; --card:#191c23; --card2:#20242d; --line:#2c313b;
    --txt:#e7e9ee; --sub:#9aa3b2; --accent:#ffd24a; --accent2:#7c9cff;
    --ok:#34d399; --no:#f87171; --okbg:#10261d; --nobg:#2a1414;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:'Pretendard','Apple SD Gothic Neo',system-ui,-apple-system,sans-serif;
    line-height:1.65;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:32px 20px 80px}
  header{margin-bottom:24px}
  .eyebrow{color:var(--accent);font-weight:700;font-size:14px;letter-spacing:.04em}
  h1{font-size:28px;margin:6px 0 4px;font-weight:800}
  .meta{color:var(--sub);font-size:14px}
  .tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px}
  .tag{background:var(--card2);border:1px solid var(--line);color:var(--sub);
    padding:4px 11px;border-radius:999px;font-size:12.5px;font-weight:600}
  .bar{position:sticky;top:0;z-index:5;background:rgba(15,17,21,.88);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:12px 0;margin:18px 0 24px}
  .progress{height:8px;background:var(--card2);border-radius:999px;overflow:hidden}
  .progress>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));
    border-radius:999px;transition:width .35s ease}
  .pmeta{display:flex;justify-content:space-between;font-size:12.5px;color:var(--sub);margin-bottom:7px}
  .sec{font-size:13px;font-weight:800;color:var(--accent2);margin:26px 0 10px;letter-spacing:.02em;
    border-top:1px dashed var(--line);padding-top:18px}
  .sec:first-of-type{border-top:none;padding-top:0}
  .q{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px 18px 16px;margin-bottom:14px}
  .qhead{display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .qno{background:var(--accent);color:#1a1a1a;font-weight:800;font-size:13px;
    width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex:0 0 auto}
  .qtype{font-size:11.5px;font-weight:700;color:var(--accent2);border:1px solid var(--accent2);
    padding:1px 8px;border-radius:999px}
  .qcat{font-size:12px;color:var(--sub);margin-left:auto}
  .qtext{font-size:16px;font-weight:600;margin:2px 0 14px}
  .opts{display:flex;flex-direction:column;gap:8px}
  .opt{display:flex;align-items:center;gap:11px;padding:11px 13px;border:1px solid var(--line);
    border-radius:11px;cursor:pointer;background:var(--card2);transition:.15s;user-select:none}
  .opt:hover{border-color:var(--accent2)}
  .opt.sel{border-color:var(--accent);background:#26261a}
  .opt .mk{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;
    display:grid;place-items:center;font-size:12px;font-weight:800}
  .opt.sel .mk{border-color:var(--accent);background:var(--accent);color:#1a1a1a}
  .ox{flex-direction:row;gap:10px}
  .ox .opt{flex:1;justify-content:center;font-size:18px;font-weight:800}
  .opt.correct{border-color:var(--ok);background:var(--okbg)}
  .opt.correct .mk{border-color:var(--ok);background:var(--ok);color:#06281c}
  .opt.wrong{border-color:var(--no);background:var(--nobg)}
  .opt.wrong .mk{border-color:var(--no);background:var(--no);color:#2a0d0d}
  .expl{margin-top:12px;padding:12px 14px;border-radius:11px;background:var(--card2);
    border-left:3px solid var(--accent2);font-size:13.5px;color:#d4d9e2;display:none}
  .expl.show{display:block;animation:fade .3s ease}
  .expl .verdict{font-weight:800;margin-right:6px}
  .expl .src{display:block;margin-top:7px;color:var(--sub);font-size:12px}
  @keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .submit{width:100%;padding:16px;border:none;border-radius:14px;font-size:17px;font-weight:800;
    background:linear-gradient(90deg,var(--accent),#ffb347);color:#1a1a1a;cursor:pointer;margin-top:10px}
  .submit:disabled{opacity:.45;cursor:not-allowed}
  .submit.retry{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
  #result{display:none;text-align:center;background:var(--card);border:1px solid var(--line);
    border-radius:18px;padding:28px 20px;margin-bottom:18px}
  #result.show{display:block;animation:fade .4s ease}
  .ring{font-size:46px;font-weight:900;margin:4px 0}
  .ring small{font-size:18px;color:var(--sub);font-weight:700}
  #rmsg{color:var(--sub);font-size:15px;margin-top:4px}
  #dlnote{font-size:12.5px;color:var(--accent);margin-top:12px}
  .foot{text-align:center;margin-top:30px;color:var(--sub);font-size:12.5px;line-height:1.8}
</style>
</head>

const form = document.getElementById('quiz');
const selected = new Array(QUESTIONS.length).fill(null);
let graded = false;
let lastCat = null;

QUESTIONS.forEach((item, qi)=>{
  if(item.cat !== lastCat){
    const s = document.createElement('div');
    s.className = 'sec';
    s.textContent = '▍' + item.cat;
    form.appendChild(s);
    lastCat = item.cat;
  }
  const card = document.createElement('div');
  card.className = 'q';
  const isOX = item.type === 'OX';
  card.innerHTML = `
    <div class="qhead">
      <span class="qno">${qi+1}</span>
      <span class="qtype">${item.type}</span>
      <span class="qcat">${item.cat}</span>
    </div>
    <div class="qtext">${item.q}</div>
    <div class="opts ${isOX?'ox':''}" data-q="${qi}"></div>
    <div class="expl" id="expl-${qi}"></div>`;
  const optsEl = card.querySelector('.opts');
  item.opts.forEach((o, oi)=>{
    const el = document.createElement('div');
    el.className = 'opt';
    el.dataset.q = qi; el.dataset.o = oi;
    el.innerHTML = isOX
      ? `<span>${o}</span>`
      : `<span class="mk">${String.fromCharCode(65+oi)}</span><span>${o}</span>`;
    el.addEventListener('click', ()=>{
      if(graded) return;
      selected[qi] = oi;
      optsEl.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
      el.classList.add('sel');
      updateProgress();
    });
    optsEl.appendChild(el);
  });
  form.appendChild(card);
});

function updateProgress(){
  const done = selected.filter(s=>s!==null).length;
  document.getElementById('pcount').textContent = `${done} / ${QUESTIONS.length} 선택`;
  document.getElementById('pbar').style.width = (done/QUESTIONS.length*100)+'%';
  document.getElementById('submitBtn').disabled = done !== QUESTIONS.length;
}

const btn = document.getElementById('submitBtn');
btn.addEventListener('click', ()=>{ if(!graded){ grade(); } else { location.reload(); } });

function grade(){
  graded = true;
  let score = 0;
  const wrong = [];
  QUESTIONS.forEach((item, qi)=>{
    const opts = document.querySelectorAll(`.opt[data-q="${qi}"]`);
    opts.forEach((el, oi)=>{
      el.style.cursor='default';
      if(oi === item.answer) el.classList.add('correct');
      if(oi === selected[qi] && oi !== item.answer) el.classList.add('wrong');
    });
    const correct = selected[qi] === item.answer;
    if(correct){ score++; }
    else {
      wrong.push({
        id: `${QUIZ_DATE}-q${qi+1}`, cat:item.cat, type:item.type, q:item.q,
        options:item.opts, myAnswer:item.opts[selected[qi]], correct:item.opts[item.answer],
        expl:item.expl, src:item.src
      });
    }
    const ex = document.getElementById('expl-'+qi);
    ex.innerHTML = `<span class="verdict" style="color:${correct?'var(--ok)':'var(--no)'}">${correct?'정답!':'오답'}</span>${item.expl}<span class="src">📄 출처: ${item.src}</span>`;
    ex.classList.add('show');
  });
  const r = document.getElementById('result');
  document.getElementById('score').textContent = score;
  document.getElementById('rmsg').textContent = msgFor(score);
  r.classList.add('show');
  btn.textContent = '🔄 다시 풀기';
  btn.classList.add('retry');

  // 결과 자동 다운로드 (월요일 오답 수거 작업이 읽는 파일)
  downloadResult(score, wrong);

  r.scrollIntoView({behavior:'smooth', block:'center'});
}

function downloadResult(score, wrong){
  const payload = {
    subject:"공인중개사", date:QUIZ_DATE,
    score:score, total:QUESTIONS.length, wrongCount:wrong.length,
    wrong:wrong, generatedAt:new Date().toISOString()
  };
  try{
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `공인중개사_오답_${QUIZ_DATE}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1500);
    document.getElementById('dlnote').textContent =
      wrong.length>0 ? `💾 오답 ${wrong.length}개 저장됨 — 다운로드 폴더 확인` : "💾 만점 기록 저장됨";
  }catch(e){
    document.getElementById('dlnote').textContent = "⚠️ 자동 저장 실패 — 브라우저에서 직접 열어 풀어주세요";
  }
}

function msgFor(s){
  const t = QUESTIONS.length;
  const r = s/t;
  if(s===t)   return "만점. 오늘 등록증 발급해도 되겠는데요? 🏆";
  if(r>=0.8)  return "합격권. 틀린 거 해설만 한 번 더 보면 완벽합니다.";
  if(r>=0.6)  return "절반은 넘었어요. 오답 노트행 직행하는 개념들이 보이네요.";
  if(r>=0.4)  return "아직 흔들리는 개념이 있어요. 해설 정독하고 내일 재도전!";
  return "괜찮아요, 회독이 쌓이면 올라갑니다. 해설부터 차근차근.";
}
