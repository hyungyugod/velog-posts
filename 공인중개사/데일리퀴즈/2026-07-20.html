const QUESTIONS = [
/*__QUESTIONS_START__*/
  {"type":"일반","cat":"부동산공법","q":"🔁 국토의 계획 및 이용에 관한 법률상 개발행위허가의 제한에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["녹지지역으로서 수목이 집단적으로 자라고 있어 환경보전에 필요한 지역은 개발행위허가를 제한할 수 있다.","개발행위허가를 제한하려면 원칙적으로 중앙 또는 지방도시계획위원회의 심의를 거쳐야 한다.","제한기간을 연장하려는 경우에는 최초 제한과 마찬가지로 다시 도시계획위원회의 심의를 거쳐야 한다.","기반시설부담구역으로 지정된 지역은 최장 5년까지 개발행위허가를 제한할 수 있다."],"answer":2,"expl":"제한을 연장할 때는 최초 지정 시 이미 심의를 거쳤으므로 도시계획위원회 심의를 다시 받지 않는다. 동일 사안의 반복 심의를 피하려는 것이다. 제한 지정에는 심의가 필요하다는 점과 뒤섞어 연장에도 심의가 필요한 것처럼 꾸민 것이 함정이다.","src":"2026-07-16 부동산공법 1-1 개발행위허가 제한 (재도전)","conceptKey":"부동산공법 개발행위허가 제한","retryOf":"부동산공법 개발행위허가 제한"},
  {"type":"일반","cat":"부동산공법","q":"🔁 국토의 계획 및 이용에 관한 법률상 공간재구조화계획에 관한 설명으로 옳은 것은?","opts":["도시혁신구역과 복합용도구역은 공간재구조화계획이 아니라 도시·군관리계획으로 결정한다.","주민이 공간재구조화계획 입안을 제안할 때 동의요건을 산정하면서 국공유지는 제외한다.","공간재구조화계획의 결정권자에는 대도시 시장도 당연히 포함된다.","도시혁신구역·복합용도구역은 도시·군관리계획으로도 중복하여 지정할 수 있다."],"answer":1,"expl":"공간재구조화계획은 주민제안이므로 순수 사유지 동의만 따져 국공유지를 동의요건 산정에서 제외한다. 주민 스스로 제안하는 계획의 성격을 반영한 것이다. 도시혁신·복합용도구역을 관리계획으로 결정한다고 뒤집거나 결정권자에 대도시 시장을 끼워 넣는 것이 함정이다.","src":"2026-07-14 부동산공법 5-1 공간재구조화 주민제안 (재도전)","conceptKey":"부동산공법 공간재구조화계획","retryOf":"부동산공법 공간재구조화계획"},
  {"type":"계산","cat":"부동산공법","q":"주민이 도시·군관리계획으로 산업·유통개발진흥지구의 지정을 제안하려 한다. 대상지역 전체면적이 30,000㎡일 때 지정요건을 충족하기 위해 계획관리지역이 차지해야 하는 최소 면적은? (다른 조건은 동일)<br>· 계획관리지역 비율 요건: 전체면적의 100분의 50 이상","opts":["6,000㎡","9,000㎡","12,000㎡","15,000㎡"],"answer":3,"expl":"계획관리지역은 전체면적의 50% 이상이어야 하므로 30,000㎡ × 0.5 = 15,000㎡가 최소면적이다. 난개발이 쉬운 계획관리지역을 중심으로만 진흥지구를 열어주려는 취지다. 30% 등 다른 비율을 적용해 최소면적을 낮추는 것이 함정이다.","src":"2026-07-14 부동산공법 4-1 산업·유통개발진흥지구 요건","conceptKey":"부동산공법 4-1 진흥지구 계획관리 비율","calc":{"expr":"30000*0.5","expected":15000}},
  {"type":"조합","cat":"부동산공법","q":"농지법령상 농업인에 해당하는 자를 모두 고른 것은?<br>ㄱ. 1,000㎡ 이상의 농지에서 농작물을 경작하며 1년 중 90일 이상 농업에 종사하는 자<br>ㄴ. 농지에 330㎡ 이상의 비닐하우스를 설치하여 농작물을 재배하는 자<br>ㄷ. 대가축 2두를 사육하는 자<br>ㄹ. 농업경영을 통한 농산물의 연간 판매액이 100만원인 자","opts":["ㄱ, ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"answer":0,"expl":"1,000㎡ 이상 경작·90일 종사, 330㎡ 이상 비닐하우스 재배, 대가축 2두 사육은 모두 농업인 요건을 충족한다. 일정 규모 이상 영농에 종사해야 농업인으로 인정하기 때문이다. 판매액은 120만원 이상이어야 하므로 100만원(ㄹ)을 끼워 전부 정답처럼 보이게 한 것이 함정이다.","src":"2026-07-16 부동산공법 6-1 농업인 요건","conceptKey":"부동산공법 6-1 농업인 요건"},
  {"type":"사례","cat":"부동산공법","q":"갑은 무주택자들과 함께 지역주택조합을 설립하여 아파트를 건설하려 한다. 주택법령상 이에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["설립인가를 받은 후 조합원을 추가모집하려면 주택조합의 변경인가를 받아야 한다.","추가모집되는 조합원의 자격요건 충족 여부는 해당 조합의 설립인가 신청일을 기준으로 판단한다.","지역주택조합은 설립인가를 받은 날부터 5년 이내에 사업계획승인을 신청하면 된다.","주택조합은 주택건설예정 세대수의 50% 이상의 조합원으로 구성하되 조합원은 20명 이상이어야 한다."],"answer":2,"expl":"지역주택조합은 설립인가일부터 2년 이내에 사업계획승인을 신청해야 한다. 조합 결성 후 사업을 방치하지 못하도록 기한을 둔 것이다. 사업계획승인 후 5년 이내 착공 기한과 뒤섞어 신청기한 2년을 5년으로 늘려 놓은 것이 함정이다.","src":"2026-07-16 부동산공법 5-2 주택조합","conceptKey":"부동산공법 5-2 지역주택조합 사업계획승인"},
  {"type":"일반","cat":"부동산공법","q":"국토의 계획 및 이용에 관한 법률령상 용도지역의 세분에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["전용주거지역은 양호한 주거환경을 보호하기 위하여 지정한다.","준주거지역은 주거기능을 위주로 이를 지원하는 공업기능을 보완하기 위하여 지정한다.","일반공업지역은 환경을 저해하지 아니하는 공업의 배치를 위하여 지정한다.","일반주거지역은 편리한 주거환경을 조성하기 위하여 지정한다."],"answer":1,"expl":"준주거지역은 주거기능 위주로 상업·업무기능을 보완하는 지역이지 공업기능을 채우는 곳이 아니다. 주거의 쾌적성을 해치지 않는 범위에서 상업·업무를 섞으려는 취지다. '지원하는 공업기능'으로 바꿔 준공업지역 성격을 슬쩍 끼워 넣은 것이 함정이다.","src":"2026-07-14 부동산공법 6-1 용도지역 세분","conceptKey":"부동산공법 6-1 용도지역 세분 정의"},
  {"type":"계산","cat":"부동산공법","q":"어느 지역의 용적률 최대한도가 300%이다. 이 지역을 개발밀도관리구역으로 지정할 때 국토의 계획 및 이용에 관한 법률령상 강화할 수 있는 용적률의 최대 범위(퍼센트포인트)는? (다른 조건은 동일)<br>· 개발밀도관리구역: 해당 용도지역 용적률 최대한도의 100분의 50 범위에서 강화","opts":["50퍼센트포인트","100퍼센트포인트","120퍼센트포인트","150퍼센트포인트"],"answer":3,"expl":"개발밀도관리구역은 용적률 최대한도의 50% 범위에서 강화하므로 300% × 0.5 = 150퍼센트포인트까지 강화(하향)할 수 있다. 기반시설이 부족한 곳의 개발밀도를 낮추려는 장치다. 건폐율까지 강화된다거나 비율을 다르게 적용해 범위를 줄이는 것이 함정이다.","src":"2026-07-14 부동산공법 7-1 개발밀도관리구역","conceptKey":"부동산공법 7-1 개발밀도 용적률 강화","calc":{"expr":"300*0.5","expected":150}},
  {"type":"조합","cat":"민법","q":"민법 제103조의 반사회질서의 법률행위에 해당하는 것을 모두 고른 것은? (다툼이 있으면 판례에 따름)<br>ㄱ. 소송에서 사실대로 증언하는 대가로 통상 용인되는 수준을 훨씬 초과하는 급부를 받기로 한 약정<br>ㄴ. 명의수탁자가 신탁부동산을 처분하면서 그 상대방인 제3자가 배임행위에 적극 가담한 경우<br>ㄷ. 도박채무 변제를 위해 부동산 처분을 위임받은 도박채권자가 이를 모르는 제3자와 체결한 매매계약<br>ㄹ. 강제집행을 면할 목적으로 부동산에 허위의 근저당권을 설정한 행위","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄹ","ㄱ, ㄴ, ㄹ"],"answer":0,"expl":"통상 수준을 초과한 증언 대가 약정과 제3자가 적극 가담한 명의신탁 부동산 처분은 반사회질서 행위다. 사법질서의 근간을 해칠 정도에 이르렀는지로 가른다. 도박채권자와 선의의 제3자 간 매매(ㄷ), 강제집행 면탈용 허위 근저당(ㄹ)은 반사회가 아니거나 통정허위 문제여서 함정이다.","src":"2026-07-13 민법 1 반사회질서 법률행위","conceptKey":"민법 1 반사회질서 해당 여부"},
  {"type":"일반","cat":"민법","q":"민법상 진의 아닌 의사표시(제107조)와 착오(제109조)에 관한 설명으로 <b>옳지 않은</b> 것은? (다툼이 있으면 판례에 따름)","opts":["타인에게 대출을 받게 할 목적으로 자신의 명의를 빌려준 자의 의사표시는 비진의표시가 아니다.","표의자가 의사와 표시의 불일치를 알지 못하고 표시하였다면 이는 비진의표시가 아니라 착오의 문제이다.","표의자가 진의와 표시의 불일치를 알지 못한 데 과실이 있는지 여부는 비진의표시의 성립에 결정적이다.","법률에 관한 착오도 법률행위 내용의 중요부분에 관한 것이면 취소할 수 있다."],"answer":2,"expl":"비진의표시는 표의자가 불일치를 '알고' 해야 성립하므로, 알지 못했다면 곧 착오의 문제이고 그 부지에 과실이 있었는지는 비진의 성립과 무관하다. 인식 유무라는 한 축으로 두 제도를 가른 것이다. 과실 여부가 비진의 성립을 좌우한다고 꾸며 착오 판단기준을 끌어온 것이 함정이다.","src":"2026-07-13 민법 3 비진의표시","conceptKey":"민법 3 비진의와 착오 구별"},
  {"type":"조합","cat":"민법","q":"통정허위표시의 무효로 대항할 수 없는 제108조 제2항의 '제3자'에 해당하는 자를 모두 고른 것은? (다툼이 있으면 판례에 따름)<br>ㄱ. 가장매매의 매수인으로부터 그 목적부동산을 다시 매수하여 이전등기를 마친 자<br>ㄴ. 가장매수인에 대한 파산선고로 선임된 파산관재인<br>ㄷ. 가장양수인으로부터 추심을 위하여 채권을 양수한 자<br>ㄹ. 가장매수인 명의 부동산에 저당권을 설정받은 자","opts":["ㄱ, ㄷ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ"],"answer":3,"expl":"새로 이해관계를 맺은 전득자(ㄱ), 총파산채권자 기준으로 선의가 인정되는 파산관재인(ㄴ), 저당권을 취득한 자(ㄹ)는 보호되는 제3자다. 가장된 외형을 신뢰해 독립한 법률상 이해관계를 쌓았는지가 기준이다. 단순 추심을 위해 채권을 넘겨받은 자(ㄷ)는 새 이해관계가 없어 제3자가 아닌데 끼워 넣은 것이 함정이다.","src":"2026-07-13 민법 5 제108조 제2항 제3자","conceptKey":"민법 5 통정허위 제3자 범위"},
  {"type":"사례","cat":"민법","q":"갑은 채권자들의 강제집행을 피하려고 을과 통정하여 자신의 X부동산을 을에게 가장매도하고 이전등기를 마쳤다. 이에 관한 설명으로 <b>옳지 않은</b> 것은? (다툼이 있으면 판례에 따름)","opts":["갑과 을의 매매는 통정허위표시로서 무효이다.","을로부터 X부동산을 매수한 병이 통정 사실을 알고 있었더라도 병은 유효하게 소유권을 취득한다.","병이 악의인 경우 갑의 채권자는 갑을 대위하여 병에게 등기말소를 청구할 수 있다.","가장매매의 당사자인 갑과 을 사이에서는 물론 그들의 포괄승계인에 대해서도 언제든지 그 매매의 무효를 주장할 수 있다."],"answer":1,"expl":"통정허위표시로 무효인 경우 가장매수인에게서 매수한 제3자가 악의이면 소유권을 취득하지 못하고, 이때 가장매도인의 채권자는 그를 대위하여 악의의 제3자에게 말소를 청구할 수 있다. 제108조 제2항은 선의의 제3자만 보호하기 때문이다. 악의의 제3자도 유효하게 취득한다고 뒤집은 것이 함정이다.","src":"2026-07-13 민법 5 악의의 제3자","conceptKey":"민법 5 악의 제3자 대위말소"},
  {"type":"일반","cat":"민법","q":"민법상 착오에 의한 의사표시(제109조)에 관한 설명으로 옳은 것은? (다툼이 있으면 판례에 따름)","opts":["적법하게 착오를 이유로 의사표시를 취소한 자는 그로 인해 손해를 입은 상대방에게 불법행위 손해배상책임을 지지 않는다.","표의자에게 중대한 과실이 있다는 점은 취소를 주장하는 표의자 자신이 증명하여야 한다.","동기의 착오는 그 동기가 상대방에게 표시되었더라도 취소의 대상이 될 수 없다.","법률에 관한 착오는 사실에 관한 착오와 달리 그 내용이 법률행위의 중요부분에 해당하더라도 결코 취소의 대상이 될 수 없다."],"answer":0,"expl":"착오취소는 법이 부여한 적법한 권리행사이므로 표의자는 취소로 손해를 입은 상대방에게 불법행위 손해배상책임을 지지 않는다. 정당한 취소권 행사에 위법성을 인정할 수 없기 때문이다. 중과실 입증책임을 표의자에게 지우거나 법률·동기의 착오 취소를 일률 부정하는 것이 함정이다.","src":"2026-07-13 민법 6 착오의 효과","conceptKey":"민법 6 착오 취소 효과·입증"},
  {"type":"OX","cat":"민법","q":"채권자취소권은 특정물채권을 보전하기 위해서도 행사할 수 있으므로, 부동산 이중매매에서 제1매수인은 채권자취소권을 행사할 수 있다. (O/X)","opts":["O","X"],"answer":1,"expl":"X. 채권자취소권은 책임재산 보전을 위한 금전채권에 대해서만 행사할 수 있어, 특정물채권자인 이중매매의 제1매수인은 이를 행사할 수 없다. 총채권자의 공동담보를 지키려는 제도이기 때문이다. 통정허위표시에서는 채권자취소가 가능하다는 점과 뒤섞는 것이 함정이다.","src":"2026-07-13 민법 1 채권자취소권","conceptKey":"민법 1 채권자취소권 대상"},
  {"type":"일반","cat":"민법","q":"부동산 명의신탁과 무효인 등기에 관한 설명으로 <b>옳지 않은</b> 것은? (다툼이 있으면 판례에 따름)","opts":["명의수탁자가 신탁부동산을 제3자에게 처분한 경우 그 제3자가 수탁자의 배임행위에 적극 가담하였다면 그 처분은 반사회질서 행위로서 무효이다.","원인이 무효인 등기에 기초하여 순차로 이루어진 등기들은 등기의 공신력이 인정되지 않아 원칙적으로 모두 무효이다.","명의수탁자가 신탁부동산을 처분한 경우 제3자는 그 배임행위에 적극 가담하지 않았더라도 언제나 소유권을 취득하지 못한다.","무효인 법률행위에 기한 등기라도 실체적 권리관계에 부합하면 유효한 등기가 될 수 있다."],"answer":2,"expl":"명의수탁자의 처분에서 제3자가 배임행위에 적극 가담하지 않았다면 그 처분은 반사회질서에 이르지 않아 제3자는 유효하게 소유권을 취득할 수 있다. 무효의 상대성으로 거래안전을 보호하기 때문이다. 적극 가담 여부를 따지지 않고 언제나 취득하지 못한다고 단정한 것이 함정이다.","src":"2026-07-13 민법 1 명의신탁 부동산 처분","conceptKey":"민법 1 명의신탁 처분 제3자"},
  {"type":"일반","cat":"공인중개사법","q":"🔁 공인중개사법령상 중개보수와 업무보증에 관한 설명으로 옳은 것은?","opts":["다른 법률의 규정에 따라 부동산 중개업을 할 수 있는 법인이 중개업을 하려는 경우에는 업무보증을 2천만원 이상 설정하면 된다.","중개보수의 지급시기는 당사자 간 약정이 없으면 중개대상물의 권리이전등기가 완료된 때로 한다.","개업공인중개사는 중개가 완성되지 않아도 중개행위에 소요된 실비를 언제나 보수로 청구할 수 있다.","법인인 개업공인중개사의 업무보증 설정금액은 사무소 소재지의 인구나 거래규모와 관계없이 전국 어디에서나 일률적으로 2억원 이상이어야 한다."],"answer":0,"expl":"다른 법률에 따라 중개업을 겸하는 법인은 업무보증을 2천만원 이상만 설정하면 된다. 이미 다른 법령의 규율을 받으므로 보증 부담을 낮춰 준 것이다. 법인 개공의 원칙적 보증금액이나 보수 지급시기를 등기완료일로 바꾸는 것이 함정이다.","src":"2026-07-15 공인중개사법 1-6 업무보증 (재도전)","conceptKey":"공인중개사법 §1 중개보수·업무보증","retryOf":"공인중개사법 §1 중개보수·업무보증"},
  {"type":"일반","cat":"공인중개사법","q":"공인중개사법령상 중개대상물에 관한 설명으로 <b>옳지 않은</b> 것은? (다툼이 있으면 판례에 따름)","opts":["주벽이 없는 자동차 세차장 구조물은 민법상 건축물이 아니어서 중개대상물이 아니다.","「입목에 관한 법률」에 따라 소유권보존등기를 받은 수목의 집단은 중개대상물이다.","사권이 소멸된 포락지나 채굴되지 않은 광물은 중개대상물이 아니다.","국유에 속하는 무주의 부동산도 사인 간 거래가 가능하므로 중개대상물이 된다."],"answer":3,"expl":"무주의 부동산은 국유이므로 사인 간 중개의 객체가 될 수 없다. 소유권이 국가에 귀속되어 사적 거래의 대상에서 빠지기 때문이다. '거래가 가능하다'는 식으로 국유라는 성질을 지워 중개대상물로 둔갑시키는 것이 함정이다.","src":"2026-07-15 공인중개사법 1-2 중개대상물","conceptKey":"공인중개사법 1-2 중개대상물 범위"},
  {"type":"조합","cat":"공인중개사법","q":"공인중개사법령상 중개의 대상이 될 수 있는 것을 모두 고른 것은? (다툼이 있으면 판례에 따름)<br>ㄱ. 토지에 설정된 저당권<br>ㄴ. 등기된 환매권의 이전<br>ㄷ. 동산에 성립한 질권<br>ㄹ. 점유권의 취득","opts":["ㄱ, ㄷ","ㄱ, ㄴ","ㄴ, ㄹ","ㄱ, ㄴ, ㄹ"],"answer":1,"expl":"저당권은 중개대상권리에 포함되고, 등기된 환매권의 이전도 중개대상이다. 계약을 통해 부동산에 관하여 취득·이전되는 권리라야 중개의 객체가 되기 때문이다. 동산에 성립하는 질권(ㄷ)과 법률규정으로 취득하는 점유권(ㄹ)을 끼워 넣는 것이 함정이다.","src":"2026-07-15 공인중개사법 1-3 중개대상권리","conceptKey":"공인중개사법 1-3 중개대상권리"},
  {"type":"사례","cat":"공인중개사법","q":"소속공인중개사 을은 개업공인중개사 갑의 중개사무소에서 중개업무를 수행하였다. 공인중개사법령상 이에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["을이 확인·설명서에 서명 및 날인을 하지 않은 경우 을은 자격정지 처분을 받을 수 있다.","갑이 거래계약서에 서명 및 날인을 하지 않은 경우 갑은 업무정지 처분을 받을 수 있다.","갑이 확인·설명서를 교부하지 않은 경우 갑의 업무정지뿐 아니라 을도 자격정지 처분을 받는다.","확인·설명서의 교부·보존 의무 위반은 개업공인중개사의 업무정지 사유에 해당한다."],"answer":2,"expl":"확인·설명서의 교부·보존 위반은 개업공인중개사의 업무정지 사유일 뿐 소속공인중개사의 자격정지 사유는 아니다. 서명·날인 위반과 달리 소속공인중개사의 직접 관여가 전제되지 않기 때문이다. 서명·날인 위반의 이중 제재를 교부·보존 위반에 옮겨 붙인 것이 함정이다.","src":"2026-07-15 공인중개사법 1-8 확인·설명서 위반 제재","conceptKey":"공인중개사법 1-8 교부·보존 위반 제재"},
  {"type":"OX","cat":"공인중개사법","q":"공인중개사 정책심의위원회는 국토교통부에 반드시 두어야 하는 필수기구가 아니라 둘 수 있는 임의기구이며, 위원장 1명을 포함하여 7명 이상 11명 이내로 구성한다. (O/X)","opts":["O","X"],"answer":0,"expl":"O. 정책심의위원회는 국토교통부에 '둘 수 있는' 임의기구이고, 위원장 1명을 포함하여 7명 이상 11명 이내로 구성한다. 상설 심의 수요가 크지 않아 임의기구로 설계한 것이다. '두어야 한다'로 필수기구화하거나 위원장을 정원에서 제외하는 서술이 함정이다.","src":"2026-07-15 공인중개사법 1-4 정책심의위원회","conceptKey":"공인중개사법 1-4 정책심의위원회 구성"},
  {"type":"일반","cat":"공인중개사법","q":"공인중개사법령상 중개사무소 개설등록을 하려는 법인의 등록기준에 관한 설명으로 <b>옳지 않은</b> 것은? (다른 법률의 특례는 고려하지 않음)","opts":["대표자를 제외한 임원 또는 사원의 3분의 1 이상이 공인중개사여야 한다.","대표자를 포함한 임원·사원 전원은 등록신청일 전 1년 이내에 실무교육을 받아야 한다.","「상법」상 회사 또는 협동조합의 형태를 갖추어야 한다.","자본금은 3천만원 이상이면 등록기준을 충족한다."],"answer":3,"expl":"법인의 중개사무소 등록기준상 자본금은 5천만원 이상이어야 하므로 3천만원으로는 부족하다. 일정 규모의 자본을 갖춰 중개업의 안정성을 확보하려는 것이다. 5천만원 기준을 3천만원으로 낮춰 다른 요건 사이에 숨기는 것이 함정이다.","src":"2026-07-15 공인중개사법 1-6 법인 등록기준","conceptKey":"공인중개사법 1-6 법인 등록기준"},
  {"type":"일반","cat":"공인중개사법","q":"부동산 거래신고 등에 관한 법률령상 토지거래허가 및 외국인 등의 부동산 취득에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["군사시설·천연기념물·문화유산 보호구역 등에 해당하지 않는 토지는 외국인의 토지취득 허가 대상이 아니다.","시장·군수가 토지거래허가구역을 지정하려면 관계 기관의 의견을 듣고 지방도시계획위원회의 심의를 거쳐야 한다.","농지에 대하여 토지거래계약 허가를 받은 경우에는 농지취득자격증명을 받은 것으로 본다.","외국인이 부동산 거래신고 등에 관한 법률에 따라 토지취득의 허가를 받은 경우에는 그 토지에 대하여 별도의 토지거래계약 허가를 받지 않아도 된다."],"answer":1,"expl":"토지거래허가구역 지정 시에는 도시계획위원회의 심의를 거치면 되고 별도로 관계기관의 의견을 들을 필요는 없다. 지정의 신속성과 투기억제 실효성을 위해 절차를 간소화한 것이다. 허가구역 지정에 의견청취 절차를 추가로 끼워 넣는 것이 함정이다.","src":"2026-07-21 공인중개사법 토지거래허가·외국인 취득","conceptKey":"공인중개사법 토지거래허가구역 지정절차"},
  {"type":"일반","cat":"부동산세법","q":"지방세법령상 취득세의 취득 개념과 과세대상에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["토지에 관한 취득세는 지적공부에 등록된 토지에만 부과되고 사실상 존재하는 미등록 토지에는 부과되지 않는다.","기부와 같은 무상취득에 대해서도 취득세를 부과한다.","건물에 딸린 급수·배수시설이나 도관시설·에너지 공급시설 등은 그것이 토지에 정착되었는지를 불문하고 취득세 과세대상인 건축물의 범위에 포함된다.","등기된 임차권은 취득세의 과세대상이 아니다."],"answer":0,"expl":"취득세는 지적공부 등록 여부를 가리지 않아 사실상 존재하는 토지에도 부과된다. 실질적 담세력이 있는 취득을 폭넓게 포착하려는 취지다. '등록된 토지에만'이라며 사실상 토지를 과세대상에서 빼내는 것이 함정이다.","src":"2026-07-19 부동산세법 1 취득의 개념과 과세대상","conceptKey":"부동산세법 1 취득세 과세대상 범위"},
  {"type":"조합","cat":"부동산세법","q":"지방세법령상 취득세를 비과세하는 경우를 모두 고른 것은?<br>ㄱ. 국가가 부동산을 취득하는 경우<br>ㄴ. 신탁으로 인한 취득 중 주택조합이 조합원용으로 취득하는 부동산<br>ㄷ. 신탁법에 따른 신탁으로 위탁자로부터 수탁자에게 이전하는 형식적 취득<br>ㄹ. 건축물을 다른 장소로 이전함으로써 이루어지는 취득","opts":["ㄱ, ㄴ","ㄱ, ㄷ","ㄴ, ㄹ","ㄱ, ㄷ, ㄹ"],"answer":1,"expl":"국가의 취득과 위탁자·수탁자 간 형식적 신탁이전은 취득세를 비과세한다. 담세력 없는 형식적 이전이거나 과세권 주체 자신의 취득이기 때문이다. 조합이 개입한 신탁(ㄴ)과 가액증가 없이도 과세되는 건축물 이전(ㄹ)을 비과세로 끼워 넣는 것이 함정이다.","src":"2026-07-19 부동산세법 5 비과세 대상","conceptKey":"부동산세법 5 취득세 비과세"},
  {"type":"계산","cat":"부동산세법","q":"다음 자료로 계산한 무신고가산세는? (부정행위 없음, 다른 조건은 동일)<br>· 취득세 산출세액: 4,000만원<br>· 법정신고기한까지 신고하지 않음<br>· 일반 무신고가산세율: 100분의 20","opts":["200만원","400만원","600만원","800만원"],"answer":3,"expl":"부정행위가 없는 일반 무신고가산세는 산출세액의 20%이므로 4,000만원 × 0.2 = 800만원이다. 신고의무 불이행에 비례한 제재를 가하려는 것이다. 과소신고(10%)나 부정 무신고(40%) 세율과 혼동해 비율을 바꾸는 것이 함정이다.","src":"2026-07-12 부동산세법 3-2 가산세","conceptKey":"부동산세법 3-2 무신고가산세","calc":{"expr":"40000000*0.2","expected":8000000}},
  {"type":"사례","cat":"부동산세법","q":"취득세 납세의무자에 관한 다음 사례 중 옳은 것은? (다른 조건은 동일)","opts":["임차인 갑이 임차한 건물에 엘리베이터를 설치한 경우, 그 엘리베이터에 대한 취득세는 주체구조부의 취득자인 임대인이 아니라 이를 직접 설치한 임차인 갑이 납부한다.","채권자 을이 채무자 소유의 미등기 부동산을 대위등기한 경우, 취득세 납세의무자는 원칙적으로 부동산 소유자인 채무자이다.","감자로 인하여 과점주주가 된 병에게는 그 지분 증가분에 대하여 취득세를 부과한다.","상속인 정이 유증을 받은 경우 이는 상속이 아니라 증여로 보아 취득세를 부과한다."],"answer":1,"expl":"채권자가 채무자의 미등기 부동산을 대위등기하더라도 취득의 실질적 주체는 소유자인 채무자이므로 납세의무자는 채무자다. 형식이 아니라 실질 귀속으로 담세자를 정하기 때문이다. 부속물 설치자(임차인)나 감자 과점주주에게 납세의무를 돌리는 것이 함정이다.","src":"2026-07-19 부동산세법 2 납세의무자","conceptKey":"부동산세법 2 취득세 납세의무자"},
  {"type":"일반","cat":"부동산세법","q":"지방세법령상 취득의 시기에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["점유로 인한 취득의 경우 취득세와 양도소득세 모두 점유를 개시한 날을 취득시기로 본다.","경계의 확정으로 지적공부상 면적이 증가한 경우에는 종전 토지를 취득한 날을 취득시기로 본다.","경계 확정 과정에서 징수한 조정금은 취득가액에 포함하지 않는다.","건축물을 이전하여 취득하는 경우 경제적 가치의 증가가 없더라도 취득세를 부과한다."],"answer":0,"expl":"점유취득의 취득시기는 세목마다 달라 취득세는 등기·등록일을, 양도소득세는 점유 개시일을 기준으로 한다. 등기 중심의 취득세와 실질 보유기간 중심의 양도세가 취지가 다르기 때문이다. 두 세목을 모두 점유개시일로 통일해 버리는 것이 함정이다.","src":"2026-07-19 부동산세법 7 취득의 시기","conceptKey":"부동산세법 7 점유취득 취득시기"},
  {"type":"일반","cat":"부동산세법","q":"지방세법령상 배우자 또는 직계존비속 간 부동산 취득의 유상·무상 구분에 관한 설명으로 옳은 것은?","opts":["배우자 간의 취득은 원칙적으로 유상취득으로 추정한다.","직계존비속 간 부담부증여의 채무액 부분은 언제나 유상취득으로 본다.","배우자 또는 직계존비속의 취득이라도 공매를 통해 취득한 경우에는 유상취득으로 본다.","배우자로부터 대가를 지급하고 취득하면 그 사정만으로 항상 유상승계취득으로 본다."],"answer":2,"expl":"배우자·직계존비속 취득은 원칙적으로 무상추정이지만 파산선고·경공매·대가지급·교환(파경대교)에 해당하면 유상취득으로 본다. 실제 대가관계가 분명한 거래를 증여추정에서 빼주려는 것이다. 부담부증여 채무액을 언제나 유상으로 보거나 대가지급을 무조건 유상으로 단정하는 것이 함정이다.","src":"2026-07-19 부동산세법 3 유상·무상의 구분","conceptKey":"부동산세법 3 배우자·직계존비속 유상무상"},
  {"type":"OX","cat":"부동산세법","q":"취득세의 과세표준을 산정할 때 사실상취득가격에 포함된 부가가치세는 과세표준에 포함하지 않는다. (O/X)","opts":["O","X"],"answer":0,"expl":"O. 취득세 과세표준에는 부가가치세를 포함하지 않는다. 부가가치세는 취득의 대가가 아니라 별도로 거래징수·전가되는 세액이기 때문이다. 부가가치세를 취득가격에 합산하여 과세표준을 부풀리는 서술이 함정이다.","src":"2026-07-19 부동산세법 8 취득세 과세표준","conceptKey":"부동산세법 8 과세표준 부가세 제외"},
  {"type":"일반","cat":"부동산학개론","q":"🔁 주택시장의 여과과정(filtering)과 주거분리에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["상위계층이 사용하던 주택이 하위계층의 사용으로 전환되는 것을 하향여과라 한다.","저소득층 주거지역에서 주택이 개량되어 상위계층의 사용으로 전환되는 것을 상향여과라 한다.","주거분리는 고소득층 주거지역과 저소득층 주거지역이 서로 분리되는 현상을 말한다.","하향여과가 발생하면 저소득층이 사용하는 주택의 전체 양은 감소한다."],"answer":3,"expl":"하향여과가 일어나면 상위계층 주택이 하위계층 몫으로 넘어와 저소득층이 사용하는 주택의 양은 오히려 증가한다. 상위 주택의 노후·가치하락이 하위시장 공급을 늘리기 때문이다. 방향을 뒤집어 저소득층 주택량이 감소한다고 서술한 것이 함정이다.","src":"부동산학개론 여과과정·주거분리 (재도전)","conceptKey":"부동산학개론 §2 여과·주거분리","retryOf":"부동산학개론 §2 여과·주거분리"},
  {"type":"일반","cat":"부동산학개론","q":"🔁 거미집이론(모형)에 관한 설명으로 <b>옳지 않은</b> 것은? (다른 조건은 동일)","opts":["수요의 가격탄력성이 공급의 가격탄력성보다 크면 수렴형이 된다.","수요곡선 기울기의 절댓값이 공급곡선 기울기의 절댓값보다 크면 수렴형이 된다.","공급의 가격탄력성이 수요의 가격탄력성보다 크면 발산형이 된다.","수요와 공급의 가격탄력성이 같으면 순환형이 된다."],"answer":1,"expl":"거미집모형에서 탄력성 기준과 기울기 기준은 반대로 작동하여, 수렴형은 수요탄력성이 공급탄력성보다 크거나 수요곡선 기울기 절댓값이 공급곡선 기울기 절댓값보다 작을 때 나타난다. 기울기가 탄력성의 역수 관계이기 때문이다. 기울기 기준에서 부등호를 탄력성처럼 그대로 둔 것이 함정이다.","src":"부동산학개론 거미집이론 (재도전)","conceptKey":"부동산학개론 §1 거미집이론","retryOf":"부동산학개론 §1 거미집이론"},
  {"type":"계산","cat":"부동산학개론","q":"어느 부동산에 대해 동일한 가격수준에서 각 개별 수요자의 수요량이 아래와 같다. 시장수요곡선을 도출할 때 그 가격수준에서의 시장 전체 수요량은? (다른 조건은 동일)<br>· 수요자 A: 30<br>· 수요자 B: 25<br>· 수요자 C: 15","opts":["23.3","45","70","750"],"answer":2,"expl":"시장수요곡선은 개별수요곡선을 수평으로 합산하므로 같은 가격에서 각자의 수요량을 더한 30+25+15=70이 그 가격의 시장 전체 수요량이다. 동일 가격에서 수량을 합쳐 시장 크기를 구하는 원리다. 수요량을 평균 내거나(23.3) 곱하는(750) 것은 수평합산의 의미를 오해한 함정이다.","src":"2026-07-17 부동산학개론 1-3 시장수요곡선 도출","conceptKey":"부동산학개론 1-3 시장수요곡선 수평합산","calc":{"expr":"30+25+15","expected":70}},
  {"type":"조합","cat":"부동산학개론","q":"부동산학개론상 준부동산(의제부동산)에 해당하는 것을 모두 고른 것은?<br>ㄱ. 등록된 자동차<br>ㄴ. 광업재단<br>ㄷ. 어업권<br>ㄹ. 정원에 임시로 심어 둔 수목","opts":["ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄹ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"answer":0,"expl":"자동차·광업재단·어업권은 부동산처럼 취급되는 준부동산으로 법률적 측면의 구분개념이다. 등기·등록으로 공시되어 부동산에 준하는 취급을 받기 때문이다. 임시로 심어 둔 가식 중인 수목(ㄹ)은 정착물이 아니라 동산이어서 준부동산이 아닌데 끼워 넣은 것이 함정이다.","src":"2026-07-17 부동산학개론 1-4 준부동산","conceptKey":"부동산학개론 1-4 준부동산 범위"},
  {"type":"일반","cat":"부동산학개론","q":"부동산학개론상 토지의 용도 전환에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["택지 내부에서 공업지가 주거지로 전환되고 있는 중간단계의 토지는 이행지이다.","임지지역·농지지역·택지지역 상호 간에 용도가 전환되고 있는 지역의 토지는 후보지이다.","이행지는 용도적 대분류 내부의 소분류 간 전환에서 나타나는 개념이다.","농지지역이 택지지역으로 전환되고 있는 중간단계의 토지는 이행지이다."],"answer":3,"expl":"임지·농지·택지라는 대분류 상호 간에 전환 중인 토지는 이행지가 아니라 후보지다. 소분류 내부 이행은 이행지, 대분류 상호 전환은 후보지로 층위를 나누기 때문이다. 농지→택지 전환을 이행지로 부르며 두 개념을 뒤바꾸는 것이 함정이다.","src":"2026-07-17 부동산학개론 1-6 이행지·후보지","conceptKey":"부동산학개론 1-6 이행지 후보지 구분"},
  {"type":"OX","cat":"부동산학개론","q":"토지의 개별성은 상품의 동질성을 강화하여 부동산시장을 완전경쟁시장에 가깝게 만드는 요인이다. (O/X)","opts":["O","X"],"answer":1,"expl":"X. 토지의 개별성은 상품을 이질적으로 만들어 완전대체를 불가능하게 하므로 부동산시장을 불완전경쟁시장으로 만드는 요인이다. 완전경쟁의 전제인 상품 동질성이 개별성 때문에 깨지기 때문이다. 개별성을 동질성·완전경쟁과 연결해 방향을 뒤집은 것이 함정이다.","src":"2026-07-17 부동산학개론 1-2 개별성과 불완전경쟁시장","conceptKey":"부동산학개론 1-2 개별성 불완전경쟁"},
  {"type":"일반","cat":"부동산공시법","q":"🔁 공간정보관리법령상 지적공부의 등록사항 정정에 관한 설명으로 옳은 것은?","opts":["지적소관청은 어떠한 경우에도 직권으로 등록사항을 정정할 수 없고 반드시 토지소유자의 정정신청과 인접 토지 이해관계인 전원의 동의가 있는 경우에만 정정할 수 있다.","토지소유자에 관한 사항을 정정할 때에는 등기기록이 아니라 지적소관청의 현지조사만으로 정정한다.","등록전환에 따라 지적공부상 면적과 실제 면적의 차이가 허용범위를 초과하면 지적소관청은 직권으로 종전 면적을 등록전환될 면적으로 정정할 수 있다.","등록사항의 정정으로 인접 토지의 경계가 변경되어도 이해관계인의 승낙은 필요하지 않다."],"answer":2,"expl":"등록전환 시 종전 면적과 등록전환될 면적의 차이가 허용범위를 초과하면 지적소관청이 직권으로 종전 면적을 등록전환될 면적으로 정정한다. 오차를 방치하면 공부의 정확성이 무너지기 때문이다. 직권정정을 전면 부정하거나 경계변경에 이해관계인 승낙이 불필요하다고 하는 것이 함정이다.","src":"2026-07-18 부동산공시법 1-5 등록전환 면적 정정 (재도전)","conceptKey":"부동산공시법 §1 등록사항정정","retryOf":"부동산공시법 §1 등록사항정정"},
  {"type":"일반","cat":"부동산공시법","q":"공간정보관리법령상 지적공부의 구성에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["토지대장과 지적도는 서로 다른 필지를 대상으로 별개로 작성되는 것이 원칙이다.","지적공부에 좌표로 등록하는 지역에서는 경계점좌표등록부를 추가로 작성한다.","토지가 공유인 경우에는 공유지연명부를 작성한다.","대장에 딸린 등록부들은 모두 한 필지를 단위로 하여 작성된다."],"answer":0,"expl":"지적공부는 하나의 필지에 대하여 토지대장과 지적도를 함께 갖추는 것이 기본이므로 서로 다른 필지를 대상으로 별개로 작성한다는 서술은 옳지 않다. 대장은 속성정보를, 도면은 경계정보를 같은 필지에 대해 상호 보완하기 때문이다. 대장과 도면을 별개 필지로 떼어놓는 것이 함정이다.","src":"2026-07-18 부동산공시법 1-1 지적공부의 구성","conceptKey":"부동산공시법 1-1 지적공부 구성"},
  {"type":"조합","cat":"부동산공시법","q":"공간정보관리법령상 지목의 판단에 관한 설명으로 옳은 것을 모두 고른 것은?<br>ㄱ. 자갈땅·모래땅·습지·황무지는 잡종지가 아니라 임야로 한다<br>ㄴ. 건축물이 없어도 택지조성공사가 준공된 토지는 대(垈)로 한다<br>ㄷ. 노상주차장과 부설주차장은 지목상 주차장에서 제외한다<br>ㄹ. 골프연습장·실내수영장·체육도장은 체육용지에서 제외한다","opts":["ㄱ, ㄴ","ㄴ, ㄷ, ㄹ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"answer":3,"expl":"암석지·자갈땅·모래땅·습지·황무지는 임야, 택지조성 준공지는 대, 노상·부설주차장 제외, 영속성이 부족한 골프연습장·실내수영장·체육도장 제외까지 모두 옳다. 실제 이용현황과 영속성을 기준으로 지목을 정하기 때문이다. 넷 다 맞는데 하나를 빼 부분조합을 정답처럼 보이게 하는 것이 함정이다.","src":"2026-07-18 부동산공시법 1-4 지목 판단","conceptKey":"부동산공시법 1-4 지목 예외"},
  {"type":"일반","cat":"부동산공시법","q":"공간정보관리법령상 지번의 부여에 관한 설명으로 옳은 것은?","opts":["지번은 지적소관청이 아니라 토지소유자가 지번부여지역별로 부여한다.","주거·사무실 등의 건축물이 있는 필지를 분할하는 경우에는 분할 전의 지번을 우선하여 부여하여야 한다.","합병의 경우에는 소유자의 신청이 있어도 종전 지번을 사용할 수 없다.","신규등록과 등록전환을 하는 지역의 지번부여방법은 축척변경 시행지역이나 지번변경 지역의 지번부여방법과 완전히 동일하다."],"answer":1,"expl":"건축물이 있는 필지를 분할할 때는 분할 전 지번을 우선 부여하여 건물의 주소 연속성을 지킨다. 생활 근거인 건물의 지번이 함부로 바뀌지 않도록 한 것이다. 지번 부여주체를 소유자로 바꾸거나 신규등록·등록전환을 축척변경과 같은 방법으로 묶는 것이 함정이다.","src":"2026-07-18 부동산공시법 1-3 지번 부여","conceptKey":"부동산공시법 1-3 지번 부여방법"},
  {"type":"OX","cat":"부동산공시법","q":"지상경계점등록부에는 경계점의 위치설명 등은 등록되지만 지적기준점의 위치에 관한 사항은 등록되지 않는다. (O/X)","opts":["O","X"],"answer":0,"expl":"O. 지상경계점등록부에는 경계점의 위치설명 등이 등록되지만 지적기준점의 위치는 등록사항이 아니다. 필지 경계를 특정하는 데 필요한 정보만 담도록 한 것이다. 지적기준점 위치까지 등록부에 포함시키는 서술이 함정이다.","src":"2026-07-18 부동산공시법 1-6 지상경계점등록부","conceptKey":"부동산공시법 1-6 지상경계점등록부 등록사항"},
  {"type":"일반","cat":"부동산공시법","q":"공간정보관리법령상 토지의 이동과 지적확정측량에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["토지가 이동된 때에는 토지소유자가 지적소관청에 그 이동을 신청하여야 한다.","지적확정측량을 실시하는 지역은 실질적으로 도시개발사업 등이 시행되는 지역을 말한다.","토지소유자가 토지이동 신청을 하지 않으면 지적소관청은 이를 조사할 수 없고 이동정리를 보류하여야 한다.","지적소관청이 직권으로 토지의 이동을 조사·측량하여 등록하려면 먼저 토지이동현황 조사계획을 수립한 후 그 계획에 따라 조사를 실시하여야 한다."],"answer":2,"expl":"토지소유자가 토지이동을 신청하지 않으면 지적소관청은 직권으로 조사하여 지적공부를 정리하므로 조사할 수 없다는 서술은 옳지 않다. 공부의 현행성을 유지하려면 신청 누락 시 소관청이 보충해야 하기 때문이다. 직권조사 권한을 지워 정리를 보류시키는 것이 함정이다.","src":"2026-07-18 부동산공시법 1-2 토지이동과 직권조사","conceptKey":"부동산공시법 1-2 토지이동 직권조사"}
/*__QUESTIONS_END__*/
];

/*__BUILD_PAYLOAD_START__*/
// ── 순수 함수 레이어: DOM 없이 채점 결과(payload v2)를 만든다. node로 단위테스트 가능.
function conceptFromSrc(src){
  return String(src||"").replace(/^\s*\d{4}-\d{2}-\d{2}\s*/,"").replace(/\s*\(재도전\)\s*$/,"").trim();
}
function buildPayload(questions, sel, quizDate, nowIso, schemaVersion){
  let score = 0; const results = [], wrong = [];
  questions.forEach((item, qi)=>{
    const isCorrect = sel[qi] === item.answer;
    if(isCorrect) score++;
    const ck = item.conceptKey || conceptFromSrc(item.src);
    const isRetry = !!item.retryOf || /\(재도전\)/.test(item.src||"") || String(item.q||"").indexOf("🔁") >= 0;
    const base = {
      id: quizDate + "-q" + (qi+1), cat: item.cat, type: item.type, q: item.q,
      options: item.opts, myAnswer: item.opts[sel[qi]], correct: item.opts[item.answer],
      expl: item.expl, src: item.src
    };
    const r = Object.assign({}, base, {
      conceptKey: ck,
      retryOf: isRetry ? (item.retryOf || ck) : null,
      correctAnswered: isCorrect
    });
    if(item.calc) r.calc = item.calc;
    results.push(r);
    if(!isCorrect) wrong.push(base);   // v1 하위호환 필드 (기존 수거 파이프라인용)
  });
  return { score: score, wrong: wrong, payload: {
    schemaVersion: schemaVersion, subject: "공인중개사", date: quizDate, quizId: quizDate,
    score: score, total: questions.length, wrongCount: wrong.length,
    results: results, wrong: wrong, generatedAt: nowIso
  }};
}
/*__BUILD_PAYLOAD_END__*/

const form = document.getElementById('quiz');
const selected = new Array(QUESTIONS.length).fill(null);
let graded = false;
let LAST_PAYLOAD = null;
let lastCat = null;

document.getElementById('total').textContent = ' / ' + QUESTIONS.length;

QUESTIONS.forEach((item, qi)=>{
  if(item.cat !== lastCat){
    const s = document.createElement('div');
    s.className = 'sec';
    s.textContent = '▍' + item.cat;
    form.appendChild(s);
    lastCat = item.cat;
  }
  const card = document.createElement('div');
  card.className = 'q';
  const isOX = item.type === 'OX';
  card.innerHTML = `
    <div class="qhead">
      <span class="qno">${qi+1}</span>
      <span class="qtype">${item.type}</span>
      <span class="qcat">${item.cat}</span>
    </div>
    <div class="qtext">${item.q}</div>
    <div class="opts ${isOX?'ox':''}" data-q="${qi}"></div>
    <div class="expl" id="expl-${qi}"></div>`;
  const optsEl = card.querySelector('.opts');
  item.opts.forEach((o, oi)=>{
    const el = document.createElement('div');
    el.className = 'opt';
    el.dataset.q = qi; el.dataset.o = oi;
    el.innerHTML = isOX
      ? `<span>${o}</span>`
      : `<span class="mk">${String.fromCharCode(65+oi)}</span><span>${o}</span>`;
    el.addEventListener('click', ()=>{
      if(graded) return;
      selected[qi] = oi;
      optsEl.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
      el.classList.add('sel');
      updateProgress();
    });
    // 눈동자(👁) 소거 버튼 — 확실히 아닌 보기를 희미하게(다시 누르면 복구). 채점·선택·저장에 영향 없음.
    if(!isOX){
      const eye = document.createElement('button');
      eye.type = 'button';
      eye.className = 'eye';
      eye.textContent = '👁';
      eye.title = '확실히 아닌 보기 희미하게 (다시 누르면 복구)';
      eye.setAttribute('aria-label', '이 보기를 후보에서 제외');
      eye.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        if(graded) return;
        el.classList.toggle('ruled');
      });
      el.appendChild(eye);
    }
    optsEl.appendChild(el);
  });
  form.appendChild(card);
});

function updateProgress(){
  const done = selected.filter(s=>s!==null).length;
  document.getElementById('pcount').textContent = `${done} / ${QUESTIONS.length} 선택`;
  document.getElementById('pbar').style.width = (done/QUESTIONS.length*100)+'%';
  document.getElementById('submitBtn').disabled = done !== QUESTIONS.length;
}

const btn = document.getElementById('submitBtn');
btn.addEventListener('click', ()=>{ if(!graded){ grade(); } else { location.reload(); } });

document.getElementById('copyBtn').addEventListener('click', ()=>{
  if(!LAST_PAYLOAD) return;
  const txt = JSON.stringify(LAST_PAYLOAD, null, 2);
  const done = ()=>{ document.getElementById('dlnote').textContent = "📋 복사 완료 — velog-posts/공인중개사/claude_ox_오답/_inbox/에 붙여넣어 저장해도 된다"; };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt, done));
  } else { fallbackCopy(txt, done); }
});
function fallbackCopy(txt, done){
  const ta = document.createElement('textarea');
  ta.value = txt; document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){}
  ta.remove();
}

function grade(){
  graded = true;
  const built = buildPayload(QUESTIONS, selected, QUIZ_DATE, new Date().toISOString(), SCHEMA_VERSION);
  LAST_PAYLOAD = built.payload;
  QUESTIONS.forEach((item, qi)=>{
    const opts = document.querySelectorAll(`.opt[data-q="${qi}"]`);
    opts.forEach((el, oi)=>{
      el.style.cursor='default';
      el.classList.remove('ruled');           // 채점 시 소거 표시 해제(정답이 희미하게 남지 않도록)
      const eye = el.querySelector('.eye');    // 눈동자 버튼 제거 — 채점 후엔 불필요
      if(eye) eye.remove();
      if(oi === item.answer) el.classList.add('correct');
      if(oi === selected[qi] && oi !== item.answer) el.classList.add('wrong');
    });
    const correct = selected[qi] === item.answer;
    const ex = document.getElementById('expl-'+qi);
    ex.innerHTML = `<span class="verdict" style="color:${correct?'var(--ok)':'var(--no)'}">${correct?'정답!':'오답'}</span>${item.expl}<span class="src">📄 출처: ${item.src}</span>`;
    ex.classList.add('show');
  });
  const r = document.getElementById('result');
  document.getElementById('score').textContent = built.score;
  document.getElementById('rmsg').textContent = msgFor(built.score);
  r.classList.add('show');
  btn.textContent = '🔄 다시 풀기';
  btn.classList.add('retry');
  document.getElementById('copyBtn').classList.add('show');

  // 결과 자동 다운로드 (월요일 수거·원장 갱신이 읽는 파일)
  downloadResult(built.payload);

  r.scrollIntoView({behavior:'smooth', block:'center'});
}

function downloadResult(payload){
  try{
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `공인중개사_오답_${QUIZ_DATE}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1500);
    document.getElementById('dlnote').textContent =
      payload.wrongCount>0 ? `💾 결과 저장됨(오답 ${payload.wrongCount}개) — 다운로드 폴더 확인` : "💾 만점 기록 저장됨";
  }catch(e){
    document.getElementById('dlnote').textContent = "⚠️ 자동 저장 실패 — 아래 '결과 JSON 복사'를 눌러 수동 저장";
  }
}

function msgFor(s){
  const t = QUESTIONS.length;
  const r = s/t;
  if(s===t)   return "만점. 오늘 등록증 발급해도 되겠는데요? 🏆";
  if(r>=0.8)  return "합격권. 틀린 거 해설만 한 번 더 보면 완벽합니다.";
  if(r>=0.6)  return "절반은 넘었어요. 오답 노트행 직행하는 개념들이 보이네요.";
  if(r>=0.4)  return "아직 흔들리는 개념이 있어요. 해설 정독하고 내일 재도전!";
  return "괜찮아요, 회독이 쌓이면 올라갑니다. 해설부터 차근차근.";
}
</script>
