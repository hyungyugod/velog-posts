  {"type":"일반","cat":"부동산공법","conceptKey":"부동산공법 개발행위허가 제한","retryOf":"부동산공법 개발행위허가 제한","q":"🔁 국토의 계획 및 이용에 관한 법률상 개발행위허가의 제한에 관한 설명으로 옳은 것은?","opts":["개발행위허가 제한은 한 차례만 가능하고 연장은 어떤 경우에도 허용되지 않는다.","녹지지역에서의 개발행위허가 제한은 시·도지사만 할 수 있다.","국토교통부장관이 개발행위허가를 제한하려면 중앙도시계획위원회의 심의를 거쳐야 한다.","기반시설부담구역으로 지정되면 개발행위허가를 제한할 수 없다."],"answer":2,"expl":"국장이 환경오염 우려 등으로 제한할 때는 중앙도시계획위원회 심의가 필수다. 제한은 예외적 재산권 제약이라 상급 심의로 남용을 통제한다. 함정은 '연장 불가'인데 일부 지역은 1회 연장으로 최장 5년까지 가능하다.","src":"2026-07-07 부동산공법 9 개발행위허가 (재도전)"},
  {"type":"일반","cat":"부동산공법","conceptKey":"부동산공법 공간재구조화계획","retryOf":"부동산공법 공간재구조화계획","q":"🔁 국토의 계획 및 이용에 관한 법률상 공간재구조화계획으로 지정할 수 있는 용도구역에 관한 설명으로 옳은 것은?","opts":["도시혁신구역, 복합용도구역, 입체복합구역은 공간재구조화계획으로 지정한다.","시가화조정구역은 공간재구조화계획으로 지정하는 대표적 용도구역이다.","공간재구조화계획은 광역도시계획의 하위계획으로 국토교통부장관만 입안한다.","개발제한구역의 지정·해제는 공간재구조화계획으로 결정한다."],"answer":0,"expl":"공간재구조화계획은 도시혁신·복합용도·입체복합구역을 지정하는 별도 계획이다. 기존 용도지역 틀을 넘어 토지의 복합·고밀 활용을 열어주려 신설됐다. 함정은 시가화조정구역·개발제한구역인데 이들은 도시·군관리계획으로 정한다.","src":"오답원장 재도전 · 부동산공법 공간재구조화계획 (재도전)"},
  {"type":"일반","cat":"부동산공법","conceptKey":"부동산공법 광역계획권·광역도시계획","q":"국토계획법령상 광역계획권의 지정권자와 광역도시계획의 수립권자에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["광역계획권이 둘 이상의 시·도에 걸치는 경우 국토교통부장관이 지정한다.","광역계획권의 지정은 국토교통부장관·도지사 외에 시장·군수도 할 수 있다.","광역도시계획의 수립은 국토교통부장관, 시·도지사, 시장·군수가 할 수 있다.","같은 도 관할에 속하는 광역계획권의 광역도시계획은 관할 시장·군수가 공동으로 수립한다."],"answer":1,"expl":"광역계획권 '지정'은 국토교통부장관·도지사만 할 수 있고 시장·군수는 못 한다. 권역을 긋는 지정과 계획을 짜는 수립의 주체를 분리해 둔 구조다. 함정은 지정(국장·도지사)과 수립(국장·시도지사·시장군수)의 주체를 바꿔치기하는 것이다.","src":"2026-07-07 부동산공법 1 광역계획권·광역도시계획"},
  {"type":"일반","cat":"부동산공법","conceptKey":"부동산공법 기초조사 생략","q":"국토의 계획 및 이용에 관한 법률상 도시·군관리계획 입안 시 기초조사의 생략에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["이미 도시화가 완료된 상업지역에 지구단위계획구역을 지정하면 기초조사를 전부 생략할 수 있다.","행정청이 개발하는 경우에는 토지적성평가를 생략할 수 있다.","개발제한구역에 기반시설을 설치하는 경우 토지적성평가는 생략하고 환경성검토는 실시한다.","환경성검토는 행위주체가 행정청이기만 하면 언제나 생략할 수 있다."],"answer":3,"expl":"환경성검토는 주체가 아니라 행위의 물리적 결과를 보는 절차라 주체가 행정청이어도 원칙적으로 생략되지 않는다. 토지적성평가는 주체의 자의성 통제라 행정청이면 생략 가능하다는 논리와 대비된다. 함정은 두 절차의 생략 사유를 뒤섞는 것이다.","src":"2026-07-07 부동산공법 2 기초조사 생략"},
  {"type":"조합","cat":"부동산공법","conceptKey":"부동산공법 시가화조정구역","q":"국토의 계획 및 이용에 관한 법률상 시가화조정구역에 관한 설명으로 옳은 것을 모두 고른 것은?<br>ㄱ. 시가화유보기간이 끝나면 국토교통부장관 또는 시·도지사는 그 사실을 고시하여야 한다.<br>ㄴ. 이 구역에서 시행할 수 있는 도시·군계획사업은 대통령령으로 정하는 사업만 해당한다.<br>ㄷ. 중앙행정기관의 장의 요청으로 시·도지사가 지장이 없다고 인정한 도시·군계획사업은 시행할 수 있다.<br>ㄹ. 주민의 요청만으로도 지정목적에 지장이 없으면 도시·군계획사업을 시행할 수 있다.","opts":["ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄷ, ㄹ","ㄱ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ"],"answer":0,"expl":"유보기간 종료 고시(ㄱ), 대통령령 열거사업만 허용(ㄴ), 중앙행정기관장 요청 사업 시행(ㄷ)이 옳다. 이 구역은 개인 편의가 아닌 국토계획의 순서라는 공익이 존재이유라 예외를 좁게 연다. 함정 ㄹ은 주민 요청이 아니라 중앙행정기관장의 요청이라는 점이다.","src":"2026-07-07 부동산공법 4 시가화조정구역"},
  {"type":"조합","cat":"부동산공법","conceptKey":"부동산공법 도시군계획시설 실효·해제","q":"국토의 계획 및 이용에 관한 법률상 도시·군계획시설결정의 실효·해제에 관한 설명으로 옳은 것을 모두 고른 것은?<br>ㄱ. 결정 고시일부터 20년이 지나 효력을 잃으면 지체 없이 그 사실을 고시하여야 한다.<br>ㄴ. 결정 고시일부터 10년 이내에 사업이 시행되지 않으면 토지소유자는 해제 입안을 신청할 수 있다.<br>ㄷ. 해제를 신청받은 도지사는 특별한 사유가 없으면 신청받은 날부터 1년 이내에 해제결정을 하여야 한다.<br>ㄹ. 도시·군관리계획의 결정은 원칙적으로 시장·군수가 하므로 그 고시도 시장·군수가 한다.","opts":["ㄱ, ㄴ, ㄷ, ㄹ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ","ㄴ, ㄷ, ㄹ"],"answer":2,"expl":"20년 실효 고시(ㄱ), 10년 해제 입안 신청(ㄴ), 신청 1년 내 해제결정(ㄷ)이 옳다. 재산권을 무한정 묶을 수 없어 자동실효와 해제 청구권을 둔 것이다. 함정 ㄹ은 결정이 원칙적으로 시·도지사 권한이므로 고시도 시·도지사가 한다는 점이다.","src":"2026-07-07 부동산공법 6 도시·군계획시설 실효·해제"},
  {"type":"사례","cat":"부동산공법","conceptKey":"부동산공법 도시지역외 지구단위계획","q":"갑은 도시지역 <b>외</b>의 지역에 지구단위계획구역 지정을 검토하고 있다. 국토의 계획 및 이용에 관한 법률상 옳은 것은? (다른 조건은 동일)","opts":["갑은 지구단위계획으로 건축물 높이제한을 120% 이내에서 완화할 수 있다.","지정하려면 구역 면적의 50% 이상이 계획관리지역이어야 한다.","계획관리지역이 아니어도 아파트·연립주택에 완화규정을 적용할 수 있다.","도시지역 외에서는 지구단위계획구역 자체를 지정할 수 없다."],"answer":1,"expl":"도시지역 외 지구단위계획구역은 면적의 50% 이상이 계획관리지역이어야 지정할 수 있다. 도시화 잠재력이 큰 계획관리지역을 중심으로만 예외를 허용하려는 취지다. 함정은 높이제한 120% 완화(도시지역 내에서만 가능)와 아파트·연립 완화(계획관리지역 외 불가)이다.","src":"2026-07-07 부동산공법 8 지구단위계획(도시지역 외)"},
  {"type":"OX","cat":"부동산공법","conceptKey":"부동산공법 개발행위허가 처분기한","q":"국토의 계획 및 이용에 관한 법률상 개발행위허가 신청이 있으면 특별한 사유가 없는 한 심의·협의 기간을 제외하고 15일 이내에 허가 또는 불허가 처분을 하여야 한다.","opts":["O","X"],"answer":0,"expl":"O. 개발행위허가는 심의·협의 기간을 뺀 15일 이내에 처분해야 한다. 신속한 토지이용 결정을 위해 처분기한을 못박은 것이다. 함정은 심의·협의 기간까지 포함해 15일로 오인하는 것으로, 그 기간은 산정에서 제외된다.","src":"2026-07-07 부동산공법 9 개발행위허가"},
  {"type":"일반","cat":"공인중개사법","conceptKey":"공인중개사법 §1 중개보수·업무보증","retryOf":"공인중개사법 §1 중개보수·업무보증","q":"🔁 공인중개사법령상 개업공인중개사의 손해배상책임 보장(업무보증)에 관한 설명으로 옳은 것은?","opts":["개설등록 전에 미리 업무보증을 설정하여야 등록할 수 있다.","법인이 아닌 개업공인중개사의 보증 설정금액은 최소 4억원 이상이다.","분사무소를 두는 경우 주된 사무소의 보증만으로 충분하다.","업무보증은 개설등록 요건은 아니나 업무개시 전에는 설정하여야 한다."],"answer":3,"expl":"보증은 등록 요건이 아니라 업무개시 전에 갖추면 되는 요건이다. 등록 단계가 아니라 실제 중개로 손해가 생길 수 있는 개시 시점에 맞춰 책임체계를 요구하는 것이다. 함정은 개인 보증금액(2억)과 분사무소마다 추가 보증이 필요하다는 점이다.","src":"2026-07-03 공인중개사법 1-5 보증 (재도전)"},
  {"type":"일반","cat":"공인중개사법","conceptKey":"공인중개사법 경매 인수소멸","q":"부동산 경매에서 매각으로 인한 권리의 인수·소멸에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["저당권에 대항할 수 없는 지상권은 매각으로 소멸한다.","최선순위 전세권은 전세권자가 배당요구를 하더라도 매수인에게 인수된다.","매수인은 유치권으로 담보하는 채권을 유치권자에게 변제할 책임이 있다.","소유권이전등기청구권 보전 가등기는 저당권에 대항할 수 있으면 인수된다."],"answer":1,"expl":"최선순위 전세권이라도 전세권자가 배당요구를 하면 소멸한다. 배당요구는 곧 금전 회수를 택한 것이므로 권리 존속을 포기한 것으로 보는 구조다. 함정은 최선순위라는 이유로 무조건 인수된다고 단정하는 것으로, 배당요구가 소멸의 방아쇠다.","src":"2026-07-03 공인중개사법 1-3 경매 권리분석"},
  {"type":"일반","cat":"공인중개사법","conceptKey":"공인중개사법 매수신청대리","q":"경매 매수신청대리인으로 등록한 개업공인중개사의 업무에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["개업공인중개사만 등록할 수 있고 소속공인중개사는 등록할 수 없다.","입목, 광업재단, 공장재단도 매수신청대리의 대상물이 될 수 있다.","매수신청대리인의 등록을 취소하는 주체는 시·도지사이다.","매수신청대리에는 중개업에 사용하기 위해 등록한 인장을 사용한다."],"answer":2,"expl":"매수신청대리인의 등록취소·감독 주체는 지방법원장이다. 법원 경매를 매개하는 업무라서 행정청이 아니라 관할 법원장이 감독권을 갖는다. 함정은 취소 주체를 시·도지사로 바꾸는 것으로, 중개 일반 감독(등록관청)과 혼동을 노린다.","src":"2026-07-03 공인중개사법 1-5 매수신청대리"},
  {"type":"일반","cat":"공인중개사법","conceptKey":"공인중개사법 상가임대차보호법","q":"상가건물 임대차보호법에 관한 설명으로 옳은 것은?","opts":["폐업으로 인한 임차인의 해지는 임대인이 통고받은 날부터 3개월이 지나야 효력이 생긴다.","상가건물 임대차의 확정일자는 관할 등기소가 부여한다.","보증금 전액을 변제받지 못한 대항력 있는 임차권은 매각으로 즉시 소멸한다.","임대인 동의를 받은 전차인은 임차인의 갱신요구권 행사기간이 지난 뒤에도 대위행사할 수 있다."],"answer":0,"expl":"경제사정의 중대한 변동으로 폐업 시 임차인의 해지는 임대인이 통고받은 날부터 3개월 후 효력이 생긴다. 임대인에게 대체 임차인을 구할 유예를 주려는 취지다. 함정은 확정일자(관할 세무서장)와 대항력 있는 임차권의 존속(변제 전까지 소멸 안 함)이다.","src":"2026-07-03 공인중개사법 1-1 상가건물임대차보호법"},
  {"type":"조합","cat":"공인중개사법","conceptKey":"공인중개사법 경매절차","q":"부동산 경매절차에 관한 설명으로 옳은 것을 모두 고른 것은?<br>ㄱ. 경매개시결정된 부동산에 다른 강제경매 신청이 있으면 법원은 뒤의 신청을 각하한다.<br>ㄴ. 집행법원은 배당요구의 종기를 첫 매각기일 이전으로 정한다.<br>ㄷ. 인도명령의 신청은 매수인이 대금을 낸 뒤 6개월 이내에 하여야 한다.<br>ㄹ. 이해관계인은 매각대금이 모두 지급될 때까지 경매개시결정에 대한 이의신청을 할 수 있다.","opts":["ㄱ, ㄴ, ㄷ, ㄹ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄹ","ㄴ, ㄷ, ㄹ"],"answer":3,"expl":"배당요구 종기는 첫 매각기일 이전(ㄴ), 인도명령은 대금납부 후 6개월 내(ㄷ), 이의신청은 대금 완납 시까지(ㄹ)가 옳다. 함정 ㄱ은 뒤의 경매신청을 각하하지 않고 이중경매개시결정을 해 후순위 채권자도 보호한다는 점이다.","src":"2026-07-03 공인중개사법 1-4 경매 기타 절차"},
  {"type":"계산","cat":"공인중개사법","conceptKey":"공인중개사법 차순위매수신고 계산","calc":{"expr":"600000000-60000000","expected":540000000},"q":"법원 부동산 경매에서 최고가매수신고액이 6억원, 최고가매수신고인이 제공한 매수신청보증금이 6,000만원이다. 차순위매수신고를 하려면 그 신고액이 최소한 얼마를 초과하여야 하는가? (다른 조건은 동일)","opts":["5억원","5억 4,000만원","5억 6,000만원","6억원"],"answer":1,"expl":"기준은 최고가매수신고액 − 보증액 = 6억 − 6,000만 = 5억 4,000만원, 이를 초과해야 한다. 채권자가 받을 금액이 재경매를 안 해도 같아지도록 설계돼 이 하한이 나온다. 함정은 보증을 더하거나 최고가 자체를 기준으로 삼는 것이다.","src":"2026-07-03 공인중개사법 1-2 경매 매수신청보증"},
  {"type":"사례","cat":"공인중개사법","conceptKey":"공인중개사법 경매 재매각·대금","q":"경매 부동산의 매수인 갑이 대금지급기한까지 매각대금을 내지 않아 재매각이 실시되었다. 갑에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["갑은 재매각절차에서 다시 매수신청을 할 수 없다.","갑은 자신이 제공한 매수신청보증의 반환을 청구할 수 없다.","갑이 매각대금을 지급해야 하는 시점은 법원이 정한 대금지급기일까지이다.","재매각은 갑의 대금 미납으로 생긴 절차이므로 갑에게 불이익을 준다."],"answer":2,"expl":"대금은 대금지급'기한'까지 내는 것이지 대금지급'기일'이 아니다. 특정한 하루가 아니라 그 기한 안이면 언제든 완납할 수 있게 한 것이다. 함정은 '기일'과 '기한'을 바꾸는 것이며, 재매각 시 전 매수인은 매수신청·보증반환이 모두 막힌다.","src":"2026-07-03 공인중개사법 1-2 경매 대금·재매각"},
  {"type":"OX","cat":"공인중개사법","conceptKey":"공인중개사법 상가 확정일자","q":"상가건물 임대차보호법상 상가건물 임대차의 확정일자는 건물 소재지의 관할 등기소가 부여한다.","opts":["O","X"],"answer":1,"expl":"X. 상가건물 임대차의 확정일자는 건물 소재지 관할 세무서장이 부여한다. 사업자등록과 연계해 세무서가 창구가 되도록 설계된 것이다. 함정은 주택(등기소·주민센터 등)과 상가(세무서장)의 확정일자 부여기관을 뒤섞는 것이다.","src":"2026-07-03 공인중개사법 1-1 확정일자"},
  {"type":"일반","cat":"부동산학개론","conceptKey":"부동산학개론 §2 여과·주거분리","retryOf":"부동산학개론 §2 여과·주거분리","q":"🔁 주택시장의 여과과정(filtering)과 주거분리에 관한 설명으로 옳은 것은?","opts":["하향여과는 상위 소득계층이 쓰던 주택이 하위 소득계층의 사용으로 전환되는 것이다.","주거분리는 소득과 무관하게 주택이 무작위로 혼재되는 현상이다.","상향여과는 신축 주택이 즉시 저소득층에게 배분되는 과정이다.","하향여과가 발생하면 저소득층이 사용할 수 있는 주택량은 감소한다."],"answer":0,"expl":"하향여과는 고소득층이 상위 주택으로 이동하며 쓰던 주택이 저소득층에게 넘어가는 것이다. 신규 공급이 상위계층으로 흡수되고 기존 주택이 아래로 흐르는 시장 메커니즘이다. 함정은 상향여과 정의와 '하향여과 시 저소득 주택 감소'라는 방향 뒤집기이다.","src":"오답원장 재도전 · 부동산학개론 여과·주거분리 (재도전)"},
  {"type":"일반","cat":"부동산학개론","conceptKey":"부동산학개론 §1 거미집이론","retryOf":"부동산학개론 §1 거미집이론","q":"🔁 거미집이론(cobweb theory)에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["수요의 가격탄력성이 공급의 가격탄력성보다 크면 수렴형이 된다.","공급은 전기(前期)의 가격에 반응하여 다음 기에 결정된다고 가정한다.","수요곡선 기울기의 절댓값이 공급곡선 기울기의 절댓값보다 크면 수렴형이 된다.","수요와 공급의 가격탄력성이 같으면 순환형이 된다."],"answer":2,"expl":"기울기 절댓값 기준으로는 수요<공급일 때 수렴형이므로, 수요 기울기가 더 크면 발산형이다. 탄력성과 기울기는 역의 관계라 '탄력성 큰 쪽=기울기 작은 쪽'이 안정 조건이다. 함정은 탄력성 기준(수요 큼=수렴)과 기울기 기준을 같은 방향으로 착각하는 것이다.","src":"오답원장 재도전 · 부동산학개론 거미집이론 (재도전)"},
  {"type":"일반","cat":"부동산학개론","conceptKey":"부동산학개론 §1 시장이론","retryOf":"부동산학개론 §1 시장이론","q":"🔁 부동산시장의 특성과 효율성에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["부동산시장은 지역별로 분화되는 국지성을 가진다.","준강성 효율적 시장에서는 공표된 정보가 이미 가격에 반영되어 있다.","강성 효율적 시장에서는 공표되지 않은 정보로도 초과이윤을 얻을 수 없다.","할당효율성은 완전경쟁시장에서만 달성될 수 있다."],"answer":3,"expl":"할당효율성은 불완전경쟁·독점 시장에서도 초과이윤이 없다면 달성될 수 있다. 자원이 최적 배분되는지의 문제라 시장 형태와 반드시 일치하지 않는다. 함정은 '완전경쟁=할당효율성'으로 등치시키는 것으로, 부동산시장은 불완전해도 할당효율은 가능하다.","src":"오답원장 재도전 · 부동산학개론 시장이론 (재도전)"},
  {"type":"조합","cat":"부동산학개론","conceptKey":"부동산학개론 물건별 감정평가방법","q":"다음 물건과 주된 감정평가방법을 옳게 연결한 것을 모두 고른 것은?<br>ㄱ. 소경목림 — 원가법<br>ㄴ. 과수원 — 거래사례비교법<br>ㄷ. 임대료 — 임대사례비교법<br>ㄹ. 영업권 — 원가법","opts":["ㄱ, ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ"],"answer":1,"expl":"소경목림은 거래시장이 없어 원가법(ㄱ), 과수원은 매매사례가 풍부해 거래사례비교법(ㄴ), 임대료는 임대사례비교법(ㄷ)이다. 값의 근거가 투입비용이냐 거래사례냐 수익이냐로 방법이 갈린다. 함정 ㄹ은 영업권이 실체·거래사례가 없어 수익환원법이라는 점이다.","src":"2026-07-04 부동산학개론 1-4 물건별 감정평가방법"},
  {"type":"계산","cat":"부동산학개론","conceptKey":"부동산학개론 적산법 적산임대료","calc":{"expr":"600000000*0.05+9000000","expected":39000000},"q":"아래 조건을 적용하여 적산법으로 적산임대료를 산정하면? (다른 조건은 동일)<br>ㆍ기초가액: 6억원<br>ㆍ기대이율: 연 5%<br>ㆍ필요제경비: 900만원","opts":["3,900만원","3,000만원","3,090만원","4,500만원"],"answer":0,"expl":"적산임대료 = 기초가액×기대이율 + 필요제경비 = 6억×0.05 + 900만 = 3,000만 + 900만 = 3,900만원이다. 원가방식이지만 가액이 아니라 임대료를 구하므로 기초가액에 기대수익과 경비를 더한다. 함정은 필요제경비를 빼거나 재조달원가를 곱하는 것이다.","src":"2026-07-04 부동산학개론 1-1 적산법"},
  {"type":"계산","cat":"부동산학개론","conceptKey":"부동산학개론 직접환원법 수익가액","calc":{"expr":"54000000/0.06","expected":900000000},"q":"다음 자료를 직접환원법으로 적용하여 산정한 수익가액은? (다른 조건은 동일)<br>ㆍ순영업소득(NOI): 5,400만원<br>ㆍ환원이율: 연 6%","opts":["6억원","8억원","9억원","10억원"],"answer":2,"expl":"직접환원법 수익가액 = 순수익 ÷ 환원이율 = 5,400만 ÷ 0.06 = 9억원이다. 매기 순수익을 자본으로 환원해 현재의 부동산 가치를 구하는 방식이다. 함정은 환원이율을 곱하거나 순수익에서 경비를 다시 빼는 것으로, NOI는 이미 순수익이다.","src":"2026-07-04 부동산학개론 1-5 직접환원법"},
  {"type":"계산","cat":"부동산학개론","conceptKey":"부동산학개론 정액법 적산가액","calc":{"expr":"300000000-((300000000*0.9)/40)*8","expected":246000000},"q":"아래 건물의 적산가액을 정액법으로 산정하면? (다른 조건은 동일)<br>ㆍ재조달원가: 3억원<br>ㆍ경제적 내용연수: 40년<br>ㆍ잔존가치율: 10%<br>ㆍ경과연수: 8년","opts":["2억 7,000만원","2억 5,200만원","2억 4,000만원","2억 4,600만원"],"answer":3,"expl":"감가총액=3억×(1−0.1)=2.7억, 연 감가=2.7억÷40=675만, 8년 누계=5,400만, 적산가액=3억−5,400만=2억 4,600만원이다. 정액법은 매년 같은 금액을 깎아 잔존가치까지 도달시키는 방식이다. 함정은 잔가율을 무시하거나 재조달원가 전액을 감가 대상으로 삼는 것이다.","src":"2026-07-04 부동산학개론 1-3 감가수정(정액법)"},
  {"type":"OX","cat":"부동산학개론","conceptKey":"부동산학개론 표준지공시지가 기준","q":"부동산 가격공시제도상 표준지공시지가는 감정평가법인등이 토지를 감정평가할 때 그 기준이 된다.","opts":["O","X"],"answer":0,"expl":"O. 표준지공시지가는 감정평가법인등의 토지 평가 시 기준이 된다. 개별 평가의 공적 준거를 제공해 평가의 일관성을 확보하려는 제도다. 함정은 표준지 조사·평가 주체(감정평가법인등)와 표준주택·공동주택 조사 주체(한국부동산원)를 뒤섞는 것이다.","src":"2026-07-04 부동산학개론 1-5 부동산 가격공시"},
  {"type":"일반","cat":"부동산세법","conceptKey":"부동산세법 기한후신고 감면","q":"지방세 무신고·과소신고에 대한 기한후신고와 가산세 감면에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["관할 지방자치단체장이 결정하여 통지하기 전에는 기한후신고를 할 수 있다.","지방자치단체장이 결정할 것을 미리 알고 제출한 기한후신고도 가산세 감면 대상이다.","법정신고기한이 지난 후 6개월 이내에 기한후신고를 하면 무신고가산세를 감면받을 수 있다.","무신고한 경우에도 스스로 기한후신고를 하면 가산세를 일정 부분 감면받는다."],"answer":1,"expl":"곧 결정·통지될 것을 미리 알고 낸 기한후신고는 자발성이 없어 감면 대상에서 제외된다. 감면은 스스로 바로잡는 성실 신고를 유도하려는 장치이기 때문이다. 함정은 '걸릴 걸 알고 낸 신고'도 감면된다고 하는 것으로, 이 경우가 대표적 제외사유다.","src":"2026-07-05 부동산세법 9-1 기한후신고와 가산세 감면"},
  {"type":"일반","cat":"부동산세법","conceptKey":"부동산세법 배당순위·법정기일","q":"조세채권의 우선순위와 법정기일에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["일반조세와 피담보채권의 우선순위는 법정기일과 담보물권 설정일의 선후로 정한다.","조세채권 상호간의 배당순위는 담보·압류·교부청구의 순으로 정한다.","신고에 의하여 확정되는 지방세의 법정기일은 그 신고일이다.","결정·경정으로 고지한 지방세의 법정기일은 그 납부기한이다."],"answer":3,"expl":"결정·경정 고지 세액의 법정기일은 납세고지서 '발송일'이지 납부기한이 아니다. 언제 조세채권이 공시력을 갖추었는지를 발송 시점으로 잡아 담보권과 선후를 가린다. 함정은 발송일을 납부기한으로 바꾸는 것으로, 신고분(신고일)과도 구별해야 한다.","src":"2026-07-05 부동산세법 9-2 조세채권 배당순위"},
  {"type":"일반","cat":"부동산세법","conceptKey":"부동산세법 불복절차","q":"지방세기본법령상 불복절차에 관한 설명으로 옳은 것은?","opts":["이의신청을 거치지 않고 곧바로 심판청구를 할 수 있다.","지방세 불복은 이의신청을 반드시 거쳐야 심판청구를 할 수 있다.","심판청구를 거치지 않고도 지방세에 관한 행정소송을 제기할 수 있다.","과태료 부과처분에 대해서도 지방세 불복청구를 할 수 있다."],"answer":0,"expl":"이의신청은 선택이라 거치지 않고 바로 심판청구를 할 수 있다(선택적 1심급). 다만 행정소송은 심판청구를 반드시 거쳐야 하는 필요적 전치다. 함정은 이의신청을 필수로 보거나(B), 심판청구 없이 소송 가능(C), 과태료 불복 가능(D)으로 오인하는 것이다.","src":"2026-07-05 부동산세법 9-3 지방세 불복절차"},
  {"type":"일반","cat":"부동산세법","conceptKey":"부동산세법 서류송달","q":"납세 관련 서류의 송달과 납부기한 연장에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["납세의 고지와 독촉 서류는 연대납세의무자 모두에게 각각 송달하여야 한다.","도달일부터 납부기한이 7일 이내로 남은 경우 도달일부터 14일이 지난 날로 납부기한이 연장된다.","공시송달은 서류의 내용을 공고한 날부터 7일이 지나면 송달된 것으로 본다.","서류가 납부기한이 지난 후에 도달한 경우에도 납부기한이 연장될 수 있다."],"answer":2,"expl":"공시송달은 공고한 날부터 14일이 지나야 송달된 것으로 본다. 상대가 실제로 못 받는 방식이라 최소한의 도달 간주 기간을 두는 것이다. 함정은 7일로 줄여 다른 14일 기준(송달지연 연장)과 헷갈리게 하는 것이다.","src":"2026-07-05 부동산세법 9-4 서류의 송달"},
  {"type":"조합","cat":"부동산세법","conceptKey":"부동산세법 불복 기한","q":"지방세 이의신청과 심판청구의 청구기간에 관한 설명으로 옳은 것을 모두 고른 것은?<br>ㄱ. 이의신청은 처분이 있은 것을 안 날부터 90일 이내에 하여야 한다.<br>ㄴ. 이의신청 결정통지를 그 기간 내에 받지 못하면 결정통지 전이라도 심판청구를 할 수 있다.<br>ㄷ. 불복청구의 보정기간은 결정기간에 산입하지 않는다.<br>ㄹ. 심판청구는 이의신청 결정통지를 받은 날부터 30일 이내에 하여야 한다.","opts":["ㄱ, ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ"],"answer":1,"expl":"이의신청 90일(ㄱ), 결정통지 지연 시 통지 전 심판청구 가능(ㄴ), 보정기간 결정기간 불산입(ㄷ)이 옳다. '안 날부터 90일'이 불복의 기본 시계다. 함정 ㄹ은 심판청구도 결정통지를 받은 날부터 90일이지 30일이 아니라는 점이다.","src":"2026-07-05 부동산세법 9-3 불복 기한"},
  {"type":"조합","cat":"부동산세법","conceptKey":"부동산세법 조세배당·불복","q":"지방세기본법령상 조세 배당·불복 관련 설명으로 옳은 것을 모두 고른 것은?<br>ㄱ. 천재지변 등으로 불복청구를 할 수 없으면 그 사유가 소멸한 날부터 14일 이내에 제기할 수 있다.<br>ㄴ. 통고처분을 받은 경우에는 지방세 불복청구를 할 수 없다.<br>ㄷ. 조세채권 상호간에는 담보·압류·교부청구 순으로 배당순위를 정한다.<br>ㄹ. 이의신청을 거친 2심급 구조만 인정되고 1심급 구조는 허용되지 않는다.","opts":["ㄱ, ㄴ, ㄷ, ㄹ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄹ","ㄱ, ㄴ, ㄷ"],"answer":3,"expl":"천재지변 시 사유 소멸 후 14일 내 제기(ㄱ), 통고처분은 불복 제외(ㄴ), 조세 상호간 담·압·교 순(ㄷ)이 옳다. 통고처분·과태료는 이미 법원 구제가 있어 지방세 불복에서 뺀다. 함정 ㄹ은 선택적 1심급도 허용된다는 점이다.","src":"2026-07-05 부동산세법 9-2·9-3 배당·불복"},
  {"type":"사례","cat":"부동산세법","conceptKey":"부동산세법 조세vs저당권 배당","q":"갑 소유 부동산이 경매되어 배당한다. 을의 저당권(설정일 2025.4.1.)과 병 과세관청의 일반조세(법정기일 2025.6.1.)가 경합한다. 옳은 것은? (당해세가 아니며, 다른 조건은 동일)","opts":["을의 저당권이 병의 조세채권보다 우선하여 배당받는다.","일반조세는 언제나 피담보채권보다 우선하므로 병이 먼저 배당받는다.","설정일과 법정기일이 달라도 조세와 저당권은 항상 안분배당한다.","병의 조세가 당해세가 아니어도 저당권보다 우선한다."],"answer":0,"expl":"일반조세와 피담보채권은 날짜순이라 설정일(4.1)이 법정기일(6.1)보다 앞선 을의 저당권이 우선한다. 조세의 공시 시점(법정기일)과 담보권 설정 선후로 순위를 가린다. 함정은 '조세는 항상 우선'인데, 그 특칙은 당해세에만 적용된다.","src":"2026-07-05 부동산세법 9-2 조세채권 배당순위"},
  {"type":"OX","cat":"부동산세법","conceptKey":"부동산세법 공시송달","q":"지방세기본법령상 공시송달은 서류의 주요 내용을 공고한 날부터 30일이 지나면 서류가 송달된 것으로 본다.","opts":["O","X"],"answer":1,"expl":"X. 공시송달은 공고한 날부터 14일이 지나면 송달된 것으로 본다. 실제 수령이 어려운 방식이라 도달을 간주하는 최소 기간을 둔 것이다. 함정은 30일로 늘려 다른 기간과 혼동하게 하는 것으로, 정확한 기준은 14일이다.","src":"2026-07-05 부동산세법 9-4 공시송달"},
  {"type":"일반","cat":"민법","conceptKey":"민법 무권대리인 책임","q":"민법상 무권대리인의 상대방에 대한 책임에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["무권대리인의 상대방에 대한 책임은 무과실책임이다.","무권대리인이 제한능력자인 경우에는 그 책임을 지지 않는다.","무권대리인의 책임이 성립하려면 무권대리인에게 과실이 있어야 한다.","본인이 추인을 거절하면 상대방은 계약이행 또는 손해배상을 선택하여 청구할 수 있다."],"answer":2,"expl":"무권대리인의 책임은 무과실책임이라 과실이 없어도 성립한다. 자기 대리권 유무를 확인할 수 있는 유일한 지위여서 결과책임을 지운 것이다. 함정은 '과실이 있어야 책임'이라는 서술이며, 제한능력자·상대방 악의(과실)만이 면책사유다.","src":"2026-07-06 민법 2 무권대리"},
  {"type":"일반","cat":"민법","conceptKey":"민법 취득시효·공유","q":"민법상 취득시효와 공유에 관한 설명으로 옳은 것은?","opts":["취득시효로 인한 소유권취득의 효력은 점유를 개시한 때로 소급한다.","점유취득시효 완성자의 등기청구권은 소유자의 동의가 있어야 양도할 수 있다.","공유물분할금지특약은 10년까지 정할 수 있다.","재판상 공유물분할은 대금분할이 원칙이다."],"answer":0,"expl":"시효취득은 원시취득이며 그 효력은 점유개시 시점으로 소급한다. 오래 유지된 사실상태를 법이 추인하는 제도라 최초 점유 때부터 소유였던 것처럼 본다. 함정은 등기청구권 양도에 소유자 동의 필요(불요), 분할금지 10년(5년), 재판상 대금분할 원칙(현물분할)이다.","src":"2026-07-06 민법 5 취득시효·공동소유"},
  {"type":"일반","cat":"민법","conceptKey":"민법 지상권·전세권","q":"민법상 지상권과 전세권에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["견고한 건물의 소유를 목적으로 하는 지상권의 최단 존속기간은 30년이다.","건물전세권이 법정갱신된 경우 그 존속기간은 정하지 않은 것으로 본다.","전세권의 존속기간은 10년을 넘지 못한다.","건물 이외의 공작물 소유를 목적으로 하는 지상권의 최단 존속기간은 15년이다."],"answer":3,"expl":"공작물 소유 목적 지상권의 최단 존속기간은 5년이다. 견고한 건물 30년·일반 건물 15년·공작물 5년으로 물건의 내구성에 비례해 최단기간을 차등한다. 함정은 공작물을 15년(일반 건물 기준)으로 올려 적는 것이다.","src":"2026-07-06 민법 6 용익물권"},
  {"type":"일반","cat":"민법","conceptKey":"민법 집합건물","q":"집합건물의 소유 및 관리에 관한 법률상 설명으로 <b>옳지 않은</b> 것은?","opts":["공용부분에 관하여 발생한 채무는 특별승계인에게도 승계된다.","재건축 결의는 구분소유자 및 의결권의 각 3분의 2 이상의 동의로 성립한다.","구분의사가 객관적으로 표시되면 등기하지 않아도 구분소유가 성립할 수 있다.","공용부분의 비용은 전유부분의 지분비율에 따라 부담한다."],"answer":1,"expl":"재건축 결의는 구분소유자 및 의결권의 각 5분의 4 이상 동의가 필요하다. 재산권에 큰 영향을 주는 결정이라 정족수를 높게 둔 것이다. 함정은 3분의 2로 낮추는 것이며, 공용부분 채무는 물건에 붙어 특별승계인에게 승계된다.","src":"2026-07-06 민법 13 집합건물"},
  {"type":"조합","cat":"민법","conceptKey":"민법 계약·담보책임","q":"민법상 계약과 매도인의 담보책임에 관한 설명으로 옳은 것을 모두 고른 것은?<br>ㄱ. 우리 민법은 쌍무계약에서 채무자위험부담주의를 원칙으로 한다.<br>ㄴ. 계약금은 다른 약정이 없으면 해약금으로 추정된다.<br>ㄷ. 권리의 일부가 타인에게 속한 경우 선의의 매수인은 계약일부터 1년 내에 손해배상을 청구해야 한다.<br>ㄹ. 정기행위는 이행지체가 있으면 별도의 해제 의사표시 없이 당연히 해제된다.","opts":["ㄱ, ㄷ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ","ㄴ, ㄹ"],"answer":2,"expl":"채무자위험부담주의 원칙(ㄱ)과 계약금의 해약금 추정(ㄴ)이 옳다. 함정 ㄷ은 기산점이 '계약일'이 아니라 '그 사실을 안 날'부터 1년이라는 점, ㄹ은 정기행위도 당연해제가 아니라 해제의 의사표시가 있어야 해제된다는 점이다.","src":"2026-07-06 민법 8·9 계약총칙·담보책임"},
  {"type":"사례","cat":"민법","conceptKey":"민법 무권대리 철회","q":"병은 대리권 없는 을이 본인 갑을 위한 것임을 표시하며 체결한 갑 소유 토지 매매계약에서 을에게 계약금을 지급하였다. 갑의 추인 전에 병이 계약을 철회한 경우 옳은 것은?","opts":["병은 갑에게 계약금 상당의 부당이득반환을 청구할 수 없다.","병의 철회는 갑이 추인한 후에도 할 수 있다.","철회에도 불구하고 계약은 갑에게 효력이 있다.","갑은 병에게 계약의 이행을 청구할 수 있다."],"answer":0,"expl":"철회는 추인 전이라 계약이 갑에게 효력이 없고 갑이 계약금을 직접 받지도 않았으므로 병은 갑에게 부당이득반환을 구할 수 없다. 무권대리는 추인이 없으면 본인에게 귀속되지 않는다. 함정은 철회 시점(추인 전만 가능)과 계약금 반환 상대방을 혼동하는 것이다.","src":"2026-07-06 민법 2 무권대리"},
  {"type":"일반","cat":"민법","conceptKey":"민법 임대차","q":"민법상 임대차에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["차임증액청구에 따라 법원이 증액을 결정하면 그 효력은 증액청구 시로 소급한다.","임차기간을 영구로 정한 임대차약정도 유효하다.","묵시적으로 갱신되면 전임대차에 대해 제3자가 제공한 담보는 원칙적으로 소멸한다.","증액된 차임은 다음 갱신 시점부터 효력이 생긴다."],"answer":3,"expl":"차임증액청구가 인용되면 그 효력은 증액청구 시로 소급하지, 다음 갱신 시점부터가 아니다. 청구 시점의 사정변경을 반영하려는 취지다. 함정은 소급효를 부정하고 장래효로 바꾸는 것이며, 묵시갱신 시 제3자 담보 소멸은 옳은 서술이다.","src":"2026-07-06 민법 10 임대차"},

/*__QUESTIONS_END__*/
];

/*__BUILD_PAYLOAD_START__*/
// ── 순수 함수 레이어: DOM 없이 채점 결과(payload v2)를 만든다. node로 단위테스트 가능.
function conceptFromSrc(src){
  return String(src||"").replace(/^\s*\d{4}-\d{2}-\d{2}\s*/,"").replace(/\s*\(재도전\)\s*$/,"").trim();
}
function buildPayload(questions, sel, quizDate, nowIso, schemaVersion){
  let score = 0; const results = [], wrong = [];
  questions.forEach((item, qi)=>{
    const isCorrect = sel[qi] === item.answer;
    if(isCorrect) score++;
    const ck = item.conceptKey || conceptFromSrc(item.src);
    const isRetry = !!item.retryOf || /\(재도전\)/.test(item.src||"") || String(item.q||"").indexOf("🔁") >= 0;
    const base = {
      id: quizDate + "-q" + (qi+1), cat: item.cat, type: item.type, q: item.q,
      options: item.opts, myAnswer: item.opts[sel[qi]], correct: item.opts[item.answer],
      expl: item.expl, src: item.src
    };
    const r = Object.assign({}, base, {
      conceptKey: ck,
      retryOf: isRetry ? (item.retryOf || ck) : null,
      correctAnswered: isCorrect
    });
    if(item.calc) r.calc = item.calc;
    results.push(r);
    if(!isCorrect) wrong.push(base);   // v1 하위호환 필드 (기존 수거 파이프라인용)
  });
  return { score: score, wrong: wrong, payload: {
    schemaVersion: schemaVersion, subject: "공인중개사", date: quizDate, quizId: quizDate,
    score: score, total: questions.length, wrongCount: wrong.length,
    results: results, wrong: wrong, generatedAt: nowIso
  }};
}
/*__BUILD_PAYLOAD_END__*/

const form = document.getElementById('quiz');
const selected = new Array(QUESTIONS.length).fill(null);
let graded = false;
let LAST_PAYLOAD = null;
let lastCat = null;

document.getElementById('total').textContent = ' / ' + QUESTIONS.length;

QUESTIONS.forEach((item, qi)=>{
  if(item.cat !== lastCat){
    const s = document.createElement('div');
    s.className = 'sec';
    s.textContent = '▍' + item.cat;
    form.appendChild(s);
    lastCat = item.cat;
  }
  const card = document.createElement('div');
  card.className = 'q';
  const isOX = item.type === 'OX';
  card.innerHTML = `
    <div class="qhead">
      <span class="qno">${qi+1}</span>
      <span class="qtype">${item.type}</span>
      <span class="qcat">${item.cat}</span>
    </div>
    <div class="qtext">${item.q}</div>
    <div class="opts ${isOX?'ox':''}" data-q="${qi}"></div>
    <div class="expl" id="expl-${qi}"></div>`;
  const optsEl = card.querySelector('.opts');
  item.opts.forEach((o, oi)=>{
    const el = document.createElement('div');
    el.className = 'opt';
    el.dataset.q = qi; el.dataset.o = oi;
    el.innerHTML = isOX
      ? `<span>${o}</span>`
      : `<span class="mk">${String.fromCharCode(65+oi)}</span><span>${o}</span>`;
    el.addEventListener('click', ()=>{
      if(graded) return;
      selected[qi] = oi;
      optsEl.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
      el.classList.add('sel');
      updateProgress();
    });
    // 눈동자(👁) 소거 버튼 — 확실히 아닌 보기를 희미하게(다시 누르면 복구). 채점·선택·저장에 영향 없음.
    if(!isOX){
      const eye = document.createElement('button');
      eye.type = 'button';
      eye.className = 'eye';
      eye.textContent = '👁';
      eye.title = '확실히 아닌 보기 희미하게 (다시 누르면 복구)';
      eye.setAttribute('aria-label', '이 보기를 후보에서 제외');
      eye.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        if(graded) return;
        el.classList.toggle('ruled');
      });
      el.appendChild(eye);
    }
    optsEl.appendChild(el);
  });
  form.appendChild(card);
});

function updateProgress(){
  const done = selected.filter(s=>s!==null).length;
  document.getElementById('pcount').textContent = `${done} / ${QUESTIONS.length} 선택`;
  document.getElementById('pbar').style.width = (done/QUESTIONS.length*100)+'%';
  document.getElementById('submitBtn').disabled = done !== QUESTIONS.length;
}

const btn = document.getElementById('submitBtn');
btn.addEventListener('click', ()=>{ if(!graded){ grade(); } else { location.reload(); } });

document.getElementById('copyBtn').addEventListener('click', ()=>{
  if(!LAST_PAYLOAD) return;
  const txt = JSON.stringify(LAST_PAYLOAD, null, 2);
  const done = ()=>{ document.getElementById('dlnote').textContent = "📋 복사 완료 — velog-posts/공인중개사/claude_ox_오답/_inbox/에 붙여넣어 저장해도 된다"; };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt, done));
  } else { fallbackCopy(txt, done); }
});
function fallbackCopy(txt, done){
  const ta = document.createElement('textarea');
  ta.value = txt; document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){}
  ta.remove();
}

function grade(){
  graded = true;
  const built = buildPayload(QUESTIONS, selected, QUIZ_DATE, new Date().toISOString(), SCHEMA_VERSION);
  LAST_PAYLOAD = built.payload;
  QUESTIONS.forEach((item, qi)=>{
    const opts = document.querySelectorAll(`.opt[data-q="${qi}"]`);
    opts.forEach((el, oi)=>{
      el.style.cursor='default';
      el.classList.remove('ruled');           // 채점 시 소거 표시 해제(정답이 희미하게 남지 않도록)
      const eye = el.querySelector('.eye');    // 눈동자 버튼 제거 — 채점 후엔 불필요
      if(eye) eye.remove();
      if(oi === item.answer) el.classList.add('correct');
      if(oi === selected[qi] && oi !== item.answer) el.classList.add('wrong');
    });
    const correct = selected[qi] === item.answer;
    const ex = document.getElementById('expl-'+qi);
    ex.innerHTML = `<span class="verdict" style="color:${correct?'var(--ok)':'var(--no)'}">${correct?'정답!':'오답'}</span>${item.expl}<span class="src">📄 출처: ${item.src}</span>`;
    ex.classList.add('show');
  });
  const r = document.getElementById('result');
  document.getElementById('score').textContent = built.score;
  document.getElementById('rmsg').textContent = msgFor(built.score);
  r.classList.add('show');
  btn.textContent = '🔄 다시 풀기';
  btn.classList.add('retry');
  document.getElementById('copyBtn').classList.add('show');

  // 결과 자동 다운로드 (월요일 수거·원장 갱신이 읽는 파일)
  downloadResult(built.payload);

  r.scrollIntoView({behavior:'smooth', block:'center'});
}

function downloadResult(payload){
  try{
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `공인중개사_오답_${QUIZ_DATE}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1500);
    document.getElementById('dlnote').textContent =
      payload.wrongCount>0 ? `💾 결과 저장됨(오답 ${payload.wrongCount}개) — 다운로드 폴더 확인` : "💾 만점 기록 저장됨";
  }catch(e){
    document.getElementById('dlnote').textContent = "⚠️ 자동 저장 실패 — 아래 '결과 JSON 복사'를 눌러 수동 저장";
  }
}

function msgFor(s){
  const t = QUESTIONS.length;
  const r = s/t;
  if(s===t)   return "만점. 오늘 등록증 발급해도 되겠는데요? 🏆";
  if(r>=0.8)  return "합격권. 틀린 거 해설만 한 번 더 보면 완벽합니다.";
  if(r>=0.6)  return "절반은 넘었어요. 오답 노트행 직행하는 개념들이 보이네요.";
  if(r>=0.4)  return "아직 흔들리는 개념이 있어요. 해설 정독하고 내일 재도전!";
  return "괜찮아요, 회독이 쌓이면 올라갑니다. 해설부터 차근차근.";
}
