  {"type":"일반","cat":"부동산공법","q":"국토의 계획 및 이용에 관한 법률상 도시·군기본계획의 수립·확정에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["국가계획과 관련된 경우에는 국토교통부장관이 직접 도시·군기본계획을 수립할 수 있다.","특별시장·광역시장·특별자치시장 등은 스스로 확정하지만 시장·군수는 도지사의 승인을 받아야 한다.","생활권계획이 수립·고시된 지역은 도시·군기본계획이 수립 또는 변경된 것으로 볼 수 있다.","공청회는 도시·군기본계획을 수립하거나 변경할 때 거쳐야 하는 절차이다."],"answer":0,"expl":"도시·군기본계획 수립권자는 특별시장·광역시장·특별자치시장·특별자치도지사·시장·군수 6명뿐이라, 국가계획과 관련되더라도 국토교통부장관이 직접 수립할 수 없다. 관할 구역의 장기발전방향이라 지역 수립권자에게 전속시킨 것이다. 광역도시계획에서 국장이 직접 수립할 수 있는 것과 뒤섞는 것이 함정이다.","src":"2026-07-14 부동산공법 3-1 도시·군기본계획 수립권자","conceptKey":"부동산공법 3-1 기본계획 수립권자"},
  {"type":"조합","cat":"부동산공법","q":"국토의 계획 및 이용에 관한 법률상 도시지역으로 결정·고시된 것으로 보는 구역을 모두 고른 것은?<br>ㄱ. 도시지역에 연접한 항만구역인 공유수면<br>ㄴ. 「산업입지 및 개발에 관한 법률」에 따른 국가산업단지<br>ㄷ. 「택지개발촉진법」에 따른 택지개발지구<br>ㄹ. 「농어촌정비법」에 따른 농공단지","opts":["ㄱ, ㄹ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄷ, ㄹ"],"answer":2,"expl":"연접한 공유수면·산업단지·택지개발지구는 인구·산업이 밀집해 도시지역으로 의제되지만, 농공단지는 공장이 몇 개뿐이라 제외된다. 이미 개발수요가 큰 구역을 도시지역으로 자동 전환해 관리 공백을 없애려는 취지다. 익숙한 '단지'라는 말로 농공단지까지 묶어 넣는 것이 함정이다.","src":"2026-07-14 부동산공법 6-2 용도지역 의제","conceptKey":"부동산공법 6-2 도시지역 의제"},
  {"type":"일반","cat":"부동산공법","q":"🔁 국토의 계획 및 이용에 관한 법률상 개발행위허가의 제한에 관한 설명으로 옳은 것은?","opts":["개발행위허가 제한지역을 지정할 때에는 도시계획위원회의 심의를 거치지 않는다.","한 차례 제한한 기간을 연장하려는 경우에는 다시 도시계획위원회의 심의를 거치지 않아도 된다.","개발행위허가의 제한은 한 번 지정하면 기간의 제한 없이 계속 유지된다.","기반시설부담구역으로 지정된 지역은 개발행위허가를 제한할 수 없다."],"answer":1,"expl":"제한을 연장할 때는 최초 제한 시 이미 심의를 거쳤으므로 다시 도시계획위원회 심의를 받지 않아도 된다. 동일 사안을 반복 심의하는 낭비를 막으려는 것이다. 제한 지정에는 심의가 필요하다는 점과 뒤섞어 연장에도 심의가 필요하다고 오인하게 만드는 것이 함정이다.","src":"2026-07-16 부동산공법 1-1 개발행위허가 제한 (재도전)","conceptKey":"부동산공법 개발행위허가 제한","retryOf":"부동산공법 개발행위허가 제한"},
  {"type":"계산","cat":"부동산공법","q":"다음 조건에서 도시개발사업 시행자가 실시계획의 변경인가를 받지 않고 증액할 수 있는 사업비의 최대 금액은? (다른 조건은 동일)<br>· 인가받은 실시계획상 총사업비: 300억원<br>· 변경인가 없이 증액 가능한 비율: 사업비의 100분의 10","opts":["10억원","15억원","20억원","30억원"],"answer":3,"expl":"변경인가 없이 증액할 수 있는 한도는 사업비의 10%이므로 300억원 × 0.1 = 30억원이다. 경미한 증액까지 매번 변경인가를 요구하면 사업이 지연되므로 일정 비율까지 재량을 준 것이다. 비율을 잘못 적용하거나 10%를 전체 사업비로 오인하는 것이 함정이다.","src":"2026-07-16 부동산공법 2-3 실시계획 변경","conceptKey":"부동산공법 2-3 실시계획 사업비 증액","calc":{"expr":"30000000000*0.1","expected":3000000000}},
  {"type":"조합","cat":"부동산공법","q":"국토의 계획 및 이용에 관한 법률상 도시·군관리계획 입안 시 기초조사를 전부 생략할 수 있는 경우를 모두 고른 것은?<br>ㄱ. 도시·군계획시설결정을 해제하려는 경우<br>ㄴ. 지구단위계획구역이 상업지역에 위치하는 경우<br>ㄷ. 다른 법률에 따라 지역·지구 등이 지정되어 규제가 이루어지는 경우<br>ㄹ. 주거지역에 도시혁신구역을 새로 지정하려는 경우","opts":["ㄱ, ㄴ, ㄷ","ㄱ, ㄹ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"answer":0,"expl":"계획시설 결정 해제, 지구단위계획구역이 상업지역인 경우, 다른 법률로 이미 규제되는 경우는 조사 실익이 없어 기초조사를 전부 생략한다. 땅값이 비싸거나 규제가 겹치는 곳은 다시 조사할 필요가 없기 때문이다. 새로 조사가 필요한 도시혁신구역 지정까지 생략에 끼워 넣는 것이 함정이다.","src":"2026-07-14 부동산공법 4-2 기초조사 생략","conceptKey":"부동산공법 4-2 기초조사 전부 생략"},
  {"type":"사례","cat":"부동산공법","q":"갑은 재건축사업 조합을 통해 노후 아파트를 재건축하려 한다. 이에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["사업시행구역이 일반주거지역이면 원칙적으로 공동주택 외의 건물은 지을 수 없다.","사업시행구역이 준주거지역이나 상업지역이면 공동주택 외의 건축물도 지을 수 있다.","조합설립인가를 받지 못한 채 3년이 지나도 시장·군수는 재건축사업을 직접 시행할 수 없다.","재건축진단 실시요청은 토지등소유자 10분의 1 이상의 동의로 할 수 있다."],"answer":2,"expl":"조합설립인가를 받지 못하고 3년이 지나면 시장·군수 등이 재건축사업을 직접 시행할 수 있다. 사업이 장기 표류하는 것을 막으려는 공적 개입 장치다. '할 수 없다'로 방향을 뒤집어 공적 시행 권한을 지우는 것이 함정이다.","src":"2026-07-16 부동산공법 3-2 재건축사업","conceptKey":"부동산공법 3-2 재건축 직접시행"},
  {"type":"일반","cat":"부동산공법","q":"🔁 국토의 계획 및 이용에 관한 법률상 공간재구조화계획에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["도시혁신구역과 복합용도구역은 도시·군관리계획이 아니라 공간재구조화계획으로 결정한다.","공간재구조화계획의 결정권자에는 시·도지사뿐 아니라 대도시 시장도 포함된다.","주민이 공간재구조화계획 입안을 제안할 때 동의요건 산정에서 국공유지는 제외한다.","공간재구조화계획으로 도시혁신구역·복합용도구역·입체복합구역을 지정할 수 있다."],"answer":1,"expl":"공간재구조화계획의 결정권자는 도시·군관리계획과 대체로 같지만 대도시 시장은 결정권자에서 제외된다. 구조 재편이라는 중대성 때문에 결정 주체를 시·도지사 이상으로 올린 것이다. 관리계획과 똑같이 대도시 시장을 결정권자로 끼워 넣는 것이 함정이다.","src":"2026-07-14 부동산공법 5-2 공간재구조화 결정 (재도전)","conceptKey":"부동산공법 공간재구조화계획","retryOf":"부동산공법 공간재구조화계획"},
  {"type":"OX","cat":"부동산공법","q":"지구단위계획은 도시·군계획 수립 대상지역의 전부에 대하여 수립하여야 한다. (O/X)","opts":["O","X"],"answer":1,"expl":"X. 지구단위계획은 대상지역의 전부가 아니라 일부에 대해 수립하는 부분·상세 계획이다. 특정 구역을 정밀하게 관리하려는 제도라 구역 전체를 대상으로 하지 않는다. '전부'라는 단어로 전면 계획인 것처럼 착각하게 만드는 것이 함정이다.","src":"2026-07-14 부동산공법 1-1 지구단위계획","conceptKey":"부동산공법 1-1 지구단위계획 범위"},
  {"type":"조합","cat":"부동산공법","q":"국토의 계획 및 이용에 관한 법률상 주민이 도시·군관리계획의 입안을 제안할 수 있는 사항을 모두 고른 것은?<br>ㄱ. 기반시설의 설치·정비 또는 개량<br>ㄴ. 지구단위계획구역의 지정 및 지구단위계획의 수립<br>ㄷ. 산업·유통개발진흥지구의 지정<br>ㄹ. 입체복합구역의 지정","opts":["ㄱ, ㄴ","ㄱ, ㄷ, ㄹ","ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"answer":3,"expl":"기반시설, 지구단위계획(구역), 산업·유통개발진흥지구, 입체복합구역은 모두 주민 입안제안 대상이다('용산기지입'). 주민 이해관계가 큰 개발·정비 사항에 제안권을 열어둔 것이다. 넷 다 대상인데 하나를 빼서 부분조합을 정답처럼 보이게 하는 것이 함정이다.","src":"2026-07-14 부동산공법 4-1 주민 입안 제안","conceptKey":"부동산공법 4-1 주민 입안제안 대상"},
  {"type":"일반","cat":"부동산공법","q":"건축법령상 용도변경·건축신고 및 특수구조 건축물에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["용도변경하려는 부분의 바닥면적이 50㎡ 이상이면 반드시 사용승인을 받아야 한다.","건축신고만으로 건축허가를 받은 것으로 볼 수 있는 것은 바닥면적 200㎡ 미만이고 3층 미만인 건축물이다.","차양이 외벽의 중심선으로부터 3m 이상 돌출된 건축물은 특수구조 건축물에 해당한다.","연면적 5,000㎡ 이상인 판매시설·의료시설 등은 다중이용건축물에 해당한다."],"answer":0,"expl":"용도변경으로 사용승인을 받아야 하는 기준 면적은 50㎡가 아니라 100㎡ 이상이다. 일정 규모 이상의 용도변경만 준공확인 절차에 태우려는 것이다. 200㎡·5,000㎡ 등 다른 면적 기준 사이에 50㎡를 끼워 숫자를 바꿔치기하는 것이 함정이다.","src":"2026-07-16 부동산공법 4-1·4-2 용도변경·건축신고","conceptKey":"부동산공법 4-1 용도변경 사용승인"},
  {"type":"계산","cat":"공인중개사법","q":"부동산 거래신고를 거짓으로 한 경우 부과할 수 있는 과태료의 상한액은? (다른 조건은 동일)<br>· 신고된 부동산의 실제 취득가액: 5억원<br>· 과태료 상한 기준: 취득가액의 100분의 10 이하","opts":["1천만원","3천만원","5천만원","5억원"],"answer":2,"expl":"거짓 부동산거래신고의 과태료 상한은 취득가액의 100분의 10이므로 5억원 × 0.1 = 5,000만원이다. 거래가액을 속인 이익에 비례해 제재를 설계한 것이다. 취득가액 자체(5억원)나 다른 비율을 답으로 유도하는 것이 함정이다.","src":"2026-07-21 공인중개사법 부동산거래신고 과태료","conceptKey":"공인중개사법 거짓 거래신고 과태료","calc":{"expr":"500000000*0.1","expected":50000000}},
  {"type":"일반","cat":"공인중개사법","q":"🔁 공인중개사법령상 중개보수와 업무보증에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["무등록 중개업자가 의뢰인과 체결한 중개보수 약정은 무효이다.","무등록 중개업자도 실제로 중개를 완성했다면 약정한 중개보수를 청구할 수 있다.","법인인 개업공인중개사가 다른 법률에 따라 중개업을 겸하는 경우 업무보증은 2천만원을 설정하면 된다.","등록관청은 개설등록 신청을 받으면 7일 이내에 등록하고 그 사실을 통지하여야 한다."],"answer":1,"expl":"무등록 중개업자의 중개보수 약정은 무효라 실제로 중개를 완성했더라도 보수를 청구할 수 없다. 등록이라는 최소 요건을 갖추지 못한 자의 보수청구를 막아 거래질서를 지키려는 취지다. '중개를 완성하면 청구할 수 있다'며 유효로 뒤집는 것이 함정이다.","src":"2026-07-15 공인중개사법 1-6·1-7 중개보수·업무보증 (재도전)","conceptKey":"공인중개사법 §1 중개보수·업무보증","retryOf":"공인중개사법 §1 중개보수·업무보증"},
  {"type":"조합","cat":"공인중개사법","q":"부동산 거래신고 등에 관한 법률상 토지거래허가에 관한 설명으로 옳은 것을 모두 고른 것은?<br>ㄱ. 농지에 대해 토지거래계약 허가를 받으면 농지취득자격증명을 받은 것으로 본다.<br>ㄴ. 국토교통부장관은 시·도지사의 허가구역 지정 해제 요청이 이유 있으면 지정을 해제할 수 있다.<br>ㄷ. 허가를 받지 않고 체결한 토지거래계약은 그 효력이 발생하지 않는다.<br>ㄹ. 외국인이 다른 법률에 따라 토지취득 허가를 받았어도 별도로 토지거래허가를 받아야 한다.","opts":["ㄱ, ㄹ","ㄴ, ㄷ","ㄱ, ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ"],"answer":3,"expl":"농지 토지거래허가는 농지취득자격증명을 갈음하고, 국장은 해제요청이 이유 있으면 허가구역을 해제할 수 있으며, 무허가 계약은 효력이 발생하지 않는다. 반면 외국인이 다른 법률로 토지취득 허가를 받으면 토지거래허가는 면제된다. 면제 대상을 '별도 허가 필요'로 뒤집는 ㄹ이 함정이다.","src":"2026-07-21 공인중개사법 토지거래허가","conceptKey":"공인중개사법 토지거래허가 효력·의제"},
  {"type":"일반","cat":"공인중개사법","q":"부동산 거래신고 등에 관한 법률상 토지거래계약 허가 위반에 대한 이행명령과 이행강제금에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["이행강제금을 반복 부과할 때 부과 횟수의 기산일은 이행강제금을 처음 부과한 날로 한다.","이행명령은 문서로 하여야 하며 이행기간은 3개월 이내로 정하여야 한다.","이행강제금 부과 전에 상당한 기간을 정한 이행명령이 선행되어야 한다.","허가받은 목적대로 이용하지 않은 토지에 대해 이행강제금을 부과할 수 있다."],"answer":0,"expl":"이행강제금 반복 부과의 기산일은 '최초의 이행명령이 있었던 날'을 기준으로 한다. 이행명령 시점을 기준선으로 삼아야 반복 부과 주기가 일관되기 때문이다. 기산점을 '처음 부과한 날'로 바꿔 한 박자 늦추는 것이 함정이다.","src":"2026-07-21 공인중개사법 이행강제금","conceptKey":"공인중개사법 이행강제금 기산일"},
  {"type":"계산","cat":"공인중개사법","q":"토지거래허가구역에서 허가를 받지 않고 토지거래계약을 체결한 자에게 부과할 수 있는 벌금의 상한액은? (다른 조건은 동일)<br>· 거래 당시 해당 토지의 개별공시지가: 4억원<br>· 벌금 상한 기준: 개별공시지가의 100분의 30","opts":["4천만원","8천만원","1억 2천만원","4억원"],"answer":2,"expl":"무허가 토지거래의 벌금 상한은 개별공시지가의 100분의 30이므로 4억원 × 0.3 = 1억 2,000만원이다. 토지 가치에 비례해 제재 강도를 정한 것이다. 개별공시지가 전액(4억원)이나 다른 비율을 답으로 끌어들이는 것이 함정이다.","src":"2026-07-21 공인중개사법 토지거래허가 벌칙","conceptKey":"공인중개사법 토지거래허가 위반 벌금","calc":{"expr":"400000000*0.3","expected":120000000}},
  {"type":"조합","cat":"공인중개사법","q":"부동산 거래신고 등에 관한 법률상 외국인 등의 부동산 취득 신고와 포상금에 관한 설명으로 옳은 것을 모두 고른 것은?<br>ㄱ. 외국인의 부동산 취득 관련 과태료 사유는 포상금 지급대상 위반행위에 포함되지 않는다.<br>ㄴ. 외국인이 신고한 취득·계속보유 내용은 특별자치시장이 매 분기 종료일부터 1개월 이내에 국토교통부장관에게 직접 제출한다.<br>ㄷ. 부동산 거래신고 관련 포상금은 지급신청서가 접수된 날부터 2개월 이내에 지급한다.<br>ㄹ. 외국인이 다른 법률에 따라 토지취득 허가를 받아도 토지거래허가는 면제되지 않는다.","opts":["ㄱ, ㄹ","ㄱ, ㄴ, ㄷ","ㄴ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"answer":1,"expl":"외국인 관련 과태료 사유는 포상금 대상이 아니고, 외국인 신고내용은 특별자치시장이 분기 종료일부터 1개월 내 국장에게 직접 제출하며, 포상금은 신청 접수일부터 2개월 내 지급한다. 외국인이 다른 법률로 토지취득 허가를 받으면 토지거래허가는 면제되므로 ㄹ이 틀린다. 면제를 '면제되지 않는다'로 뒤집는 것이 함정이다.","src":"2026-07-21 공인중개사법 외국인 취득·포상금","conceptKey":"공인중개사법 외국인 신고·포상금"},
  {"type":"OX","cat":"공인중개사법","q":"구(區)가 설치된 시의 시장은 공인중개사 중개사무소 개설등록의 등록관청이 아니다. (O/X)","opts":["O","X"],"answer":0,"expl":"O. 구가 설치된 시에서는 시장이 아니라 구청장이 등록관청이 된다. 실제 인허가 사무를 자치구 단위에서 처리하도록 권한을 배분한 것이다. '시의 시장'이라는 익숙한 표현에 이끌려 등록관청으로 답하게 만드는 것이 함정이다.","src":"2026-07-15 공인중개사법 1-4 등록관청","conceptKey":"공인중개사법 1-4 등록관청"},
  {"type":"사례","cat":"공인중개사법","q":"개업공인중개사 갑은 위반행위로 등록취소 사유가 발생하자 폐업신고를 하였다가 다시 개설등록을 하려고 한다. 이에 관한 설명으로 옳은 것은?","opts":["폐업신고를 하면 폐업 전의 위반사유로는 어떠한 처분도 할 수 없다.","폐업기간과 무관하게 폐업 전의 위반사유로는 재등록 후 등록취소를 할 수 없다.","폐업 전의 위반으로 등록이 취소되면 취소일부터 다시 3년 전부를 결격기간으로 한다.","폐업 전의 위반사유로 등록이 취소된 경우 3년에서 폐업기간을 공제한 기간 동안 결격사유가 된다."],"answer":3,"expl":"폐업 전 위반으로 등록이 취소되면 결격기간은 3년에서 이미 지난 폐업기간을 공제한 기간이다. 폐업으로 제재를 회피하지 못하게 하면서도 이미 영업을 쉰 기간은 반영해 주는 것이다. '3년 전부'로 계산하거나 폐업하면 처분 자체가 불가능하다고 오인하게 하는 것이 함정이다.","src":"2026-07-15 공인중개사법 1-7 재등록과 결격","conceptKey":"공인중개사법 1-7 폐업 후 재등록 결격"},
  {"type":"일반","cat":"공인중개사법","q":"중개실무상 토지의 경계 확인에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["토지의 경계는 토지대장만으로는 확인할 수 없고 지적도나 임야도를 통해 확인한다.","지적공부상 경계와 실제 담장 등의 현황경계가 서로 다를 수 있다.","토지의 경계는 실제의 현황경계에 따라 확정되는 것이 원칙이다.","경계에 분쟁이 있어도 원칙적으로 지적공부에 등록된 경계에 따라 확정된다."],"answer":2,"expl":"토지의 경계는 실제 현황경계가 아니라 지적공부(지적도·임야도)에 등록된 공부상 경계에 따라 확정되는 것이 원칙이다. 공적 장부에 의한 획일적 기준이 있어야 거래안전이 확보되기 때문이다. 눈에 보이는 현황경계를 기준으로 삼게 유도하는 것이 함정이다.","src":"2026-07-21 공인중개사법 토지 경계 확인","conceptKey":"공인중개사법 토지 경계 확정"},
  {"type":"일반","cat":"부동산세법","q":"지방세법령상 취득세의 과세와 세율 적용에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["환매등기를 병행하는 매매로 소유권을 다시 취득하는 경우에도 취득 표준세율을 그대로 적용한다.","개수(改修)로 종전 면적의 변동 없이 취득으로 보는 경우에는 등기 관련 세액을 빼고 중과기준세율만을 적용한다.","대도시 중과세는 영리법인과 비영리법인 모두에게 적용된다.","공유수면을 매립·간척하여 취득한 농지는 원시취득으로 본다."],"answer":0,"expl":"환매등기를 병행해 소유권을 되찾는 것은 형식적 취득이라 표준세율을 그대로 쓰지 않고 표준세율에서 중과기준세율을 뺀 세율을 적용한다. 실질적 재산 증가가 아니라 등기 형식만 되돌리는 것이라 부담을 낮춘 것이다. '표준세율 그대로'라고 하여 형식적 취득의 감경을 지우는 것이 함정이다.","src":"2026-07-11 부동산세법 1-1 취득세 세율 적용","conceptKey":"부동산세법 1-1 형식적 취득 세율"},
  {"type":"계산","cat":"부동산세법","q":"다음 자료로 계산한 총결정세액은? (다른 조건은 동일)<br>· 과세표준: 2억원<br>· 세율: 20%<br>· 감면세액: 500만원<br>· 가산세: 300만원","opts":["3,500만원","3,800만원","4,000만원","4,300만원"],"answer":1,"expl":"산출세액(과세표준×세율) 4,000만원에서 감면세액 500만원을 빼 결정세액 3,500만원을 구하고, 여기에 가산세 300만원을 더하면 총결정세액 3,800만원이다. 감면은 빼고 가산세는 더하는 순서가 핵심이다. 감면 전 산출세액(4,000만원)이나 가산세를 빠뜨린 결정세액(3,500만원)을 답으로 유도하는 것이 함정이다.","src":"2026-07-12 부동산세법 1-2 세액 계산 구조","conceptKey":"부동산세법 1-2 총결정세액 계산","calc":{"expr":"200000000*0.2 - 5000000 + 3000000","expected":38000000}},
  {"type":"조합","cat":"부동산세법","q":"지방세법령상 재산세의 과세대상과 분리과세에 관한 설명으로 옳은 것을 모두 고른 것은?<br>ㄱ. 토지에 대한 재산세 과세대상은 종합합산·별도합산·분리과세 대상으로 구분한다.<br>ㄴ. 한국농어촌공사 등이 법령에 따라 제공하는 농지는 비과세가 아니라 저율분리과세 대상이다.<br>ㄷ. 주택이 철거명령을 받았더라도 그 부속토지에 대한 재산세는 부과된다.<br>ㄹ. 주택에 대한 재산세도 종합합산·별도합산·분리과세로 구분하여 과세한다.","opts":["ㄱ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ","ㄷ, ㄹ","ㄱ, ㄴ, ㄷ"],"answer":3,"expl":"토지는 종합합산·별도합산·분리과세로 3분류하고, 저율분리과세는 비과세가 아니며, 철거명령을 받아도 부속토지 재산세는 부과된다. 반면 주택은 토지처럼 3분류하지 않고 구분 없이 누진세율로 과세하므로 ㄹ이 틀린다. 토지 분류 체계를 주택에까지 그대로 옮겨 붙이는 것이 함정이다.","src":"2026-07-11 부동산세법 1-4 재산세 과세대상 분류","conceptKey":"부동산세법 1-4 재산세 분리과세"},
  {"type":"OX","cat":"부동산세법","q":"1구(構)의 건물이 주거와 주거 외의 용도로 함께 쓰일 때 주거용 부분이 50% 이상이면 그 건물 전체를 주택으로 본다. (O/X)","opts":["O","X"],"answer":0,"expl":"O. 1구의 건물에서 주거용으로 쓰이는 부분이 50% 이상이면 건물 전체를 주택으로 본다. 주된 이용현황을 기준으로 과세대상을 단순화하려는 것이다. '주거용 부분만 주택으로 본다'는 1동 건물의 안분 기준과 혼동하게 만드는 것이 함정이다.","src":"2026-07-11 부동산세법 1-3 주택 판정 기준","conceptKey":"부동산세법 1-3 주택 판정 50%"},
  {"type":"사례","cat":"부동산세법","q":"갑은 국내에 주택 2채를 보유하며 A주택은 월세로, B주택은 전세(보증금만 받음)로 임대하고 있다. 두 주택 모두 고가주택이 아닐 때, 갑의 주택임대소득 과세에 관한 설명으로 옳은 것은? (다른 조건은 동일)","opts":["2주택자이므로 월세와 전세보증금 모두에 대해 소득세가 과세된다.","비고가주택이므로 월세와 전세 어느 것에도 과세되지 않는다.","A주택의 월세 임대료에 대해서만 소득세가 과세된다.","B주택의 전세보증금에 대한 간주임대료만 과세된다."],"answer":2,"expl":"2주택이고 모두 비고가주택이면 전세보증금은 간주임대료 과세요건을 갖추지 못해 월세 임대료에만 과세된다. 소형·비고가 2주택의 전세는 과세 대상에서 빼주기 때문이다. 2주택이라는 이유로 전세보증금까지 과세된다고 확장하는 것이 함정이다.","src":"2026-07-12 부동산세법 2-3 월세·전세 과세","conceptKey":"부동산세법 2-3 주택임대소득 월세·전세"},
  {"type":"일반","cat":"부동산세법","q":"종합부동산세법령상 주택에 대한 종합부동산세에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["동거봉양이나 혼인으로 1세대가 2주택이 된 경우 별도 신청 없이 1세대 1주택자로 보아준다.","1주택과 다른 주택의 부속토지를 함께 소유하면 2주택자로 보아 1세대 1주택 특례를 적용하지 않는다.","합산배제주택 보유현황 신고는 9월 16일부터 9월 30일 사이에 한다.","주택분 종합부동산세에서 토지와 달리 주택은 연령별·보유기간별 세액공제를 받을 수 있다."],"answer":1,"expl":"1주택과 다른 주택의 '부속토지'를 함께 가진 경우는 1세대 1주택으로 보아준다. 토지는 주택 수에 산입하지 않기 때문이다. 부속토지 소유를 2주택으로 계산해 특례를 배제하는 것이 함정이다.","src":"2026-07-11 부동산세법 1-6 1세대 1주택 특례","conceptKey":"부동산세법 1-6 종부세 1세대1주택 특례"},
  {"type":"일반","cat":"부동산세법","q":"소득세법령상 1세대 1주택 양도소득세 비과세 및 농지의 교환·분합에 관한 설명으로 옳은 것은?","opts":["취학이나 근무상 형편으로 다른 시·군으로 이전하는 경우에도 원칙적인 보유기간과 거주기간 요건을 모두 충족하여야만 비과세가 적용된다.","농지를 교환·분합할 때 두 토지가액의 차액이 큰 쪽 가액의 2분의 1을 넘어도 비과세된다.","고가주택은 양도가액 전부에 대하여 양도차익과 장기보유특별공제를 계산한다.","취학 등 부득이한 사유로 다른 시·군으로 이전하는 경우에는 1년 이상 거주 요건만 충족하면 비과세될 수 있다."],"answer":3,"expl":"취학·근무·질병 등 부득이한 사유로 이전하는 경우에는 보유·거주기간 제한이 완화되어 '1년 이상 거주' 요건만으로 비과세될 수 있다. 불가피한 이주자에게 과중한 요건을 지우지 않으려는 것이다. 농지 교환·분합의 '차액 4분의 1 이내' 기준을 2분의 1로 늘리는 등 숫자를 키우는 것이 함정이다.","src":"2026-07-12 부동산세법 1-1 1세대 1주택 비과세","conceptKey":"부동산세법 1-1 부득이한 사유 비과세"},
  {"type":"일반","cat":"부동산세법","q":"종합부동산세법령상 납세의무와 부과·징수에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["종합부동산세의 소멸시효기간은 10년이다.","종합부동산세는 부과고지 방식이어서 무신고가산세를 부과하지 않는다.","법인으로 보는 단체나 공익법인 등은 개인으로 보아 그의 거주지에 종합부동산세를 부과한다.","공제기준금액에 미달하는 주택 등은 종합부동산세 과세대상이 아닌 것으로 본다."],"answer":0,"expl":"종합부동산세의 소멸시효는 10년이 아니라 5년이다. 국세의 소멸시효 체계 안에서 정해진 기간이다. 5년을 10년으로 늘려 다른 채권의 시효와 혼동하게 만드는 것이 함정이다.","src":"2026-07-11 부동산세법 1-7 종부세 부과 방식","conceptKey":"부동산세법 1-7 종부세 소멸시효·부과"},
  {"type":"조합","cat":"민법","q":"민법 제108조 제2항의 '제3자'에 해당하는 자를 모두 고른 것은?<br>ㄱ. 가장매매의 매수인으로부터 그 목적물을 다시 매수하여 이전등기를 마친 자<br>ㄴ. 채권의 가장양수인으로부터 추심을 위하여 그 채권을 양수한 자<br>ㄷ. 가장매매의 매수인에 대한 파산선고로 선임된 파산관재인<br>ㄹ. 가장매매의 매수인으로부터 그 부동산에 저당권을 설정받은 자","opts":["ㄱ, ㄴ","ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ, ㄹ"],"answer":2,"expl":"가장매매 목적물의 전득자, 파산관재인, 저당권을 설정받은 자는 가짜 외형 위에 새로운 법률상 이해관계를 맺어 제3자로 보호된다. 반면 추심을 위해 채권을 넘겨받은 자는 새로운 이해관계가 아니라 대신 받아주는 지위라 제3자가 아니다. '추심을 위하여'라는 문구를 흘려 제3자로 묶는 것이 함정이다.","src":"2026-07-13 민법 5 통정허위표시 제3자","conceptKey":"민법 108조 제3자 범위"},
  {"type":"일반","cat":"민법","q":"반사회질서의 법률행위(민법 제103조)에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["소송에서 사실대로 증언하여 줄 것을 조건으로 통상적으로 용인될 수 있는 수준을 넘는 대가를 지급하기로 약정하면 반사회질서 행위가 될 수 있다.","도박채무 변제를 위해 처분을 위임받은 채권자가 그 사정을 모르는 제3자와 맺은 매매계약은 반사회질서 행위로 무효이다.","불공정한 법률행위의 요건을 갖추지 못한 법률행위라도 반사회질서 행위가 될 수 있다.","명의수탁자의 신탁부동산 처분에 제3자가 그 배임행위에 적극 가담하면 그 매매는 반사회질서 행위로 무효이다."],"answer":1,"expl":"도박채무 변제를 위해 처분을 위임받은 채권자가 그 사정을 모르는 제3자와 맺은 매매는 반사회질서 행위가 아니다. 무효인 원인관계와 분리된 별개의 정상 거래이기 때문이다. 앞선 도박이라는 반사회성을 뒤의 매매까지 전염시켜 무효로 보게 하는 것이 함정이다.","src":"2026-07-13 민법 1 반사회질서 법률행위","conceptKey":"민법 103조 반사회질서 사례"},
  {"type":"일반","cat":"민법","q":"진의 아닌 의사표시(비진의표시, 민법 제107조)에 관한 설명으로 옳은 것은?","opts":["타인에게 돈을 빌리도록 자기 이름을 빌려준 명의대여자의 대출 의사표시는 비진의표시이다.","표의자가 의사와 표시의 불일치를 알지 못하고 한 경우에도 비진의표시가 성립한다.","표의자가 진의와 다름을 알지 못한 데 과실이 있으면 비진의표시로 다루어진다.","표의자가 의사와 표시가 다름을 알면서 한 경우라야 비진의표시가 성립한다."],"answer":3,"expl":"비진의표시는 표의자가 의사와 표시의 불일치를 '알면서' 한 경우라야 성립하고, 알지 못하고 했다면 그것은 착오의 문제다. 알았는지가 두 제도를 가르는 기준이라 과실 유무는 성립요건이 아니다. '모르고 했어도 비진의' 또는 명의대여 대출을 비진의로 보게 하는 것이 함정이다.","src":"2026-07-13 민법 3 비진의표시","conceptKey":"민법 107조 비진의와 착오"},
  {"type":"OX","cat":"민법","q":"타인이 대출받도록 자신의 명의를 빌려준 자가 은행에 대하여 한 대출 의사표시는 진의 아닌 의사표시(비진의표시)에 해당한다. (O/X)","opts":["O","X"],"answer":1,"expl":"X. 명의를 빌려준 자도 자신이 대출의 법적 효과를 받겠다는 의사는 진정으로 가진 것이라 비진의표시가 아니다. 표시대로의 효과의사가 존재하기 때문이다. '실제 돈을 쓰는 사람이 따로 있으니 진의가 없다'고 보게 만드는 것이 함정이다.","src":"2026-07-13 민법 3 명의대여 대출","conceptKey":"민법 107조 명의대여 대출"},
  {"type":"일반","cat":"민법","q":"착오에 의한 의사표시(민법 제109조)에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["법률에 관한 착오는 그 착오가 중요 부분에 관한 것이라도 취소의 대상이 되지 않는다.","착오를 이유로 취소하여 손해를 입은 상대방은 표의자에게 손해배상을 청구할 수 없다.","표의자에게 중대한 과실이 있다는 점은 법률행위의 효력을 주장하는 상대방이 증명하여야 한다.","표의자는 착오가 있었다는 사실과 그 착오가 의사표시에 결정적 영향을 미쳤다는 점을 증명하여야 한다."],"answer":0,"expl":"법률에 관한 착오도 그것이 법률행위의 중요 부분에 관한 것이면 취소할 수 있다. 착오의 대상을 사실에만 한정할 이유가 없기 때문이다. '법률 착오는 취소 불가'라고 하여 대상을 좁히는 것이 함정이다.","src":"2026-07-13 민법 6 착오","conceptKey":"민법 109조 착오 대상·입증"},
  {"type":"사례","cat":"민법","q":"갑은 을과 통정하여 자신의 X부동산을 을에게 파는 것처럼 가장매매하고 이전등기를 마쳤다. 을은 이 사정을 아는 병에게 X를 다시 팔고 이전등기를 해 주었다. 이에 관한 설명으로 옳은 것은?","opts":["병은 등기를 마쳤으므로 선의·악의를 불문하고 X의 소유권을 확정적으로 취득한다.","갑과 을 사이의 가장매매도 일단 유효한 것으로 취급되므로 갑은 병을 상대로 그 소유권이전등기의 말소를 청구할 수 없다.","병이 악의이면 X를 취득할 수 없고, 갑은 을을 대위하지 않고도 병에게 직접 등기말소를 청구할 수 있다.","갑은 을에 대한 채권을 보전하기 위해서만 병에게 말소를 청구할 수 있다."],"answer":2,"expl":"가장매매는 무효이고 전득자 병이 악의이면 보호받지 못해 소유권을 취득하지 못한다. 소유권이 진정으로 을을 거쳐 간 것이 아니므로 갑은 대위 없이 자신의 소유권에 기해 병에게 직접 말소를 청구할 수 있다. 등기만 있으면 악의자도 취득한다거나 반드시 채권자대위를 거쳐야 한다고 보게 하는 것이 함정이다.","src":"2026-07-13 민법 5 통정허위표시 악의의 제3자","conceptKey":"민법 108조 악의 전득자"},
  {"type":"일반","cat":"민법","q":"채권자취소권 및 관련 법률행위에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["채권자취소권은 금전채권을 보전하기 위하여 행사하는 것이 원칙이다.","특정물의 이전을 구하는 채권을 보전하기 위해서도 채권자취소권을 행사할 수 있다.","통정허위표시로 이루어진 법률행위에 대해서는 채권자취소권을 행사할 수 있다.","이중매매의 경우에는 금전채권이 문제되는 것이 아니어서 채권자취소권이 행사될 여지가 없다."],"answer":1,"expl":"채권자취소권은 금전채권을 보전하기 위한 제도라 특정물의 이전을 구하는 채권을 위해서는 행사할 수 없다. 책임재산의 감소를 회복해 금전적 만족을 확보하려는 취지이기 때문이다. 특정물채권에까지 취소권을 열어 주는 것이 함정이다.","src":"2026-07-13 민법 1 채권자취소권","conceptKey":"민법 채권자취소권 금전채권"},
  {"type":"일반","cat":"민법","q":"등기의 효력 및 명의신탁 부동산의 처분에 관한 설명으로 옳은 것은?","opts":["우리 등기에는 공신력이 인정되므로 무효인 등기를 믿고 거래한 제3자는 언제나 보호된다.","원인행위가 무효이면 등기는 무효이지만 그 후 이를 기초로 새로 마쳐진 제3자 명의의 등기는 유효하다.","명의수탁자가 신탁부동산을 처분하면 제3자의 인식과 무관하게 그 처분은 언제나 유효하다.","무효인 등기에 터 잡아 제3자가 등기를 마쳐도 등기에 공신력이 없어 그 등기 역시 무효가 된다."],"answer":3,"expl":"우리 부동산등기에는 공신력이 없어 무효인 등기에 이어진 제3자 명의의 등기도 무효가 된다. 진정한 권리관계에 부합하지 않는 등기를 믿었다는 사정만으로 권리를 인정하지 않는 것이다. 등기를 믿었으니 보호된다며 공신력이 있는 것처럼 유도하는 것이 함정이다.","src":"2026-07-13 민법 2 등기의 공신력","conceptKey":"민법 등기 공신력 부정"},
  {"type":"일반","cat":"부동산학개론","q":"🔁 거미집이론(모형)에 관한 설명으로 옳은 것은? (다른 조건은 동일)","opts":["수요곡선 기울기의 절댓값이 공급곡선 기울기의 절댓값보다 작으면 수렴형이 된다.","수요와 공급의 가격탄력성이 같으면 발산형이 된다.","공급곡선 기울기의 절댓값이 수요곡선 기울기의 절댓값보다 크면 수렴형이 된다.","가격이 변하면 공급량이 같은 기(期)에 즉시 조정된다는 것을 전제로 한다."],"answer":2,"expl":"기울기 기준으로는 공급곡선 기울기의 절댓값이 수요곡선보다 크면(공급이 더 비탄력적이면) 진동이 줄어드는 수렴형이 된다. 공급이 가격변화에 둔감할수록 조정폭이 작아지기 때문이다. 기울기 대소를 뒤집거나 '탄력성이 같으면 발산'(실제는 순환)으로 바꾸는 것이 함정이다.","src":"2026-07-09 부동산학개론 거미집이론 (재도전)","conceptKey":"부동산학개론 §1 거미집이론","retryOf":"부동산학개론 §1 거미집이론"},
  {"type":"일반","cat":"부동산학개론","q":"🔁 부동산시장의 특성과 완전경쟁시장에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["토지의 개별성은 부동산시장을 완전경쟁시장에 가깝게 만드는 요인이다.","완전경쟁시장의 요건 중 하나는 상품의 동질성, 즉 재화가 표준화되어 서로 완전히 대체될 수 있다는 것이다.","토지의 개별성으로 인해 부동산은 서로 완전한 대체가 어렵다.","부동산시장은 상품의 개별성 때문에 불완전경쟁시장이 되기 쉽다."],"answer":0,"expl":"토지의 개별성은 재화의 완전대체를 막아 부동산시장을 불완전경쟁시장으로 만드는 요인이다. 완전경쟁의 요건인 상품의 동질성이 개별성 때문에 깨지기 때문이다. 개별성을 오히려 완전경쟁에 가깝게 하는 요인으로 방향을 뒤집는 것이 함정이다.","src":"2026-07-17 부동산학개론 총론 시장이론 (재도전)","conceptKey":"부동산학개론 §1 시장이론","retryOf":"부동산학개론 §1 시장이론"},
  {"type":"OX","cat":"부동산학개론","q":"주택은 사람이 장기간 거주할 수 있는 구조로 되어 있는 건축물을 말한다. (O/X)","opts":["O","X"],"answer":0,"expl":"O. 주택은 사람이 장기간 거주할 수 있는 구조를 갖춘 건축물을 말한다. 일시 체류가 아니라 지속적 주거를 전제로 하는 개념이라 구조의 항구성이 기준이 된다. 단기 숙박시설과 같은 일시 거주 시설을 주택으로 보게 만드는 것이 함정이다.","src":"2026-07-17 부동산학개론 총론 주택의 개념","conceptKey":"부동산학개론 총론 주택 정의"},
  {"type":"일반","cat":"부동산학개론","q":"🔁 주택시장의 여과과정(filtering)과 주거분리에 관한 설명으로 옳은 것은?","opts":["상향여과는 고소득층이 사용하던 주택이 저소득층에게 이전되는 현상이다.","상향여과는 저소득층이 사용하던 주택이 개량 등을 통해 고소득층의 사용으로 전환되는 현상이다.","주거분리는 소득계층과 관계없이 주거지가 무작위로 혼재되는 현상이다.","하향여과가 발생하려면 고소득층 주거지역에서 정(+)의 외부효과가 나타나야 한다."],"answer":1,"expl":"상향여과는 저소득층이 쓰던 주택이 재개발·개량으로 고소득층의 사용으로 올라가는 흐름이다. 노후주택에 자본이 투입되어 상위 시장으로 이동하는 것이다. 상향여과와 하향여과의 방향을 맞바꾸거나 주거분리를 무작위 혼재로 보게 하는 것이 함정이다.","src":"2026-07-09 부동산학개론 여과·주거분리 (재도전)","conceptKey":"부동산학개론 §2 여과·주거분리","retryOf":"부동산학개론 §2 여과·주거분리"},
  {"type":"일반","cat":"부동산학개론","q":"부동산학개론 및 건축 관련 법령상 다중주택에 관한 설명으로 <b>옳지 않은</b> 것은?","opts":["다중주택은 각 실(室)마다 독립된 취사시설을 갖추어 세대별로 독립 주거가 가능한 구조이다.","다중주택은 여러 사람이 장기간 거주할 수 있는 하숙집과 같은 형태이다.","다중주택은 독립된 주거 형태를 갖추지 않은 것이어야 한다.","다중주택은 각 실이 독립된 주거가 되도록 취사시설을 따로 갖추어서는 안 된다."],"answer":0,"expl":"다중주택은 독립된 주거 형태가 아니어야 하므로 각 실이 독립 취사시설을 갖추면 다중주택이 아니다. 취사시설의 독립 여부가 다중주택과 다세대·다가구를 가르는 핵심 기준이다. 실별 독립 취사가 가능하다고 하여 독립 주거 구조로 만드는 것이 함정이다.","src":"2026-07-17 부동산학개론 총론 다중주택","conceptKey":"부동산학개론 총론 다중주택"}
/*__QUESTIONS_END__*/
];

/*__BUILD_PAYLOAD_START__*/
// ── 순수 함수 레이어: DOM 없이 채점 결과(payload v2)를 만든다. node로 단위테스트 가능.
function conceptFromSrc(src){
  return String(src||"").replace(/^\s*\d{4}-\d{2}-\d{2}\s*/,"").replace(/\s*\(재도전\)\s*$/,"").trim();
}
function buildPayload(questions, sel, quizDate, nowIso, schemaVersion){
  let score = 0; const results = [], wrong = [];
  questions.forEach((item, qi)=>{
    const isCorrect = sel[qi] === item.answer;
    if(isCorrect) score++;
    const ck = item.conceptKey || conceptFromSrc(item.src);
    const isRetry = !!item.retryOf || /\(재도전\)/.test(item.src||"") || String(item.q||"").indexOf("🔁") >= 0;
    const base = {
      id: quizDate + "-q" + (qi+1), cat: item.cat, type: item.type, q: item.q,
      options: item.opts, myAnswer: item.opts[sel[qi]], correct: item.opts[item.answer],
      expl: item.expl, src: item.src
    };
    const r = Object.assign({}, base, {
      conceptKey: ck,
      retryOf: isRetry ? (item.retryOf || ck) : null,
      correctAnswered: isCorrect
    });
    if(item.calc) r.calc = item.calc;
    results.push(r);
    if(!isCorrect) wrong.push(base);   // v1 하위호환 필드 (기존 수거 파이프라인용)
  });
  return { score: score, wrong: wrong, payload: {
    schemaVersion: schemaVersion, subject: "공인중개사", date: quizDate, quizId: quizDate,
    score: score, total: questions.length, wrongCount: wrong.length,
    results: results, wrong: wrong, generatedAt: nowIso
  }};
}
/*__BUILD_PAYLOAD_END__*/

const form = document.getElementById('quiz');
const selected = new Array(QUESTIONS.length).fill(null);
let graded = false;
let LAST_PAYLOAD = null;
let lastCat = null;

document.getElementById('total').textContent = ' / ' + QUESTIONS.length;

QUESTIONS.forEach((item, qi)=>{
  if(item.cat !== lastCat){
    const s = document.createElement('div');
    s.className = 'sec';
    s.textContent = '▍' + item.cat;
    form.appendChild(s);
    lastCat = item.cat;
  }
  const card = document.createElement('div');
  card.className = 'q';
  const isOX = item.type === 'OX';
  card.innerHTML = `
    <div class="qhead">
      <span class="qno">${qi+1}</span>
      <span class="qtype">${item.type}</span>
      <span class="qcat">${item.cat}</span>
    </div>
    <div class="qtext">${item.q}</div>
    <div class="opts ${isOX?'ox':''}" data-q="${qi}"></div>
    <div class="expl" id="expl-${qi}"></div>`;
  const optsEl = card.querySelector('.opts');
  item.opts.forEach((o, oi)=>{
    const el = document.createElement('div');
    el.className = 'opt';
    el.dataset.q = qi; el.dataset.o = oi;
    el.innerHTML = isOX
      ? `<span>${o}</span>`
      : `<span class="mk">${String.fromCharCode(65+oi)}</span><span>${o}</span>`;
    el.addEventListener('click', ()=>{
      if(graded) return;
      selected[qi] = oi;
      optsEl.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
      el.classList.add('sel');
      updateProgress();
    });
    // 눈동자(👁) 소거 버튼 — 확실히 아닌 보기를 희미하게(다시 누르면 복구). 채점·선택·저장에 영향 없음.
    if(!isOX){
      const eye = document.createElement('button');
      eye.type = 'button';
      eye.className = 'eye';
      eye.textContent = '👁';
      eye.title = '확실히 아닌 보기 희미하게 (다시 누르면 복구)';
      eye.setAttribute('aria-label', '이 보기를 후보에서 제외');
      eye.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        if(graded) return;
        el.classList.toggle('ruled');
      });
      el.appendChild(eye);
    }
    optsEl.appendChild(el);
  });
  form.appendChild(card);
});

function updateProgress(){
  const done = selected.filter(s=>s!==null).length;
  document.getElementById('pcount').textContent = `${done} / ${QUESTIONS.length} 선택`;
  document.getElementById('pbar').style.width = (done/QUESTIONS.length*100)+'%';
  document.getElementById('submitBtn').disabled = done !== QUESTIONS.length;
}

const btn = document.getElementById('submitBtn');
btn.addEventListener('click', ()=>{ if(!graded){ grade(); } else { location.reload(); } });

document.getElementById('copyBtn').addEventListener('click', ()=>{
  if(!LAST_PAYLOAD) return;
  const txt = JSON.stringify(LAST_PAYLOAD, null, 2);
  const done = ()=>{ document.getElementById('dlnote').textContent = "📋 복사 완료 — velog-posts/공인중개사/claude_ox_오답/_inbox/에 붙여넣어 저장해도 된다"; };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt, done));
  } else { fallbackCopy(txt, done); }
});
function fallbackCopy(txt, done){
  const ta = document.createElement('textarea');
  ta.value = txt; document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){}
  ta.remove();
}

function grade(){
  graded = true;
  const built = buildPayload(QUESTIONS, selected, QUIZ_DATE, new Date().toISOString(), SCHEMA_VERSION);
  LAST_PAYLOAD = built.payload;
  QUESTIONS.forEach((item, qi)=>{
    const opts = document.querySelectorAll(`.opt[data-q="${qi}"]`);
    opts.forEach((el, oi)=>{
      el.style.cursor='default';
      el.classList.remove('ruled');           // 채점 시 소거 표시 해제(정답이 희미하게 남지 않도록)
      const eye = el.querySelector('.eye');    // 눈동자 버튼 제거 — 채점 후엔 불필요
      if(eye) eye.remove();
      if(oi === item.answer) el.classList.add('correct');
      if(oi === selected[qi] && oi !== item.answer) el.classList.add('wrong');
    });
    const correct = selected[qi] === item.answer;
    const ex = document.getElementById('expl-'+qi);
    ex.innerHTML = `<span class="verdict" style="color:${correct?'var(--ok)':'var(--no)'}">${correct?'정답!':'오답'}</span>${item.expl}<span class="src">📄 출처: ${item.src}</span>`;
    ex.classList.add('show');
  });
  const r = document.getElementById('result');
  document.getElementById('score').textContent = built.score;
  document.getElementById('rmsg').textContent = msgFor(built.score);
  r.classList.add('show');
  btn.textContent = '🔄 다시 풀기';
  btn.classList.add('retry');
  document.getElementById('copyBtn').classList.add('show');

  // 결과 자동 다운로드 (월요일 수거·원장 갱신이 읽는 파일)
  downloadResult(built.payload);

  r.scrollIntoView({behavior:'smooth', block:'center'});
}

function downloadResult(payload){
  try{
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `공인중개사_오답_${QUIZ_DATE}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1500);
    document.getElementById('dlnote').textContent =
      payload.wrongCount>0 ? `💾 결과 저장됨(오답 ${payload.wrongCount}개) — 다운로드 폴더 확인` : "💾 만점 기록 저장됨";
  }catch(e){
    document.getElementById('dlnote').textContent = "⚠️ 자동 저장 실패 — 아래 '결과 JSON 복사'를 눌러 수동 저장";
  }
}

function msgFor(s){
  const t = QUESTIONS.length;
  const r = s/t;
  if(s===t)   return "만점. 오늘 등록증 발급해도 되겠는데요? 🏆";
  if(r>=0.8)  return "합격권. 틀린 거 해설만 한 번 더 보면 완벽합니다.";
  if(r>=0.6)  return "절반은 넘었어요. 오답 노트행 직행하는 개념들이 보이네요.";
  if(r>=0.4)  return "아직 흔들리는 개념이 있어요. 해설 정독하고 내일 재도전!";
  return "괜찮아요, 회독이 쌓이면 올라갑니다. 해설부터 차근차근.";
}
</script>
