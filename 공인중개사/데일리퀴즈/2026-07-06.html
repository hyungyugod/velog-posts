{ type: "계산", cat: "공인중개사법·중개실무", q: "법원 경매(기일입찰)에서 어느 부동산의 최저매각가격이 1억 8천만원이다. 매수신청을 하려는 자가 원칙적으로 제공해야 하는 매수신청보증 금액은? (법원이 달리 정하지 않았고, 다른 조건은 동일)", opts: ["1,800만원", "1,000만원", "2,700만원", "3,600만원"], answer: 0, expl: "[정답 근거] 매수신청보증은 최저매각가격의 10분의 1이다: 1억 8천만원×1/10=1,800만원. [메커니즘] 보증을 매수신청액이 아닌 법원이 정한 하한(최저매각가격)에 걸어 신청액 조작을 막는다. [함정] 매수신청'금액'이 아니라 최저매각'가격'이 기준이며, 항고보증은 매각대금의 10분의 1로 기준이 다르다.", src: "2026-07-03 공인중개사법·중개실무 1-2", conceptKey: "공인중개사법 1-2 매수신청보증", calc: { expr: "180000000 * 0.1", expected: 18000000 } },

{ type: "일반", cat: "부동산공법", q: "다음 중 주택법령상 매도청구에 관한 설명으로 <b>옳지 않은</b> 것은?", opts: ["사업계획승인을 받은 사업주체가 대지면적의 95% 이상 사용권원을 확보하면, 확보하지 못한 대지의 모든 소유자에게 매도청구할 수 있다", "매도청구의 가격은 공시지가가 아니라 시가로 한다", "사용검사 후에는 소유권을 회복한 토지 면적이 주택단지 전체 대지면적의 5% 미만인 경우에만 매도청구할 수 있다", "사용검사 후 대표자를 선정하여 매도청구 소송을 하려면 주택 소유자 전체의 2분의 1 이상 동의를 받으면 된다"], answer: 3, expl: "[정답 근거] 대표자 선정은 복리시설을 포함한 주택 소유자 전체의 '4분의 3 이상' 동의가 필요하다. [메커니즘] 다수 소유자의 이해를 대표해 소송하므로 가중된 동의요건을 둔 것. [함정] '2분의 1'로 낮추는 숫자 함정이며, 사용검사 후 매도청구는 5% 미만·2년 이내 요건도 함께 본다.", src: "2026-07-02 부동산공법 9-1", conceptKey: "부동산공법 9-1 매도청구" },
{ type: "사례", cat: "부동산공법", q: "사업주체 갑은 주택건설대지면적의 96%에 대해 사용권원을 확보하고 사업계획승인을 받았으나, 을이 소유한 나머지 4% 대지는 확보하지 못했다. 이에 관한 설명으로 옳은 것은?", opts: ["갑은 을에게 공시지가를 기준으로 매도할 것을 청구할 수 있다", "갑은 사용권원을 확보하지 못한 을의 대지에 대해 시가로 매도청구할 수 있다", "갑은 대지면적의 100%를 확보하지 못했으므로 매도청구를 전혀 할 수 없다", "을은 매도청구를 받은 날부터 2년 이내에 스스로 사업주체에게 매수를 청구해야 한다"], answer: 1, expl: "[정답 근거] 사업주체가 95% 이상 확보하면 미확보 대지 전부의 소유자에게 '시가'로 매도청구할 수 있다. [메커니즘] 소수 미확보 지분이 사업 전체를 막지 못하게 하되 시가 보상으로 재산권을 보호한다. [함정] 공시지가(X)/시가(O)이고, 5%·2년 룰은 '사용검사 후' 매도청구의 요건이라 사안과 구분한다.", src: "2026-07-02 부동산공법 9-1", conceptKey: "부동산공법 9-1 매도청구 사례" },
{ type: "일반", cat: "부동산공법", q: "농지법령상 위탁경영·처분의무·대리경작에 관한 설명으로 <b>옳지 않은</b> 것은?", opts: ["농지 처분사유가 발생한 경우 처분의무기한은 그 사유가 발생한 날부터 6개월이다", "3개월 이상 국외여행 중이어서 자기 농업경영에 이용할 수 없는 경우 농지의 전부를 위탁경영할 수 있다", "유휴농지에 대한 대리경작 기간은 따로 정하지 않으면 3년으로 한다", "자기 노동력이 부족하여 과수의 가지치기·수확 등 농작업의 일부를 위탁하는 것은 허용된다"], answer: 0, expl: "[정답 근거] 농지 처분의무기한은 처분사유 발생일부터 '1년'이다. [메커니즘] 넓은 농지를 정리·매각하는 데 시간이 필요해 6개월이 아닌 1년을 준 것. [함정] 6개월(X)/1년(O) 숫자 함정, 전부위탁(3개월 이상 국외·치료)과 일부위탁(노동력 부족)을 구분한다.", src: "2026-07-02 부동산공법 9-7", conceptKey: "부동산공법 9-7 위탁경영·처분의무" },
{ type: "OX", cat: "부동산공법", q: "주택법령상 토지임대부 분양주택의 토지에 대한 임대차기간은 40년 이내로 한다. (O/X)", opts: ["O", "X"], answer: 0, expl: "O. [정답 근거] 토지임대부 분양주택의 토지 임대차기간은 40년 이내다. [메커니즘] 건물만 분양하고 토지는 장기임대해 분양가를 낮추는 제도라 장기(40년)를 보장한다. [함정] 갱신은 소유자 75% 이상 청구, 거주의무 5년 등 다른 숫자와 섞어 낸다.", src: "2026-07-02 부동산공법 9-3", conceptKey: "부동산공법 9-3 토지임대부 임대차기간" },
{ type: "조합", cat: "부동산공시법", q: "지적소관청이 관리하는 지상경계점등록부의 등록사항을 모두 고른 것은?<br>ㄱ. 경계점표지의 종류 및 경계점 위치<br>ㄴ. 경계점의 사진 파일<br>ㄷ. 지적기준점의 명칭 및 좌표<br>ㄹ. 공부상 지목과 실제 토지이용 지목", opts: ["ㄱ, ㄷ", "ㄴ, ㄷ, ㄹ", "ㄱ, ㄴ, ㄹ", "ㄱ, ㄴ, ㄷ, ㄹ"], answer: 2, expl: "[정답 근거] 경계점표지 종류·위치, 경계점 사진파일, 공부상·실제 지목은 등록사항이나, 지적기준점은 측량 전체에 공용되는 기준점이라 특정 필지 장부에 들어가지 않는다. [메커니즘] 지상경계점등록부는 '그 필지 경계만의 정보'를 담는 장부이기 때문. [함정] 측량에 공용되는 지적기준점을 끼워 넣는 함정이다.", src: "2026-06-30 부동산공시법 1-1", conceptKey: "부동산공시법 1-1 지상경계점등록부" },
{ type: "일반", cat: "부동산공시법", q: "토지의 신규등록 절차에 관한 설명으로 <b>옳지 않은</b> 것은?", opts: ["신규등록 시에는 등기기록이 존재하지 않아 지적소관청이 등기촉탁을 하지 않는다", "신규등록하는 토지의 소유자는 등기관의 통지에 의하여 지적공부에 등록한다", "토지소유자는 신규등록 사유가 발생한 날부터 60일 이내에 신규등록을 신청해야 한다", "신규등록 후 소유자는 그 대장을 근거로 직접 소유권보존등기를 신청함으로써 등기부가 최초로 생성된다"], answer: 1, expl: "[정답 근거] 신규등록 토지의 소유자는 지적소관청이 직접 조사하여 등록한다(등기관 통지 X). [메커니즘] 아직 등기부가 없어 통지받을 곳이 없으므로 소관청이 직접 조사한다. [함정] 표시변경(대장→등기촉탁)·소유권변경(등기→통지→대장)과 신규등록(소관청 직접조사)을 뒤섞는 함정이다.", src: "2026-06-30 부동산공시법 1-2", conceptKey: "부동산공시법 1-2 신규등록" },
{ type: "OX", cat: "부동산공시법", q: "부동산등기법령상 5개 이상의 부동산이 공동담보의 목적물일 때, 공동담보목록은 등기신청인이 작성하여 제출해야 한다. (O/X)", opts: ["O", "X"], answer: 1, expl: "X. [정답 근거] 5개 이상 부동산이 공동담보일 때 공동담보목록은 '등기관'이 작성한다(신청인 X). [메커니즘] 목록의 정확성·공시력을 위해 등기실무 주체인 등기관이 만든다. [함정] 작성 주체를 신청인으로 바꾸는 주체 함정이다.", src: "2026-06-30 부동산공시법 1-3", conceptKey: "부동산공시법 1-3 공동담보목록" },
{ type: "일반", cat: "부동산공시법", q: "부동산등기법령상 피담보채권의 일부양도에 따른 저당권 일부이전등기에 관한 설명으로 옳은 것은?", opts: ["채권의 일부만 양도된 경우에는 저당권이 이전되지 않으므로 별도의 이전등기를 할 필요가 없다", "저당권 일부이전등기는 언제나 주등기(독립등기)의 방식으로 실행한다", "채권이 일부 양도된 경우 등기관은 그 양도액을 등기기록에 기록할 수 없다", "등기관은 저당권 일부이전등기를 하면서 채권의 양도액도 함께 기록해야 한다"], answer: 3, expl: "[정답 근거] 채권 일부양도에 따른 저당권 일부이전등기에서 등기관은 양도액을 기록해야 한다. [메커니즘] 옮겨간 채권의 '양'을 표시해야 저당권이 미치는 범위가 명확해진다. [함정] 채권이 이동하면 저당권도 부기등기로 함께 이전되며, 주등기로 오기하거나 양도액 기록을 생략하는 함정이다.", src: "2026-06-30 부동산공시법 1-4", conceptKey: "부동산공시법 1-4 저당권 일부이전" },
{ type: "일반", cat: "부동산공시법", q: "🔁 공간정보의 구축 및 관리 등에 관한 법령상 지적공부의 등록사항 정정에 관한 설명으로 옳은 것은?", opts: ["경계나 면적의 정정으로 인접 토지의 경계가 변경되는 경우, 지적소관청은 인접 토지소유자의 승낙서 또는 이에 대항할 수 있는 확정판결서 정본을 받아야 한다", "지적공부의 등록사항에 오류가 있더라도 지적소관청이 직권으로 이를 정정할 수 있는 경우는 전혀 없다", "미등기 토지의 소유자 성명에 관한 정정은 오직 등기관의 촉탁으로만 할 수 있다", "토지소유자는 지적공부의 등록사항에 잘못이 있어도 그 정정을 신청할 수 없다"], answer: 0, expl: "[정답 근거] 정정으로 인접 경계가 바뀌면 인접 토지소유자의 승낙서 또는 확정판결서 정본이 있어야 정정할 수 있다. [메커니즘] 이웃 토지의 권리에 영향을 주므로 동의·판결이라는 안전장치를 요구한다. [함정] 소관청 직권정정은 가능하고, 토지소유자도 정정신청을 할 수 있다는 점을 반대로 낸다.", src: "2026-06-30 부동산공시법 (재도전)", conceptKey: "부동산공시법 §1 등록사항정정", retryOf: "부동산공시법 §1 등록사항정정" },
{ type: "일반", cat: "부동산공시법", q: "지적공부와 등기부의 정리 순서에 관한 설명으로 <b>옳지 않은</b> 것은?", opts: ["토지의 표시변경(분할·합병·지목변경)은 대장을 변경한 뒤 지적소관청의 등기촉탁으로 등기에 반영한다", "소유권 변경(매매 등)은 등기를 먼저 하고 그 통지에 따라 대장을 정리한다", "토지의 신규등록은 지적소관청이 등기촉탁을 하여 등기부에 먼저 반영한 뒤 대장을 만든다", "신규등록은 주(主)가 되는 공부가 대장이며 등기촉탁의 대상이 아니다"], answer: 2, expl: "[정답 근거] 신규등록은 등기부가 없어 등기촉탁을 하지 않고, 지적소관청이 직접 조사해 대장을 만든 뒤 소유자가 보존등기를 신청한다. [메커니즘] 표시변경은 '대장→등기촉탁', 소유권변경은 '등기→통지→대장'으로 주공부가 다르기 때문. [함정] 신규등록을 '등기촉탁 먼저'로 뒤집는 함정이다.", src: "2026-06-30 부동산공시법 1-2", conceptKey: "부동산공시법 1-2 정리방향" },
{ type: "일반", cat: "부동산세법", q: "지방세기본법령상 기한후신고와 가산세 감면에 관한 설명으로 <b>옳지 않은</b> 것은?", opts: ["무신고한 경우에도 법정신고기한이 지난 후 6개월 이내에 기한후신고를 하면 무신고가산세를 감면한다", "지방자치단체의 장이 과세표준과 세액을 결정할 것을 미리 알고 기한후신고서를 제출한 경우에도 가산세를 전액 감면한다", "법정신고기한 경과 후 1개월 이내에 기한후신고를 하면 무신고가산세액의 100분의 50을 감면한다", "무신고·과소신고에는 원칙적으로 가산세가 부과된다"], answer: 1, expl: "[정답 근거] 지자체장이 결정할 것을 '미리 알고' 낸 기한후신고는 감면 대상에서 제외된다. [메커니즘] 자진신고를 유도하는 제도라, 적발이 임박해 낸 신고까지 깎아주면 취지에 어긋난다. [함정] 무신고(기한후신고)와 과소신고(수정신고)의 감면율 표를 뒤섞는 함정이다.", src: "2026-07-05 부동산세법 9-1", conceptKey: "부동산세법 9-1 기한후신고" },
{ type: "조합", cat: "부동산세법", q: "지방세기본법령상 '그 재산에 대하여 부과된 조세'(당해세)로서 원칙적으로 피담보채권에 우선하는 것을 모두 고른 것은?<br>ㄱ. 재산세<br>ㄴ. 지방교육세<br>ㄷ. 소방분 지역자원시설세<br>ㄹ. 종합부동산세", opts: ["ㄱ, ㄴ", "ㄱ, ㄷ, ㄹ", "ㄴ, ㄷ, ㄹ", "ㄱ, ㄴ, ㄷ, ㄹ"], answer: 3, expl: "[정답 근거] 재산세·지방교육세·소방분 지역자원시설세·종합부동산세가 당해세로 피담보채권에 우선한다. [메커니즘] 그 재산 자체에 부과된 세금이라 담보권자도 예측 가능해 우선권을 준 것. [함정] 다만 대항요건·확정일자를 갖춘 주택 임차보증금과 비교될 땐 법정기일·확정일자의 선후(날짜순)로 가린다.", src: "2026-07-05 부동산세법 9-2", conceptKey: "부동산세법 9-2 당해세" },
{ type: "일반", cat: "부동산세법", q: "지방세기본법령상 조세채권의 배당순위와 법정기일에 관한 설명으로 <b>옳지 않은</b> 것은?", opts: ["일반조세와 저당권 등 피담보채권의 순위는 언제나 조세채권이 우선한다", "조세채권 상호간의 순위는 담보 → 압류 → 교부청구('담압교') 순이다", "신고에 의하여 확정되는 세금의 법정기일은 그 신고일이다", "결정·경정으로 고지한 세액의 법정기일은 납세고지서의 발송일이다"], answer: 0, expl: "[정답 근거] 일반조세와 피담보채권은 '무조건 조세 우선'이 아니라 조세의 법정기일과 담보물권 설정일의 선후(날짜순)로 가린다. [메커니즘] 담보권자의 예측가능성을 보호하기 위해 시간순 원칙을 둔 것. [함정] 당해세만 예외적으로 앞서고 일반조세는 날짜순이라는 점을 뒤집는 함정이다.", src: "2026-07-05 부동산세법 9-2", conceptKey: "부동산세법 9-2 배당순위" },
{ type: "사례", cat: "부동산세법", q: "X토지의 재산세 과세기준일 현재 소유권의 귀속이 분명하지 않아 사실상의 소유자를 확인할 수 없고, 공부상 소유자에게도 귀속시킬 수 없다. 이 경우 재산세 납세의무자는?", opts: ["재산세 과세기준일 현재 지적공부에 소유자로 등재되어 있는 공부상 소유자", "직전 연도의 사실상 소유자", "X토지를 현재 사용하고 있는 사용자", "관할 지방자치단체의 장"], answer: 2, expl: "[정답 근거] 사실상 소유자도 공부상 소유자도 확정할 수 없으면 '현재 사용자'가 재산세를 납부할 의무가 있다. [메커니즘] 재산세는 보유·사용 이익에 대한 과세라, 소유자를 못 잡으면 실제 사용자에게 지운다. [함정] 원칙(사실상 소유자)만 외우고 '사용자' 예외를 놓치게 하는 함정이다.", src: "2026-06-30 부동산세법 2-2", conceptKey: "부동산세법 2-2 재산세 납세의무자" },
{ type: "OX", cat: "부동산세법", q: "지방세법령상 등록면허세는 등록을 하기 전까지 그 세액을 신고하고 납부해야 한다. (O/X)", opts: ["O", "X"], answer: 0, expl: "O. [정답 근거] 등록면허세는 등록을 하기 전까지 미리 신고·납부해야 한다. [메커니즘] 등록이라는 행위 자체에 붙는 세금이라 등록 전 납부를 요건으로 둔 것. [함정] '등록 후 60일 이내' 등 사후신고로 바꾸는 시점 함정이다.", src: "2026-06-30 부동산세법 2-6", conceptKey: "부동산세법 2-6 등록면허세 신고납부" },
{ type: "일반", cat: "부동산세법", q: "지방세법·소득세법령상 취득시기와 양도소득세 필요경비에 관한 설명으로 <b>옳지 않은</b> 것은?", opts: ["주택조합이 조합원에게 귀속되지 않은 토지를 취득하는 경우 사용검사를 받은 날에 취득한 것으로 본다", "재건축조합이 조합원에게 귀속되지 않은 토지를 취득하는 시기는 소유권이전고시일의 다음 날이다", "이미 다른 필요경비로 산입된 금액은 자본적지출액으로 다시 필요경비에 산입할 수 없다", "상속받은 부동산을 양도할 때 이미 납부한 상속세는 양도소득세의 필요경비로 공제받을 수 있다"], answer: 3, expl: "[정답 근거] 기납부한 상속세는 양도소득세 필요경비로 공제받을 수 없다. [메커니즘] 상속세는 취득세와 달리 양도차익 계산의 취득원가·비용 성격이 아니기 때문. [함정] 취득세(추적 가능·공제)와 상속세(공제 불가)를 바꿔 내는 함정, 취득시기(주택=사용검사일 / 재건축=이전고시 다음날)도 함께 확인한다.", src: "2026-06-30 부동산세법 2-5", conceptKey: "부동산세법 2-5 취득시기·필요경비" },
{ type: "일반", cat: "민법·민사특별법", q: "민법상 매도인의 담보책임에서 제척기간에 관한 설명으로 <b>옳지 않은</b> 것은?", opts: ["권리의 하자의 경우 선의의 매수인은 그 사실을 안 날부터 1년 내에 권리를 행사해야 한다", "물건의 하자의 경우 무과실의 매수인은 그 사실을 안 날부터 1년 내에 권리를 행사해야 한다", "토지에 법령상 제한이 있어 건물 신축이 불가능한 것은 물건의 하자에 해당한다", "권리의 하자에 대한 담보책임에서 제척기간의 기산점은 계약을 체결한 날이 아니라 매수인이 그 사실을 안 날이다"], answer: 1, expl: "[정답 근거] 물건의 하자는 매수인이 무과실인 경우 '안 날부터 6개월' 내에 행사해야 한다(1년 X). [메커니즘] 물건 하자는 권리 하자보다 빨리 드러나 단기(6개월) 제척기간을 둔 것. [함정] 권리하자 1년(선의)/물건하자 6개월(무과실)의 숫자·요건을 뒤바꾸는 함정이다.", src: "2026-07-01 민법 1", conceptKey: "민법 1 담보책임 제척기간" },
{ type: "조합", cat: "민법·민사특별법", q: "다음 중 상가건물 임대차보호법에 관한 설명으로 옳은 것을 모두 고른 것은?<br>ㄱ. 대항력은 사업자등록을 신청한 다음 날부터 생긴다<br>ㄴ. 임차권등기명령은 관할 세무서장에게 신청한다<br>ㄷ. 권리금 회수방해로 인한 손해배상청구권은 임대차 종료일부터 3년 내에 행사하지 않으면 소멸한다<br>ㄹ. 보증금을 우선변제받으려면 사업자등록이 배당요구 종기까지 존재하면 된다", opts: ["ㄱ, ㄴ", "ㄴ, ㄷ", "ㄱ, ㄷ, ㄹ", "ㄱ, ㄴ, ㄷ, ㄹ"], answer: 2, expl: "[정답 근거] 대항력은 사업자등록 신청 '다음 날', 권리금 손배는 종료일부터 3년, 우선변제는 배당요구 종기까지 사업자등록 유지면 된다. 임차권등기명령은 세무서가 아니라 '관할 법원'에 신청한다(ㄴ 오류). [메커니즘] 공시(등록)·배당 절차상 시점을 각각 다르게 설계한 것. [함정] 임차권등기명령의 신청기관을 세무서로 바꾸는 함정이다.", src: "2026-07-01 민법 12", conceptKey: "민법 12 상가임대차" },
{ type: "사례", cat: "민법·민사특별법", q: "갑은 자기 소유 건물을 을에게 임대했는데, 을이 갑의 동의 없이 병에게 그 건물을 전대하여 병이 사용하고 있다. 갑이 아직 임대차계약을 해지하지 않은 경우에 관한 설명으로 옳은 것은?", opts: ["갑이 해지권을 행사하기 전까지는 임대차가 유효하게 존속하므로 갑은 병에게 부당이득 반환을 청구할 수 없다", "무단전대는 임대인의 신뢰를 저버린 것이므로 갑은 해지 여부와 무관하게 병에게 차임 상당액의 부당이득 반환을 곧바로 청구할 수 있다", "병은 갑에게 지상물매수청구권을 행사할 수 있다", "을의 무단전대만으로 임대차는 당연히 종료한다"], answer: 0, expl: "[정답 근거] 해지 전까지 임대차가 존속하므로 병의 사용은 '임차인이 직접 쓰는 것'과 다를 바 없어 갑에게 손해·법률상 원인 없는 이득이 없다. [메커니즘] 차임채권이 그대로 있어 임대인에게 손해가 없기 때문. [함정] 무단전대라도 해지 전에는 부당이득이 인정되지 않고, 무단전대 전차인은 지상물매수청구도 못 한다.", src: "2026-07-01 민법 10", conceptKey: "민법 10 무단전대 부당이득" },
{ type: "일반", cat: "민법·민사특별법", q: "민법상 환매에 관한 설명으로 <b>옳지 않은</b> 것은?", opts: ["부동산의 환매기간을 7년으로 정한 때에는 5년으로 단축한다", "환매 시 목적물의 과실과 대금의 이자는 특별한 약정이 없으면 이를 상계한 것으로 본다", "환매권은 양도할 수 있는 재산권이며 채권자대위권의 목적이 될 수 있다", "당사자는 합의로 환매기간을 5년을 넘겨 연장할 수 있다"], answer: 3, expl: "[정답 근거] 환매기간은 한 번 정하면 임의로 합의 연장할 수 없다(부동산 5년 상한). [메커니즘] 소유권을 장기간 불안정하게 두지 않으려는 취지다. [함정] '7년→5년 단축'은 맞지만 '연장 가능'으로 바꾸면 오답이며, 환매권의 양도성·대위성도 함께 묻는다.", src: "2026-07-01 민법 7", conceptKey: "민법 7 환매" },
{ type: "일반", cat: "민법·민사특별법", q: "주택임대차보호법에 관한 설명으로 <b>옳지 않은</b> 것은?", opts: ["임차인이 2기의 차임을 연체한 경우 묵시적 갱신이 인정되지 않는다", "나대지에 저당권이 설정된 후 그 지상에 신축된 주택의 소액임차인도 그 대지의 환가대금에서 최우선변제를 받을 수 있다", "임차인이 대항력을 갖춘 후 임대주택의 소유권이 양도되어 보증금반환채무가 양수인에게 승계된 경우, 임차인이 주민등록을 다른 곳으로 이전하더라도 양수인이 부담하는 임차보증금 반환채무는 소멸하지 않는다", "대항력을 갖추지 못한 임차인도 종전 임대인에게 보증금 반환을 청구할 수 있다"], answer: 1, expl: "[정답 근거] 나대지 저당 설정 후 신축된 주택의 소액임차인은 그 대지 환가대금에서 최우선변제를 받을 수 없다. [메커니즘] 저당권자가 '나대지' 가치를 기준으로 담보를 잡았으므로 그 신뢰를 보호하는 것. [함정] '최우선변제 가능'으로 뒤집는 방향 함정이다.", src: "2026-07-01 민법 11", conceptKey: "민법 11 주택임대차" },
{ type: "OX", cat: "민법·민사특별법", q: "상가건물 임대차보호법상 대항력은 임차인이 건물의 인도와 사업자등록을 신청한 그 날 즉시 생긴다. (O/X)", opts: ["O", "X"], answer: 1, expl: "X. [정답 근거] 상가임대차의 대항력은 사업자등록을 신청한 '다음 날'에 생긴다(당일 X). [메커니즘] 공시가 대외적으로 완성되는 시점을 다음 날로 잡아 제3자를 보호한다. [함정] '신청 당일 즉시'로 하루를 당겨 내는 시점 함정이다.", src: "2026-07-01 민법 12", conceptKey: "민법 12 상가 대항력 시점" },
{ type: "일반", cat: "민법·민사특별법", q: "가등기담보권의 실행 및 적용요건에 관한 설명으로 <b>옳지 않은</b> 것은?", opts: ["가등기담보법은 목적물의 가액이 차용액(피담보채권액)을 초과하는 경우에 적용된다", "귀속청산 시 채권자는 청산금의 평가액을 통지하고 2개월의 청산기간이 지난 후 청산금을 지급해야 한다", "후순위 저당권자는 청산기간 중에는 목적물의 경매를 청구할 수 없다", "담보가등기인지 청구권보전을 위한 가등기인지는 등기부의 표시만으로는 확정할 수 없다"], answer: 2, expl: "[정답 근거] 후순위 저당권자는 청산기간(2개월) 내에 목적물의 경매를 청구하여 귀속청산 대신 경매로 전환시킬 수 있다. [메커니즘] 귀속청산이 후순위권리자에게 불리할 수 있어 경매청구권으로 대항수단을 준 것. [함정] '경매청구 불가'로 뒤집는 방향 함정이며, 적용요건(목적물가액>차용액)·청산기간(2개월)도 함께 확인한다.", src: "2026-07-01 민법 13", conceptKey: "민법 13 가등기담보" },
{ type: "일반", cat: "부동산학개론", q: "🔁 주택의 여과과정(filtering)과 주거분리에 관한 설명으로 옳은 것은?", opts: ["상위계층이 사용하던 주택이 하위계층의 사용으로 전환되는 것을 하향여과라고 한다", "저소득층 주거지역에서 주택 개량이 활발해져 고소득층이 유입되는 것을 하향여과라고 한다", "주거분리는 도시 전체가 하나의 동질적 주거지역으로 통합되는 현상을 말한다", "하향여과가 발생하면 저소득층이 이용할 수 있는 주택의 양은 오히려 감소한다"], answer: 0, expl: "[정답 근거] 하향여과는 상위계층 주택이 하위계층 사용으로 넘어가는 것으로, 저소득층 주택공급을 늘린다. [메커니즘] 노후·상대적 저가화된 주택이 하위시장으로 이동하며 여과가 일어난다. [함정] 상향여과(개량→고소득 유입)와 방향을 바꾸거나, 하향여과가 저소득 주택을 '감소'시킨다고 뒤집는 함정이다.", src: "2026-07-04 부동산학개론 (재도전)", conceptKey: "부동산학개론 §2 여과·주거분리", retryOf: "부동산학개론 §2 여과·주거분리" },

/*__BUILD_PAYLOAD_START__*/
// ── 순수 함수 레이어: DOM 없이 채점 결과(payload v2)를 만든다. node로 단위테스트 가능.
function conceptFromSrc(src){
  return String(src||"").replace(/^\s*\d{4}-\d{2}-\d{2}\s*/,"").replace(/\s*\(재도전\)\s*$/,"").trim();
}
function buildPayload(questions, sel, quizDate, nowIso, schemaVersion){
  let score = 0; const results = [], wrong = [];
  questions.forEach((item, qi)=>{
    const isCorrect = sel[qi] === item.answer;
    if(isCorrect) score++;
    const ck = item.conceptKey || conceptFromSrc(item.src);
    const isRetry = !!item.retryOf || /\(재도전\)/.test(item.src||"") || String(item.q||"").indexOf("🔁") >= 0;
    const base = {
      id: quizDate + "-q" + (qi+1), cat: item.cat, type: item.type, q: item.q,
      options: item.opts, myAnswer: item.opts[sel[qi]], correct: item.opts[item.answer],
      expl: item.expl, src: item.src
    };
    const r = Object.assign({}, base, {
      conceptKey: ck,
      retryOf: isRetry ? (item.retryOf || ck) : null,
      correctAnswered: isCorrect
    });
    if(item.calc) r.calc = item.calc;
    results.push(r);
    if(!isCorrect) wrong.push(base);   // v1 하위호환 필드 (기존 수거 파이프라인용)
  });
  return { score: score, wrong: wrong, payload: {
    schemaVersion: schemaVersion, subject: "공인중개사", date: quizDate, quizId: quizDate,
    score: score, total: questions.length, wrongCount: wrong.length,
    results: results, wrong: wrong, generatedAt: nowIso
  }};
}
/*__BUILD_PAYLOAD_END__*/

const form = document.getElementById('quiz');
const selected = new Array(QUESTIONS.length).fill(null);
let graded = false;
let LAST_PAYLOAD = null;
let lastCat = null;

document.getElementById('total').textContent = ' / ' + QUESTIONS.length;

QUESTIONS.forEach((item, qi)=>{
  if(item.cat !== lastCat){
    const s = document.createElement('div');
    s.className = 'sec';
    s.textContent = '▍' + item.cat;
    form.appendChild(s);
    lastCat = item.cat;
  }
  const card = document.createElement('div');
  card.className = 'q';
  const isOX = item.type === 'OX';
  card.innerHTML = `
    <div class="qhead">
      <span class="qno">${qi+1}</span>
      <span class="qtype">${item.type}</span>
      <span class="qcat">${item.cat}</span>
    </div>
    <div class="qtext">${item.q}</div>
    <div class="opts ${isOX?'ox':''}" data-q="${qi}"></div>
    <div class="expl" id="expl-${qi}"></div>`;
  const optsEl = card.querySelector('.opts');
  item.opts.forEach((o, oi)=>{
    const el = document.createElement('div');
    el.className = 'opt';
    el.dataset.q = qi; el.dataset.o = oi;
    el.innerHTML = isOX
      ? `<span>${o}</span>`
      : `<span class="mk">${String.fromCharCode(65+oi)}</span><span>${o}</span>`;
    el.addEventListener('click', ()=>{
      if(graded) return;
      selected[qi] = oi;
      optsEl.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
      el.classList.add('sel');
      updateProgress();
    });
    // 눈동자(👁) 소거 버튼 — 확실히 아닌 보기를 희미하게(다시 누르면 복구). 채점·선택·저장에 영향 없음.
    if(!isOX){
      const eye = document.createElement('button');
      eye.type = 'button';
      eye.className = 'eye';
      eye.textContent = '👁';
      eye.title = '확실히 아닌 보기 희미하게 (다시 누르면 복구)';
      eye.setAttribute('aria-label', '이 보기를 후보에서 제외');
      eye.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        if(graded) return;
        el.classList.toggle('ruled');
      });
      el.appendChild(eye);
    }
    optsEl.appendChild(el);
  });
  form.appendChild(card);
});

function updateProgress(){
  const done = selected.filter(s=>s!==null).length;
  document.getElementById('pcount').textContent = `${done} / ${QUESTIONS.length} 선택`;
  document.getElementById('pbar').style.width = (done/QUESTIONS.length*100)+'%';
  document.getElementById('submitBtn').disabled = done !== QUESTIONS.length;
}

const btn = document.getElementById('submitBtn');
btn.addEventListener('click', ()=>{ if(!graded){ grade(); } else { location.reload(); } });

document.getElementById('copyBtn').addEventListener('click', ()=>{
  if(!LAST_PAYLOAD) return;
  const txt = JSON.stringify(LAST_PAYLOAD, null, 2);
  const done = ()=>{ document.getElementById('dlnote').textContent = "📋 복사 완료 — velog-posts/공인중개사/claude_ox_오답/_inbox/에 붙여넣어 저장해도 된다"; };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt, done));
  } else { fallbackCopy(txt, done); }
});
function fallbackCopy(txt, done){
  const ta = document.createElement('textarea');
  ta.value = txt; document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){}
  ta.remove();
}

function grade(){
  graded = true;
  const built = buildPayload(QUESTIONS, selected, QUIZ_DATE, new Date().toISOString(), SCHEMA_VERSION);
  LAST_PAYLOAD = built.payload;
  QUESTIONS.forEach((item, qi)=>{
    const opts = document.querySelectorAll(`.opt[data-q="${qi}"]`);
    opts.forEach((el, oi)=>{
      el.style.cursor='default';
      el.classList.remove('ruled');           // 채점 시 소거 표시 해제(정답이 희미하게 남지 않도록)
      const eye = el.querySelector('.eye');    // 눈동자 버튼 제거 — 채점 후엔 불필요
      if(eye) eye.remove();
      if(oi === item.answer) el.classList.add('correct');
      if(oi === selected[qi] && oi !== item.answer) el.classList.add('wrong');
    });
    const correct = selected[qi] === item.answer;
    const ex = document.getElementById('expl-'+qi);
    ex.innerHTML = `<span class="verdict" style="color:${correct?'var(--ok)':'var(--no)'}">${correct?'정답!':'오답'}</span>${item.expl}<span class="src">📄 출처: ${item.src}</span>`;
    ex.classList.add('show');
  });
  const r = document.getElementById('result');
  document.getElementById('score').textContent = built.score;
  document.getElementById('rmsg').textContent = msgFor(built.score);
  r.classList.add('show');
  btn.textContent = '🔄 다시 풀기';
  btn.classList.add('retry');
  document.getElementById('copyBtn').classList.add('show');

  // 결과 자동 다운로드 (월요일 수거·원장 갱신이 읽는 파일)
  downloadResult(built.payload);

  r.scrollIntoView({behavior:'smooth', block:'center'});
}

function downloadResult(payload){
  try{
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `공인중개사_오답_${QUIZ_DATE}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1500);
    document.getElementById('dlnote').textContent =
      payload.wrongCount>0 ? `💾 결과 저장됨(오답 ${payload.wrongCount}개) — 다운로드 폴더 확인` : "💾 만점 기록 저장됨";
  }catch(e){
    document.getElementById('dlnote').textContent = "⚠️ 자동 저장 실패 — 아래 '결과 JSON 복사'를 눌러 수동 저장";
  }
}

function msgFor(s){
  const t = QUESTIONS.length;
  const r = s/t;
  if(s===t)   return "만점. 오늘 등록증 발급해도 되겠는데요? 🏆";
  if(r>=0.8)  return "합격권. 틀린 거 해설만 한 번 더 보면 완벽합니다.";
  if(r>=0.6)  return "절반은 넘었어요. 오답 노트행 직행하는 개념들이 보이네요.";
  if(r>=0.4)  return "아직 흔들리는 개념이 있어요. 해설 정독하고 내일 재도전!";
  return "괜찮아요, 회독이 쌓이면 올라갑니다. 해설부터 차근차근.";
}
