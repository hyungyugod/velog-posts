<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>레이아웃 5 · 사례형 (quote-bracket) — 지식산책</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../themes/alert.css">
<link rel="stylesheet" href="../chrome.css">
<link rel="stylesheet" href="../components.css">
<style>html,body{margin:0;background:#e9eaec;display:grid;place-items:center;min-height:100vh}</style>
</head>
<body>
<!-- ═══ 레이아웃 ⑤: 사례형 — 1인칭 시나리오/인용으로 몰입 (스토리텔링 도입) ═══
     슬롯 순서: tag-chip → rule → h(질문형 훅) → quote-bracket(1인칭 상황) → highlight-box(개념 적용) -->
<div class="card" data-layout="quote">
  <div class="chrome" aria-hidden="true">
    <div class="chrome-wordmark">지식산책</div>
    <div class="chrome-pageno"><span class="pg-n">6</span>/<span class="pg-total">7</span></div>
    <div class="chrome-footer"><span class="footer-topic">전세금 반환</span> / 지식산책 · Knowledge Stroll</div>
  </div>
  <div class="content">
    <span class="tag-chip">이런 상황</span>
    <div class="rule"></div>
    <h2 class="h">전세금은 왜 돌려받기 어려울까?</h2>
    <div class="quote-bracket">“계약 끝났는데 집주인이 ‘다음 세입자 오면 준다’고 해요.
      확정일자도 받았는데, 저는 왜 바로 못 받나요?”</div>
    <div class="highlight-box">💡 확정일자는 <b>순위</b>일 뿐, 반환을 강제하진 않는다.
      집이 안 나가면 <b>임차권등기명령 → 보증금반환소송</b>이 실제 경로.</div>
  </div>
</div>
</body>
</html>
