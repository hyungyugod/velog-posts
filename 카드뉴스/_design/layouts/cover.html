<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>커버 · 질문형 훅 (cover) — 지식산책</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../themes/law.css">
<link rel="stylesheet" href="../chrome.css">
<link rel="stylesheet" href="../components.css">
<style>html,body{margin:0;background:#e9eaec;display:grid;place-items:center;min-height:100vh}</style>
</head>
<body>
<!-- ═══ 커버 — 정체성 앵커: 훅은 반드시 질문형 (“전문가의 정리”가 아니라 “학습자의 질문”) ═══
     슬롯 순서: tag-chip → rule → cover-title(질문형) → cover-sub -->
<div class="card" data-layout="cover">
  <div class="chrome" aria-hidden="true">
    <div class="chrome-wordmark">지식산책</div>
    <div class="chrome-pageno"><span class="pg-n">1</span>/<span class="pg-total">7</span></div>
    <div class="chrome-footer"><span class="footer-topic">전세금 반환</span> / 지식산책 · Knowledge Stroll</div>
  </div>
  <div class="content">
    <span class="tag-chip">부동산 공부 기록</span>
    <div class="rule"></div>
    <h1 class="cover-title">전세금은 왜<br>돌려받기<br>어려울까?</h1>
    <p class="cover-sub">확정일자까지 받았는데도 바로 못 받는 이유 — 한 장씩 정리했습니다.</p>
  </div>
</div>
</body>
</html>
